<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>真夜中FM入店音 B→G — プレビュー</title>
<style>
  html,body{height:100%;margin:0}
  body{display:flex;flex-direction:column;gap:18px;align-items:center;justify-content:center;
    background:#0a150b;color:#a8e063;font-family:'Hiragino Kaku Gothic ProN',system-ui,sans-serif}
  h1{font-size:15px;font-weight:700;letter-spacing:.04em;margin:0;opacity:.85}
  button{font-size:20px;padding:18px 34px;border-radius:16px;border:1px solid rgba(168,224,99,.5);
    background:rgba(93,186,106,.25);color:#dfffd0;cursor:pointer;transition:background .12s}
  button:active{background:rgba(93,186,106,.45)}
  p{font-size:12px;color:rgba(180,220,180,.55);margin:0;text-align:center;line-height:1.7}
</style>
</head>
<body>
  <h1>🏪 真夜中FM入店音 B→G</h1>
  <button id="play">▶ 再生</button>
  <p>emoji-niwa の入店音だけを抽出したプレビューです。<br>タップ／クリックで再生（音声はユーザー操作内で開始されます）。</p>
<script>
// 真夜中FM入店音 B→G — drop-in (no deps)
let _c;const _a=()=>_c||=new(window.AudioContext||webkitAudioContext)();
let _m,_w,_v;
function _bus(){if(_m)return _m;const a=_a();_m=a.createGain();_m.gain.value=.55;
 const L=a.sampleRate*2.6,ir=a.createBuffer(2,L,a.sampleRate);
 for(let c=0;c<2;c++){const d=ir.getChannelData(c);for(let i=0;i<L;i++){const t=i/a.sampleRate;
  d[i]=(Math.random()*2-1)*Math.pow(1-i/L,3.2)*(t>.03?1:.25);}}
 _v=a.createConvolver();_v.buffer=ir;_w=a.createGain();_w.gain.value=.4;
 const dr=a.createGain();dr.gain.value=1;
 _m.connect(dr).connect(a.destination);_m.connect(_v).connect(_w).connect(a.destination);return _m;}
function _bell(f,t,dur,idx,pk){const a=_a();
 const c=a.createOscillator();c.type='sine';c.frequency.value=f;
 const m=a.createOscillator();m.type='sine';m.frequency.value=f*2.74;
 const mg=a.createGain();mg.gain.setValueAtTime(idx,t);
 mg.gain.exponentialRampToValueAtTime(.5,t+dur*.55);m.connect(mg).connect(c.frequency);
 const g=a.createGain();g.gain.setValueAtTime(.0001,t);
 g.gain.exponentialRampToValueAtTime(pk,t+.014);g.gain.exponentialRampToValueAtTime(.0001,t+dur);
 c.connect(g).connect(_bus());m.start(t);c.start(t);m.stop(t+dur+.1);c.stop(t+dur+.1);}
function playEntranceChime(){const a=_a();if(a.state==='suspended')a.resume();
 const t=a.currentTime+.05, root=493.88;
 _bell(root,t,1.70,40,.5);
 _bell(root*0.7937,t+0.52,1.95,34,.46);}
document.getElementById('play').addEventListener('click', playEntranceChime);
</script>
</body>
</html>
