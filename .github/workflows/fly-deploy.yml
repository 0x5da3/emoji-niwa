name: Deploy server to Fly.io

# 多人数バックエンド（server/）を Fly.io へデプロイ。
# iOS だけでも運用可: GitHub の Secret に FLY_API_TOKEN を入れ、
# server/ を変更して push するか、このワークフローを手動実行するだけ。
#
# 事前準備（一度きり・server/README 参照）:
#   1. Fly アプリ作成 + ボリューム niwa_data 作成（同リージョン）
#   2. Fly app secrets: GH_CLIENT_ID / GH_CLIENT_SECRET / APP_URL / PUBLIC_BASE
#   3. GitHub repo secret: FLY_API_TOKEN（App スコープ Deploy トークン推奨）

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/fly-deploy.yml'
  workflow_dispatch: {}

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy (remote build — no Docker on runner)
        working-directory: server
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
