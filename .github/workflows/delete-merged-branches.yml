name: delete-merged-branches (one-shot)

on:
  push:
    branches:
      - claude/delete-merged-branches-MnE0Q
  workflow_dispatch:

permissions:
  contents: write

jobs:
  delete:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
    steps:
      - name: Delete merged branches
        run: |
          set -u
          PROTECTED="main claude/delete-merged-branches-MnE0Q"
          BRANCHES="
          claude/add-terrain-types
          claude/all-people-to-store
          claude/animal-palette-marker
          claude/audio-resume-fix
          claude/chewing-eat-sound
          claude/day-night-life
          claude/fix-visiting-bar-dismiss
          claude/food-movement-consumption-llrHB
          claude/multiplayer-rooms
          claude/munch-subtle
          claude/prepare-work-session-AK6SU
          claude/remove-entrance-chime
          claude/review-main-code-DSLr0
          claude/share-btn-under-sound
          claude/share-url-shorten
          claude/share-world-url
          claude/store-count-size
          claude/store-scatter-3x3
          claude/weather-random-default
          "
          for b in $BRANCHES; do
            for p in $PROTECTED; do
              if [ "$b" = "$p" ]; then
                echo "PROTECTED, skipping: $b"
                continue 2
              fi
            done
            if gh api -X DELETE "repos/$REPO/git/refs/heads/$b" >/dev/null 2>&1; then
              echo "deleted: $b"
            else
              echo "skip (already gone or error): $b"
            fi
          done
