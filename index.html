<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌿 絵文字庭</title>
<style>
:root{--panel:rgba(8,16,10,.93);--border:rgba(120,210,130,.18);--accent:#5dba6a;--accent2:#a8e063;--text:rgba(220,255,220,.88);--dim:rgba(180,220,180,.4)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0a150b;overflow:hidden;font-family:'Hiragino Kaku Gothic ProN','Helvetica Neue',sans-serif;touch-action:none}
#cv{display:block;cursor:crosshair}
#topbar{position:fixed;top:0;left:0;right:0;z-index:30;height:50px;background:var(--panel);border-bottom:1px solid var(--border);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:space-evenly;gap:4px;padding:0 8px;overflow-x:auto;scrollbar-width:none}
#topbar::-webkit-scrollbar{display:none}
#title{font-size:14px;font-weight:700;color:var(--accent2);letter-spacing:.05em;flex:0 0 auto}
.gap{flex:1}
.tbtn{padding:5px 10px;border:1px solid var(--border);background:rgba(255,255,255,.05);border-radius:16px;color:var(--text);font-size:11px;cursor:pointer;white-space:nowrap;flex:0 0 auto;transition:background .12s}
.tbtn:active{background:rgba(93,186,106,.25)}
.tbtn.locked{opacity:0.4;cursor:not-allowed;pointer-events:none}
.nm-preset.active,.sc-preset.active{background:rgba(93,186,106,.35) !important;border-color:rgba(168,224,99,.7) !important;color:#fff;box-shadow:0 0 0 1px rgba(168,224,99,.3)}
.acc-section{background:rgba(255,255,255,.03);border:1px solid rgba(120,210,130,.12);border-radius:10px;margin-bottom:8px;overflow:hidden}
.acc-section:last-child{margin-bottom:0}
.acc-header{width:100%;display:flex;align-items:center;gap:8px;padding:10px 12px;background:none;border:none;cursor:pointer;color:var(--text);text-align:left;transition:background .12s}
.acc-header:active{background:rgba(93,186,106,.12)}
.acc-arrow{display:inline-block;font-size:9px;color:rgba(168,224,99,.7);transition:transform .2s;width:10px;flex:0 0 auto}
.acc-section.open > .acc-header .acc-arrow{transform:rotate(90deg)}
.acc-title{flex:1;font-size:12px;font-weight:600;color:#a8e063;letter-spacing:.03em}
.acc-summary{font-size:10px;color:rgba(180,220,180,.45);flex:0 0 auto}
.acc-section.open > .acc-header .acc-summary{display:none}
.acc-content{display:none;padding:0 12px 12px}
.acc-section.open > .acc-content{display:block;padding-top:10px}
body.fullscreen #topbar,body.fullscreen #modebar,body.fullscreen #cattabs,body.fullscreen #palette-wrap,body.fullscreen #minimap,body.fullscreen #btn-zoom-in,body.fullscreen #btn-zoom-out,body.fullscreen #btn-reset-view,body.fullscreen #btn-3d,body.fullscreen #btn-minimap,body.fullscreen #btn-heights,body.fullscreen #corner-btns,body.fullscreen #toast{display:none !important}
body.fullscreen #map-btns{top:auto;bottom:14px;right:14px}
body.fullscreen #btn-fullscreen{background:rgba(93,186,106,.35);border-color:rgba(168,224,99,.6);color:#fff}
.mapbtn.active{background:rgba(93,186,106,.35);border-color:rgba(168,224,99,.6);color:#fff}

/* 2D/3D toggle pill */
.dim-toggle{width:auto;min-width:64px;height:30px;padding:0 6px;display:flex;align-items:center;gap:4px;border-radius:15px;background:var(--panel)}
.dim-toggle .dim-label{font-size:9px;font-weight:700;letter-spacing:.05em;color:rgba(180,220,180,.4);transition:color .15s}
.dim-toggle.is-2d .dim-2d{color:#a8e063}
.dim-toggle.is-3d .dim-3d{color:#a8e063}
.dim-toggle .dim-track{position:relative;width:22px;height:12px;border-radius:6px;background:rgba(255,255,255,.15);flex:0 0 auto}
.dim-toggle .dim-thumb{position:absolute;top:1px;left:1px;width:10px;height:10px;border-radius:50%;background:#fff;transition:left .18s,background .18s;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.dim-toggle.is-3d .dim-thumb{left:11px;background:#fffce0}
.dim-toggle.is-3d .dim-track{background:rgba(93,186,106,.6)}

/* Heights ON/OFF toggle (same visual language as 2D/3D switch) */
.h-toggle{width:auto;min-width:64px;height:30px;padding:0 8px 0 10px;display:flex;align-items:center;gap:6px;border-radius:15px;background:var(--panel)}
.h-toggle .h-label{font-size:14px;line-height:1}
.h-toggle .h-track{position:relative;width:22px;height:12px;border-radius:6px;background:rgba(255,255,255,.15);flex:0 0 auto;transition:background .18s}
.h-toggle .h-thumb{position:absolute;top:1px;left:1px;width:10px;height:10px;border-radius:50%;background:#fff;transition:left .18s,background .18s;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.h-toggle.is-on .h-thumb{left:11px;background:#fffce0}
.h-toggle.is-on .h-track{background:rgba(93,186,106,.6)}
.h-toggle.disabled{opacity:.4;cursor:not-allowed}
.h-toggle.disabled .h-track{background:rgba(255,255,255,.08)}

/* Toggle switch row */
.fx-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 10px;border:1px solid var(--border);background:rgba(255,255,255,.04);border-radius:10px;color:var(--text);font-size:12px;cursor:pointer;transition:background .12s;text-align:left}
.fx-toggle:active{background:rgba(93,186,106,.12)}
.fx-toggle.locked{opacity:0.4;pointer-events:none}
.fx-toggle-label{flex:1}
.fx-toggle-switch{position:relative;width:34px;height:18px;border-radius:9px;background:rgba(255,255,255,.12);flex:0 0 auto;transition:background .15s}
.fx-toggle-switch::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .15s,background .15s;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.fx-toggle.on .fx-toggle-switch{background:rgba(93,186,106,.7)}
.fx-toggle.on .fx-toggle-switch::after{left:18px;background:#fffce0}
.fx-time-msg{font-size:10px;color:rgba(180,220,180,.45);margin:-3px 0 6px 0;text-align:left;font-style:italic}
.gen-mode-btn{padding:7px 10px;font-size:12px}
.gen-mode-btn.active{background:rgba(93,186,106,.35);border-color:rgba(168,224,99,.7);color:#fff;box-shadow:0 0 0 1px rgba(168,224,99,.3)}
.sc-src-btn{padding:7px 6px;font-size:11px}
.sc-src-btn.active{background:rgba(93,186,106,.35);border-color:rgba(168,224,99,.7);color:#fff;box-shadow:0 0 0 1px rgba(168,224,99,.3)}
.sound-opt{padding:6px 4px;font-size:10px;line-height:1.2}
.sound-opt.active{background:rgba(93,186,106,.35);border-color:rgba(168,224,99,.7);color:#fff;box-shadow:0 0 0 1px rgba(168,224,99,.3)}
.autosave-opt{padding:6px 2px;font-size:10px;line-height:1.2}
.autosave-opt.active,.fps-opt.active{background:rgba(93,186,106,.35);border-color:rgba(168,224,99,.7);color:#fff;box-shadow:0 0 0 1px rgba(168,224,99,.3)}
.lang-opt{padding:7px 4px;font-size:11px}
.lang-opt.active{background:rgba(93,186,106,.35);border-color:rgba(168,224,99,.7);color:#fff;box-shadow:0 0 0 1px rgba(168,224,99,.3)}
#minimap{position:fixed;left:10px;bottom:calc(215px + var(--mpch,0px));z-index:27;border:1px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;display:none;background:rgba(8,16,10,.93);backdrop-filter:blur(10px)}
#minimap.visible{display:block}
body.palette-collapsed #palette,body.palette-collapsed #terrain-palette{display:none!important}
#modebar{position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:29;display:flex;background:var(--panel);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.mbtn{padding:5px 13px;font-size:11px;color:var(--dim);background:none;border:none;cursor:pointer;transition:all .12s}
.mbtn.active{background:rgba(93,186,106,.25);color:var(--accent2)}
#cattabs{display:flex;gap:4px;padding:0 0 6px;overflow-x:auto;scrollbar-width:none;flex:1;min-width:0}
#cattabs-row{display:flex;align-items:flex-start;gap:5px}
#btn-palmin{flex:0 0 auto;background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:13px;line-height:1;padding:5px 8px;cursor:pointer}
#cattabs::-webkit-scrollbar{display:none}
.cattab{flex:0 0 auto;padding:3px 10px;font-size:11px;border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,.04);color:var(--dim);cursor:pointer;transition:all .12s}
.cattab.active{background:rgba(93,186,106,.22);color:var(--accent2);border-color:var(--accent)}
#palette-wrap{position:fixed;bottom:0;left:0;right:0;z-index:28;background:var(--panel);border-top:1px solid var(--border);backdrop-filter:blur(14px);padding:6px 8px 14px}
#palette{display:grid;grid-template-columns:repeat(auto-fill,minmax(42px,1fr));gap:5px;grid-auto-rows:42px;height:183px;overflow-y:auto;align-content:start;scroll-snap-type:y mandatory;scrollbar-width:thin;scrollbar-color:rgba(168,224,99,.4) transparent;-webkit-overflow-scrolling:touch}
/* マルチプレイ用チャット（パレット上・既定3行・最小化/拡大可） */
#mp-chat{display:none;flex-direction:column;gap:4px;margin-bottom:6px;border:1px solid rgba(120,210,130,.3);border-radius:10px;background:rgba(8,20,10,.55);padding:5px 6px}
#mpc-head{display:flex;align-items:center;gap:10px;font-size:11px;color:#a8e063}
#mpc-head .mpc-t{flex:1;font-weight:700}
#mpc-head button{background:rgba(120,210,130,.18);border:1px solid rgba(120,210,130,.3);color:#cfeecb;border-radius:6px;font-size:11px;line-height:1;padding:3px 14px;min-width:36px;text-align:center;cursor:pointer}
#mpc-log{height:54px;overflow-y:auto;font-size:12px;line-height:1.45;color:#e9f5e5;word-break:break-word;scrollbar-width:thin}
#mp-chat.exp #mpc-log{height:min(42vh,260px)}
#mp-chat.min #mpc-log,#mp-chat.min #mpc-inrow{display:none}
#mpc-log .ts{color:rgba(180,220,180,.5);margin-right:5px;font-variant-numeric:tabular-nums}
#mpc-log .nm{color:#a8e063;font-weight:700;margin-right:4px}
#mpc-log .sys{color:rgba(168,224,99,.7);font-style:italic}
#mpc-inrow{display:flex;gap:5px}
#mpc-in{flex:1;min-width:0;background:rgba(0,0,0,.3);border:1px solid rgba(120,210,130,.3);color:#fff;border-radius:6px;font-size:13px;padding:5px 7px}
#mpc-send{background:rgba(93,186,106,.5);border:1px solid rgba(168,224,99,.6);color:#fff;border-radius:6px;font-size:12px;padding:5px 10px;cursor:pointer}
#palette .ebtn{scroll-snap-align:start}
#palette::-webkit-scrollbar{width:5px}
#palette::-webkit-scrollbar-thumb{background:rgba(168,224,99,.35);border-radius:3px}
#palette::-webkit-scrollbar-track{background:transparent}
.ebtn{flex:0 0 auto;width:42px;height:42px;font-size:24px;border:2px solid transparent;border-radius:10px;background:rgba(255,255,255,.06);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;outline:none}
.ebtn.active{border-color:var(--accent);background:rgba(93,186,106,.35);box-shadow:0 0 0 1px rgba(168,224,99,.4),inset 0 0 0 1px rgba(168,224,99,.3)}
.ebtn:active{opacity:.7}

/* Rainbow glow for 🏪 button */
.ebtn-rainbow{position:relative;isolation:isolate;animation:ebtn-rainbow-pulse 2.4s ease-in-out infinite}
.ebtn-rainbow::before{content:"";position:absolute;inset:-3px;border-radius:12px;background:conic-gradient(from 0deg,#ff5050,#ff9030,#ffd040,#50d050,#3090ff,#7050d0,#a040c0,#ff5050);filter:blur(6px);opacity:.7;z-index:-1;animation:ebtn-rainbow-spin 3s linear infinite}
.ebtn-rainbow.active::before{opacity:.9;filter:blur(7px)}
@keyframes ebtn-rainbow-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes ebtn-rainbow-pulse{0%,100%{box-shadow:0 0 8px rgba(255,180,255,.35)}50%{box-shadow:0 0 14px rgba(255,180,255,.55)}}
/* Decoration effects for palette buttons (matches placed-emoji fx) */
/* ✨ sparkle — gold star glow */
.ebtn-fx-sparkle{position:relative;isolation:isolate;animation:fx-sparkle-pulse 2s ease-in-out infinite}
.ebtn-fx-sparkle::before{content:"";position:absolute;inset:-2px;border-radius:11px;background:conic-gradient(from 0deg,#ffe680,#fff7d6,#ffd040,#ffffff,#ffe680);filter:blur(5px);opacity:.6;z-index:-1;animation:ebtn-rainbow-spin 4s linear infinite}
.ebtn-fx-sparkle::after{content:"✨";position:absolute;top:-4px;right:-3px;font-size:11px;z-index:1;animation:fx-sparkle-twinkle 1.4s ease-in-out infinite;pointer-events:none}
.ebtn-fx-sparkle.active::before{opacity:.85;filter:blur(6px)}
@keyframes fx-sparkle-pulse{0%,100%{box-shadow:0 0 7px rgba(255,235,150,.4)}50%{box-shadow:0 0 13px rgba(255,245,210,.65)}}
@keyframes fx-sparkle-twinkle{0%,100%{opacity:.4;transform:scale(.8) rotate(0deg)}50%{opacity:1;transform:scale(1.15) rotate(20deg)}}
/* ❄️ snow — cool blue, falling flake marker */
.ebtn-fx-snow{position:relative;isolation:isolate;animation:fx-snow-pulse 2.4s ease-in-out infinite}
.ebtn-fx-snow::before{content:"";position:absolute;inset:-2px;border-radius:11px;background:radial-gradient(circle at 50% 30%,rgba(210,230,255,.7),rgba(170,200,255,.25) 60%,transparent 75%);filter:blur(4px);opacity:.7;z-index:-1}
.ebtn-fx-snow::after{content:"❄️";position:absolute;top:-5px;right:-3px;font-size:10px;z-index:1;animation:fx-snow-fall 2.6s linear infinite;pointer-events:none}
@keyframes fx-snow-pulse{0%,100%{box-shadow:0 0 6px rgba(190,215,255,.35)}50%{box-shadow:0 0 12px rgba(210,230,255,.6)}}
@keyframes fx-snow-fall{0%{opacity:0;transform:translateY(-4px) rotate(0deg)}25%{opacity:1}75%{opacity:1}100%{opacity:0;transform:translateY(6px) rotate(120deg)}}
/* 🕯️ glow — warm flicker */
.ebtn-fx-glow{position:relative;isolation:isolate;animation:fx-glow-flicker 1.3s ease-in-out infinite}
.ebtn-fx-glow::before{content:"";position:absolute;inset:-2px;border-radius:11px;background:radial-gradient(circle,rgba(255,200,120,.65),rgba(255,160,70,.2) 65%,transparent 78%);filter:blur(5px);opacity:.75;z-index:-1;animation:fx-glow-breathe 1.7s ease-in-out infinite}
@keyframes fx-glow-flicker{0%,100%{box-shadow:0 0 7px rgba(255,190,110,.45)}45%{box-shadow:0 0 11px rgba(255,210,150,.6)}70%{box-shadow:0 0 8px rgba(255,190,110,.5)}}
@keyframes fx-glow-breathe{0%,100%{opacity:.6;filter:blur(5px)}50%{opacity:.85;filter:blur(6px)}}
/* 🎄 tree — multi-color LED */
.ebtn-fx-tree{position:relative;isolation:isolate}
.ebtn-fx-tree::before{content:"";position:absolute;inset:-2px;border-radius:11px;background:conic-gradient(from 0deg,#ff5050,#ffd24d,#5ab4ff,#78e678,#ff8cdc,#ff5050);filter:blur(5px);opacity:.55;z-index:-1;animation:ebtn-rainbow-spin 2.5s linear infinite}
.ebtn-fx-tree::after{content:"💡";position:absolute;top:-5px;right:-3px;font-size:10px;z-index:1;animation:fx-tree-blink 0.9s steps(1) infinite;pointer-events:none}
.ebtn-fx-tree.active::before{opacity:.8}
@keyframes fx-tree-blink{0%{opacity:1}50%{opacity:.25}100%{opacity:1}}
/* Animals wander around when placed — flag them in the palette with a stepping 👣 */
.ebtn-animal{position:relative}
.ebtn-animal::after{content:"👣";position:absolute;top:-5px;left:-4px;font-size:10px;line-height:1;z-index:1;pointer-events:none;filter:drop-shadow(0 0 1px rgba(0,0,0,.55));animation:ebtn-animal-step 1.1s ease-in-out infinite}
@keyframes ebtn-animal-step{0%,100%{transform:rotate(-10deg) translateY(0)}50%{transform:rotate(10deg) translateY(-1.5px)}}
/* 🏪 palette button shows the size of the most recently operated store */
.ebtn-store{position:relative}
.store-badge{position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:700;line-height:1;padding:1px 4px;border-radius:6px;background:rgba(8,16,10,.94);color:#a8e063;border:1px solid rgba(168,224,99,.55);pointer-events:none;white-space:nowrap;z-index:2}
/* Event section header inside palette */
#palette.sectioned{scroll-snap-type:y proximity}
#palette.sectioned .ebtn{width:auto;min-width:42px;justify-self:stretch}
.pal-section{grid-column:1/-1;grid-row:auto;height:42px;box-sizing:border-box;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;color:var(--accent2);padding:0 4px;letter-spacing:.04em;scroll-snap-align:start}
.pal-section::before,.pal-section::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(168,224,99,.3),transparent)}
#terrain-palette{display:none;flex-direction:column;gap:6px;padding-top:2px}
#terrain-palette .tp-row-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
#terrain-palette .tp-row-types{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
.tp-btn{padding:8px 4px;font-size:11px;border:1px solid var(--border);background:rgba(255,255,255,.05);border-radius:10px;color:var(--text);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.1;transition:all .12s}
.tp-btn:active{background:rgba(93,186,106,.25)}
.tp-btn.active{background:rgba(93,186,106,.35);border-color:rgba(168,224,99,.7);color:#fff;box-shadow:0 0 0 1px rgba(168,224,99,.3)}
.tp-btn .tp-icon{font-size:18px}
.tp-btn .tp-label{font-weight:600}
.tp-swatch{display:block;width:16px;height:16px;border-radius:4px;border:1px solid rgba(255,255,255,.2)}
.tp-btn-custom{cursor:pointer}
.tp-custom-input{appearance:none;-webkit-appearance:none;width:18px;height:18px;border:1px solid rgba(255,255,255,.25);border-radius:4px;padding:0;background:transparent;cursor:pointer}
.tp-custom-input::-webkit-color-swatch-wrapper{padding:0}
.tp-custom-input::-webkit-color-swatch{border:none;border-radius:3px}
.tp-custom-input::-moz-color-swatch{border:none;border-radius:3px}

/* Weather option checkbox (random pool selector) */
.weather-opt{position:relative;padding-left:24px !important;text-align:left}
.w-check{position:absolute;left:6px;top:50%;transform:translateY(-50%);width:14px;height:14px;border:1.5px solid rgba(168,224,99,.4);border-radius:50%;background:transparent;display:none;align-items:center;justify-content:center;transition:all .12s}
#weather-popup.random-on .w-check{display:flex}
.weather-opt.checked .w-check{background:rgba(93,186,106,.7);border-color:rgba(168,224,99,.9)}
.weather-opt.checked .w-check::after{content:"";width:6px;height:6px;border-radius:50%;background:#fff}
#toast{position:fixed;top:98px;left:50%;transform:translateX(-50%);background:rgba(93,186,106,.88);color:#fff;font-size:12px;padding:6px 16px;border-radius:20px;pointer-events:none;z-index:50;opacity:0;transition:opacity .3s}
#gif-frame-overlay{display:none;position:fixed;inset:0;z-index:60;pointer-events:none}
#gif-frame-sq{position:absolute;border:2px solid rgba(168,224,99,.95);box-shadow:0 0 0 9999px rgba(0,0,0,.55);border-radius:6px;pointer-events:none}
#gif-frame-cap{position:fixed;left:50%;transform:translateX(-50%);top:14px;z-index:61;font-size:12px;color:#a8e063;background:rgba(8,20,10,.92);border:1px solid rgba(120,210,130,.3);border-radius:10px;padding:6px 12px;white-space:nowrap}
#gif-frame-bar{position:fixed;left:50%;transform:translateX(-50%);bottom:24px;z-index:61;display:flex;gap:10px;align-items:center;background:rgba(8,20,10,.97);border:1px solid rgba(120,210,130,.3);border-radius:14px;padding:10px 14px;backdrop-filter:blur(14px);pointer-events:auto}
#gif-frame-bar .tbtn{padding:8px 16px}
#btn-gif-ok{background:rgba(93,186,106,.3);border-color:rgba(168,224,99,.6)}
#gen-popup{display:none;position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:35;background:rgba(8,20,10,.97);border:1px solid rgba(120,210,130,.25);border-radius:14px;padding:10px;backdrop-filter:blur(16px);width:320px;max-width:94vw;max-height:82vh;overflow-y:auto;box-shadow:0 8px 28px rgba(0,0,0,.5)}
#map-btns{position:fixed;right:10px;top:60px;z-index:27;display:grid;grid-template-columns:repeat(2,36px);gap:6px;justify-items:center}
#map-btns #btn-3d{grid-column:1/-1;width:auto;min-width:76px;box-sizing:border-box;justify-content:center;height:30px;justify-self:center;margin-top:2px}
#map-btns #btn-heights{grid-column:1/-1;width:auto;min-width:76px;box-sizing:border-box;justify-content:center;height:30px;justify-self:center}
#corner-btns{position:fixed;left:8px;top:56px;z-index:27;display:flex;flex-direction:column;gap:6px}
#corner-btns .tbtn{width:46px;text-align:center;background:var(--panel);backdrop-filter:blur(10px)}
#btn-room{position:relative}
#mp-count-badge{display:none;position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;line-height:1;padding:1px 5px;border-radius:7px;background:rgba(8,16,10,.94);color:#a8e063;border:1px solid rgba(168,224,99,.55);pointer-events:none;white-space:nowrap;z-index:2}
#btn-save{position:relative}

<body>
<canvas id="cv"></canvas>

<div id="topbar">

  <button class="tbtn" id="weather-btn" data-i18n="weatherBtn">☀️ 天気</button>

  <button class="tbtn" id="btn-gen" data-i18n="gen">🎲 生成</button>
  <button class="tbtn" id="btn-effects" data-i18n="effects">✨ 演出</button>
</div>

<!-- Settings / Save / Sound — vertical stack under the top-left -->
<div id="corner-btns">
  <button class="tbtn" id="btn-menu" data-i18n-title="ttSettings" title="設定">⚙️</button>
  <button class="tbtn" id="btn-save" data-i18n-title="ttSave" title="保存">💾</button>
  <button class="tbtn" id="sound-btn" data-i18n-title="ttSound" title="サウンド">🔇</button>
  <button class="tbtn" id="btn-gif" data-i18n-title="ttGif" title="GIF書き出し">📸</button>
  <button class="tbtn" id="btn-share" data-i18n-title="share" title="共有リンク">🔗</button>
  <button class="tbtn" id="btn-room" data-i18n-title="ttRoom" title="マルチプレイ">👥<span id="mp-count-badge"></span></button>
</div>

<!-- WEATHER POPUP -->

<div id="weather-popup" style="display:none;position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:36;background:rgba(8,20,10,.97);border:1px solid rgba(120,210,130,.25);border-radius:14px;padding:14px;backdrop-filter:blur(16px);min-width:280px;max-height:80vh;overflow-y:auto">
  <!-- Random toggle -->
  <button class="h-toggle" id="weather-random-toggle" style="width:100%;justify-content:space-between;padding:8px 12px;height:36px;margin-bottom:10px">
    <span style="font-size:12px;font-weight:600;color:var(--accent2)" data-i18n="weatherRandom">🎲 ランダム切替</span>
    <span class="h-track"><span class="h-thumb"></span></span>
  </button>
  <div id="weather-random-hint" data-i18n="weatherRandomHint" style="font-size:10px;color:rgba(180,220,180,.5);margin:-6px 2px 8px;display:none">候補から30〜60秒ごとに切替（タップで候補を選択）</div>
  <div data-i18n="weatherSelect" style="font-size:12px;color:rgba(180,220,180,.7);margin-bottom:10px;text-align:center">天気を選択</div>
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px">
    <button class="tbtn weather-opt" data-weather="clear"><span class="w-check"></span><span data-i18n="w.clear">☀️ 晴れ</span></button>
    <button class="tbtn weather-opt" data-weather="rain"><span class="w-check"></span><span data-i18n="w.rain">🌧 雨</span></button>
    <button class="tbtn weather-opt" data-weather="snow"><span class="w-check"></span><span data-i18n="w.snow">❄️ 雪</span></button>
    <button class="tbtn weather-opt" data-weather="thunder"><span class="w-check"></span><span data-i18n="w.thunder">⛈ 雷雨</span></button>
    <button class="tbtn weather-opt" data-weather="hail"><span class="w-check"></span><span data-i18n="w.hail">🧊 雹</span></button>
    <button class="tbtn weather-opt" data-weather="sandstorm"><span class="w-check"></span><span data-i18n="w.sandstorm">🏜 砂嵐</span></button>
    <button class="tbtn weather-opt" data-weather="sakura"><span class="w-check"></span><span data-i18n="w.sakura">🌸 桜吹雪</span></button>
    <button class="tbtn weather-opt" data-weather="leaves"><span class="w-check"></span><span data-i18n="w.leaves">🍂 紅葉</span></button>
  </div>
</div>

<!-- TIME POPUP -->

<div id="time-popup" style="display:none;position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:36;background:rgba(8,20,10,.97);border:1px solid rgba(120,210,130,.25);border-radius:14px;padding:14px;backdrop-filter:blur(16px);min-width:260px;max-width:92vw">

  <input type="range" id="time-slider" min="0" max="1439" value="720" step="10" style="width:100%;accent-color:#5dba6a;margin-bottom:10px">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px">
    <button class="tbtn time-preset" data-min="0">🌃 00</button>
    <button class="tbtn time-preset" data-min="360">🌅 06</button>
    <button class="tbtn time-preset" data-min="540">☀️ 09</button>
    <button class="tbtn time-preset" data-min="720">🌞 12</button>
    <button class="tbtn time-preset" data-min="900">🌤 15</button>
    <button class="tbtn time-preset" data-min="1080">🌇 18</button>
    <button class="tbtn time-preset" data-min="1260">🌙 21</button>
    <button class="tbtn time-preset" data-min="1380">✨ 23</button>
  </div>
  <div style="border-top:1px solid rgba(120,210,130,.15);padding-top:10px;text-align:center">
    <button class="tbtn" id="time-toggle-pause">⏸ 時間を止める</button>
  </div>
</div>

<!-- SETTINGS MENU POPUP -->

<div id="menu-popup" style="display:none;position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:36;background:rgba(8,20,10,.97);border:1px solid rgba(120,210,130,.25);border-radius:14px;padding:14px;backdrop-filter:blur(16px);min-width:260px">

    <button class="tbtn" id="btn-newmap" data-i18n="newMap">🆕 新規マップ</button>
    <button class="tbtn" id="btn-clear-all" data-i18n="clearAll">🗑 全リセット</button>
  </div>
  <div style="border-top:1px solid rgba(120,210,130,.15);margin-top:10px;padding-top:10px">
    <div data-i18n="autosaveInterval" style="font-size:11px;color:rgba(180,220,180,.6);margin-bottom:6px">💾 オートセーブ間隔</div>
    <div id="autosave-opts" style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px"></div>
  </div>
  <div style="border-top:1px solid rgba(120,210,130,.15);margin-top:10px;padding-top:10px">
    <div data-i18n="fpsLabel" style="font-size:11px;color:rgba(180,220,180,.6);margin-bottom:6px">🎞️ フレームレート</div>
    <div id="fps-opts" style="display:grid;grid-template-columns:repeat(2,1fr);gap:5px"></div>
  </div>
  <div style="border-top:1px solid rgba(120,210,130,.15);margin-top:10px;padding-top:10px">
    <div data-i18n="langLabel" style="font-size:11px;color:rgba(180,220,180,.6);margin-bottom:6px">🌐 言語 / Language</div>
    <div id="lang-opts" style="display:grid;grid-template-columns:repeat(2,1fr);gap:5px">
      <button class="tbtn lang-opt" data-lang="ja">🇯🇵 日本語</button>
      <button class="tbtn lang-opt" data-lang="en">🇺🇸 English</button>
    </div>
  </div>
</div>

<!-- SOUND POPUP -->

<div id="sound-popup" style="display:none;position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:36;background:rgba(8,20,10,.97);border:1px solid rgba(120,210,130,.25);border-radius:14px;padding:14px;backdrop-filter:blur(16px);min-width:260px;max-height:80vh;overflow-y:auto">
  <!-- Mute toggle -->
  <button class="h-toggle" id="mute-toggle" style="width:100%;justify-content:space-between;padding:8px 12px;height:36px;margin-bottom:10px">
    <span style="font-size:12px;font-weight:600;color:var(--accent2)" id="mute-toggle-label">🔇 ミュート中</span>
    <span class="h-track"><span class="h-thumb"></span></span>
  </button>
  <div data-i18n="placementSound" style="font-size:12px;color:rgba(180,220,180,.7);margin-bottom:10px;text-align:center">配置時の効果音</div>
  <div id="sound-options" style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px">
    <button class="tbtn sound-opt active" data-sound="pon" data-i18n="s.pon">🫧 ポンッ</button>
    <button class="tbtn sound-opt" data-sound="koto" data-i18n="s.koto">🪵 コトッ</button>
    <button class="tbtn sound-opt" data-sound="poyon" data-i18n="s.poyon">🟢 ぽよん</button>
    <button class="tbtn sound-opt" data-sound="fuwa" data-i18n="s.fuwa">☁️ ふわっ</button>
    <button class="tbtn sound-opt" data-sound="tin" data-i18n="s.tin">🔔 ティン</button>
    <button class="tbtn sound-opt" data-sound="pata" data-i18n="s.pata">📄 ぱた</button>
    <button class="tbtn sound-opt" data-sound="pofu" data-i18n="s.pofu">🧸 ぽふ</button>
    <button class="tbtn sound-opt" data-sound="chari" data-i18n="s.chari">🪙 ちゃり</button>
    <button class="tbtn sound-opt" data-sound="none" data-i18n="s.none">🚫 なし</button>
  </div>
</div>

<!-- GIF CAPTURE-FRAME OVERLAY (📸 で撮影範囲を提示→OKで実行) -->

<div id="gif-frame-overlay">
  <div id="gif-frame-sq"></div>
  <div id="gif-frame-cap" data-i18n="gifFrameHint">📸 この範囲がGIFになります</div>
  <div id="gif-frame-bar">
    <button class="tbtn" id="btn-gif-cancel" data-i18n="gifFrameCancel">キャンセル</button>
    <button class="tbtn" id="btn-gif-ok" data-i18n="gifFrameOk">📸 GIFを作成</button>
  </div>
</div>

<!-- EFFECTS POPUP -->

<div id="fx-popup" style="display:none;position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:36;background:rgba(8,20,10,.97);border:1px solid rgba(120,210,130,.25);border-radius:14px;padding:12px;backdrop-filter:blur(16px);min-width:260px;max-width:92vw;max-height:80vh;overflow-y:auto">

    <button class="fx-toggle fx-night" id="fx-aurora"><span class="fx-toggle-label"><span data-i18n="fx.aurora">🌌 オーロラ</span></span><span class="fx-toggle-switch"></span></button>
    <button class="fx-toggle fx-night" id="fx-fireworks"><span class="fx-toggle-label"><span data-i18n="fx.fireworks">🎆 花火</span> <span style="font-size:9px;opacity:.7;margin-left:2px">🎵</span></span><span class="fx-toggle-switch"></span></button>
  </div>
  <div id="fx-day-label" style="font-size:11px;color:rgba(180,220,180,.5);margin-bottom:6px">☀️ 昼の演出</div>

    <button class="fx-toggle fx-day" id="fx-bubbles"><span class="fx-toggle-label"><span data-i18n="fx.bubbles">🫧 シャボン玉</span> <span style="font-size:9px;opacity:.7;margin-left:2px">👆🎵</span></span><span class="fx-toggle-switch"></span></button>
    <button class="fx-toggle fx-day" id="fx-mist"><span class="fx-toggle-label"><span data-i18n="fx.mist">🌫 朝霧</span></span><span class="fx-toggle-switch"></span></button>
  </div>
</div>

<!-- NEW MAP POPUP -->

<div id="newmap-popup" style="display:none;position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:36;background:rgba(8,20,10,.97);border:1px solid rgba(120,210,130,.25);border-radius:16px;padding:16px;backdrop-filter:blur(16px);width:320px;max-width:94vw;max-height:82vh;overflow-y:auto">

  <div style="display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.03);border:1px solid rgba(120,210,130,.12);border-radius:12px;padding:12px;margin-bottom:14px">
    <canvas id="nm-preview" width="100" height="100" style="background:#1a2a1d;border-radius:6px;display:block"></canvas>
    <div style="flex:1">
      <div id="nm-size" style="font-size:28px;font-weight:800;color:#a8e063;line-height:1">10×10</div>
      <div id="nm-cells" style="font-size:11px;color:rgba(180,220,180,.55);margin-top:4px">100 マス</div>
      <div id="nm-label" style="font-size:11px;color:rgba(180,220,180,.4);margin-top:2px">🌾 小さめ</div>
    </div>
  </div>
  <input type="range" id="nm-slider" min="5" max="50" value="10" step="1" style="width:100%;accent-color:#5dba6a;margin-bottom:14px">
  <div data-i18n="presets" style="font-size:10px;color:rgba(180,220,180,.5);margin-bottom:6px">プリセット</div>
  <div id="nm-presets" style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:16px"></div>
  <div style="display:flex;gap:8px;border-top:1px solid rgba(120,210,130,.12);padding-top:12px">
    <button class="tbtn" id="nm-cancel" data-i18n="cancel" style="flex:1;padding:9px">キャンセル</button>
    <button class="tbtn" id="nm-create" data-i18n="create" style="flex:2;padding:9px;background:rgba(93,186,106,.45);border-color:rgba(168,224,99,.6);color:#fff;font-weight:700">✨ 作成する</button>
  </div>
</div>

<div id="modebar">
  <button class="mbtn active" id="mode-place" data-i18n="modePlace">✏️ 配置</button>
  <button class="mbtn" id="mode-terrain" data-i18n="modeTerrain">🎨 地形</button>
  <button class="mbtn" id="mode-erase" data-i18n="modeErase">🧹 消去</button>
</div>

<div id="toast"></div>
<div id="visiting-bar" style="display:none;position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:48;background:rgba(8,20,10,.97);border:1px solid rgba(120,210,130,.3);border-radius:14px;padding:10px 14px;backdrop-filter:blur(16px);max-width:92vw;text-align:center">
  <div id="visiting-text" data-i18n="visiting.title" style="font-size:12px;color:#a8e063;margin-bottom:8px">👀 共有された箱庭を閲覧中（自動保存は停止中）</div>
  <div style="display:flex;gap:6px;justify-content:center">
    <button class="tbtn" id="btn-visit-back" data-i18n="visiting.back">↩ 自分の箱庭に戻る</button>
    <button class="tbtn" id="btn-visit-keep" data-i18n="visiting.keep">💾 これを自分のものに</button>
  </div>
</div>
<div id="mp-bar" style="display:none;position:fixed;left:8px;top:60px;z-index:35;background:rgba(8,20,10,.97);border:1px solid rgba(120,210,130,.3);border-radius:14px;padding:10px 12px;backdrop-filter:blur(16px);max-width:min(80vw,240px);text-align:left">
  <div id="mp-text" style="font-size:12px;color:#a8e063;margin-bottom:8px"></div>
  <div id="mp-actions" style="display:flex;flex-direction:column;gap:6px"></div>
</div>

<div id="gen-popup">
  <div class="acc-section open">
    <button class="acc-header" data-acc="land">
      <span class="acc-arrow">▶</span>
      <span class="acc-title" data-i18n="genLand">🗺 土地の生成</span>
      <span class="acc-summary" id="acc-summary-land">平らな地形</span>
    </button>
    <div class="acc-content">
      <div data-i18n="terrainTypeLabel" style="font-size:10px;color:rgba(180,220,180,.55);margin-bottom:6px">地形のタイプ</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">
        <button class="tbtn gen-mode-btn" id="gen-mode-flat" data-i18n="genFlat">⬜ 平らな地形</button>
        <button class="tbtn gen-mode-btn active" id="gen-mode-height" data-i18n="genHilly">⛰ 起伏あり</button>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
        <span data-i18n="aeLabel" style="font-size:10px;color:rgba(180,220,180,.55);white-space:nowrap">🌳 地形に合った絵文字</span>
        <button class="tbtn ae-on-btn active" id="ae-on" style="padding:4px 7px">ON</button>

        <input type="range" id="ae-slider" min="0" max="100" value="30" step="5" style="flex:1;min-width:36px;accent-color:#5dba6a">

      </div>
      <div class="acc-section open" style="margin-top:10px">
        <button class="acc-header" data-sub="map">
          <span class="acc-arrow">▶</span>
          <span class="acc-title" data-i18n="selectMap">マップを選択</span>
        </button>
        <div class="acc-content">
          <div id="gen-btns" style="margin-bottom:8px"></div>

        <div class="acc-content">
          <div id="solid-presets" style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px"></div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="acc-section">
    <button class="acc-header" data-acc="scatter">
      <span class="acc-arrow">▶</span>
      <span class="acc-title" data-i18n="scatterTitle">🎲 ランダム配置</span>
      <span class="acc-summary" id="acc-summary-scatter">20個</span>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">
        <button class="tbtn sc-src-btn active" id="sc-src-all" data-i18n="scAll">🗂 全カテゴリ</button>
        <button class="tbtn sc-src-btn" id="sc-src-recent" data-i18n="scRecent">📌 履歴から</button>

    </div>
    <div id="mpc-log"></div>
    <div id="mpc-inrow">
      <input id="mpc-in" type="text" maxlength="400" autocomplete="off" data-i18n-ph="chat.ph" placeholder="メッセージ…">
      <button id="mpc-send" type="button" data-i18n="chat.send">送信</button>
    </div>
  </div>
  <div id="cattabs-row">
    <button id="btn-palmin" type="button" data-i18n-title="ttPalette" title="パレットの最小化">▾</button>
    <div id="cattabs"></div>

<script>
// ═══════════════════════════════════════════
// KAWAII SOUNDS (drop-in)
// ═══════════════════════════════════════════
const KawaiiSounds = (function(){
  let ctx, master, _noise;
  function ac(){ return ctx ||= new (window.AudioContext || window.webkitAudioContext)(); }
  function getMaster(){
    if(master) return master;
    const a = ac();
    const g = a.createGain();
    g.gain.value = 0.85;
    g.connect(a.destination);
    master = g;
    return g;
  }
  function noiseBuffer(){
    if(_noise) return _noise;
    const a = ac();
    const len = a.sampleRate * 1.0;
    const buf = a.createBuffer(1, len, a.sampleRate);
    const d = buf.getChannelData(0);
    for(let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    _noise = buf;
    return buf;
  }
  function env(node, t0, { a = 0.005, d = 0.15, peak = 0.6 } = {}){
    const g = node.gain;
    g.cancelScheduledValues(t0);
    g.setValueAtTime(0.0001, t0);
    g.exponentialRampToValueAtTime(peak, t0 + a);
    g.exponentialRampToValueAtTime(0.0001, t0 + a + d);
  }
  const sounds = {
    pon(){
      const a = ac(), t = a.currentTime;
      const osc = a.createOscillator();
      const g = a.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(420, t);
      osc.frequency.exponentialRampToValueAtTime(880, t + 0.08);
      env(g, t, { a: 0.004, d: 0.18, peak: 0.55 });
      osc.connect(g).connect(getMaster());
      osc.start(t); osc.stop(t + 0.25);
      const click = a.createBufferSource();
      click.buffer = noiseBuffer();
      const cg = a.createGain();
      const bp = a.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 2400; bp.Q.value = 4;
      env(cg, t, { a: 0.001, d: 0.04, peak: 0.18 });
      click.connect(bp).connect(cg).connect(getMaster());
      click.start(t); click.stop(t + 0.1);
    },
    koto(){
      const a = ac(), t = a.currentTime;
      const osc = a.createOscillator();
      const g = a.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(220, t);
      osc.frequency.exponentialRampToValueAtTime(110, t + 0.09);
      env(g, t, { a: 0.002, d: 0.12, peak: 0.7 });
      osc.connect(g).connect(getMaster());
      osc.start(t); osc.stop(t + 0.2);
      const src = a.createBufferSource(); src.buffer = noiseBuffer();
      const hp = a.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 1200;
      const cg = a.createGain();
      env(cg, t, { a: 0.001, d: 0.05, peak: 0.22 });
      src.connect(hp).connect(cg).connect(getMaster());
      src.start(t); src.stop(t + 0.08);
    },
    poyon(){
      const a = ac(), t = a.currentTime;
      const osc = a.createOscillator();
      const g = a.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(330, t);
      osc.frequency.exponentialRampToValueAtTime(740, t + 0.09);
      osc.frequency.exponentialRampToValueAtTime(440, t + 0.28);
      env(g, t, { a: 0.005, d: 0.32, peak: 0.55 });
      osc.connect(g).connect(getMaster());
      osc.start(t); osc.stop(t + 0.4);
    },
    fuwa(){
      const a = ac(), t = a.currentTime;
      const src = a.createBufferSource(); src.buffer = noiseBuffer();
      const lp = a.createBiquadFilter(); lp.type = 'lowpass';
      lp.frequency.setValueAtTime(800, t);
      lp.frequency.exponentialRampToValueAtTime(2200, t + 0.25);
      const ng = a.createGain();
      env(ng, t, { a: 0.04, d: 0.4, peak: 0.18 });
      src.connect(lp).connect(ng).connect(getMaster());
      src.start(t); src.stop(t + 0.5);
      const osc = a.createOscillator();
      const g = a.createGain();

      osc.frequency.setValueAtTime(520, t);

    // ティン — small cute bell
    tin(){

      const g2 = a.createGain();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(2640, t);
      env(g2, t, { a: 0.001, d: 0.18, peak: 0.18 });
      osc2.connect(g2).connect(getMaster());
      osc2.start(t); osc2.stop(t + 0.25);
    },
    // ぱた — paper-fall, light tap
    pata(){

      const osc = a.createOscillator();

      osc.frequency.setValueAtTime(180, t);

      const bp = a.createBiquadFilter();

    },
    // ぽふ — soft cushion landing
    pofu(){
      const a = ac(), t = a.currentTime;
      // Warm low body
      const osc = a.createOscillator();
      const g = a.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(160, t);
      osc.frequency.exponentialRampToValueAtTime(95, t + 0.12);
      env(g, t, { a: 0.005, d: 0.18, peak: 0.55 });
      osc.connect(g).connect(getMaster());
      osc.start(t); osc.stop(t + 0.25);
      // Soft cushion air
      const src = a.createBufferSource(); src.buffer = noiseBuffer();
      const lp = a.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 700;
      const ng = a.createGain();
      env(ng, t, { a: 0.005, d: 0.12, peak: 0.20 });

    },
    // むしゃむしゃ — 控えめで上品な咀嚼（こもった柔らかいタップ2回）
    munch(){
      const a = ac(), t0 = a.currentTime;
      const bites = 2;
      for(let i = 0; i < bites; i++){
        const t = t0 + i * (0.095 + Math.random() * 0.025);
        // こもったタップ：ローパスノイズのみ（明るいクランチ無し）、低音量
        const src = a.createBufferSource(); src.buffer = noiseBuffer();
        const lp = a.createBiquadFilter();
        lp.type = 'lowpass';
        lp.frequency.value = 460 + Math.random() * 120;
        const ng = a.createGain();
        env(ng, t, { a: 0.004, d: 0.045 + Math.random() * 0.015, peak: 0.12 });
        src.connect(lp).connect(ng).connect(getMaster());
        src.start(t); src.stop(t + 0.09);
        // ごく弱い柔らかな低音ボディ（噛む重みをほのかに）
        const osc = a.createOscillator();
        const g = a.createGain();
        osc.type = 'sine';
        const f = 105 + Math.random() * 20;
        osc.frequency.setValueAtTime(f, t);
        osc.frequency.exponentialRampToValueAtTime(f * 0.7, t + 0.05);
        env(g, t, { a: 0.004, d: 0.05, peak: 0.08 });
        osc.connect(g).connect(getMaster());
        osc.start(t); osc.stop(t + 0.1);
      }
    },
    // ちゃり — light coin/clink
    chari(){
      const a = ac(), t = a.currentTime;
      // Two-tone metallic ping
      const osc1 = a.createOscillator();
      const g1 = a.createGain();
      osc1.type = 'triangle';
      osc1.frequency.setValueAtTime(880, t);
      env(g1, t, { a: 0.001, d: 0.14, peak: 0.35 });
      osc1.connect(g1).connect(getMaster());
      osc1.start(t); osc1.stop(t + 0.2);
      const osc2 = a.createOscillator();
      const g2 = a.createGain();
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(1320, t + 0.015);
      env(g2, t + 0.015, { a: 0.001, d: 0.12, peak: 0.28 });
      osc2.connect(g2).connect(getMaster());
      osc2.start(t + 0.015); osc2.stop(t + 0.2);
      // Short metallic shimmer
      const src = a.createBufferSource(); src.buffer = noiseBuffer();
      const hp = a.createBiquadFilter();
      hp.type = 'highpass'; hp.frequency.value = 3000;
      const ng = a.createGain();
      env(ng, t, { a: 0.001, d: 0.05, peak: 0.12 });
      src.connect(hp).connect(ng).connect(getMaster());
      src.start(t); src.stop(t + 0.08);
    },
    // ── Firework launch: 4 variants (all 遠くでかすか style) ──
    // Soft, distant, muffled 笛 whistle. Doppler pitch-fall, lowpass
    // for distance haze, gentle volume. Variations differ in distance
    // feel and duration. #3 is the original reference, kept as-is.
    // 1: やや近めの遠花火 (closer-ish distant — ヒューゥ↘)
    fwLaunch1(){
      const a = ac(), t = a.currentTime;
      const dur = 1.15;
      const osc = a.createOscillator();
      const g = a.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(1350, t);
      osc.frequency.exponentialRampToValueAtTime(1600, t + 0.15);
      osc.frequency.exponentialRampToValueAtTime(760, t + dur);
      const bp = a.createBiquadFilter();
      bp.type = 'bandpass'; bp.Q.value = 7;
      bp.frequency.setValueAtTime(1500, t);
      bp.frequency.exponentialRampToValueAtTime(800, t + dur);
      const lp = a.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 2400;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.11, t + 0.18);
      g.gain.exponentialRampToValueAtTime(0.03, t + dur);
      osc.connect(bp).connect(lp).connect(g).connect(getMaster());
      osc.start(t); osc.stop(t + dur + 0.05);
    },
    // 2: 短く遠い (short distant — ヒュッ↘)
    fwLaunch2(){
      const a = ac(), t = a.currentTime;
      const dur = 0.75;
      const osc = a.createOscillator();
      const g = a.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(1300, t);
      osc.frequency.exponentialRampToValueAtTime(1500, t + 0.1);
      osc.frequency.exponentialRampToValueAtTime(800, t + dur);
      const bp = a.createBiquadFilter();
      bp.type = 'bandpass'; bp.Q.value = 7;
      bp.frequency.setValueAtTime(1450, t);
      bp.frequency.exponentialRampToValueAtTime(850, t + dur);
      const lp = a.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 2100;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.10, t + 0.12);
      g.gain.exponentialRampToValueAtTime(0.028, t + dur);
      osc.connect(bp).connect(lp).connect(g).connect(getMaster());
      osc.start(t); osc.stop(t + dur + 0.05);
    },
    // 3: 遠くでかすか (original distant reference — keep as-is)
    fwLaunch3(){
      const a = ac(), t = a.currentTime;
      const dur = 1.3;
      const osc = a.createOscillator();
      const g = a.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(1200, t);
      osc.frequency.exponentialRampToValueAtTime(1450, t + 0.15);
      osc.frequency.exponentialRampToValueAtTime(680, t + dur);
      const bp = a.createBiquadFilter();
      bp.type = 'bandpass'; bp.Q.value = 7;
      bp.frequency.setValueAtTime(1350, t);
      bp.frequency.exponentialRampToValueAtTime(720, t + dur);
      const lp = a.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 2000;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.09, t + 0.2);
      g.gain.exponentialRampToValueAtTime(0.025, t + dur);
      osc.connect(bp).connect(lp).connect(g).connect(getMaster());
      osc.start(t); osc.stop(t + dur + 0.05);
    },
    // 4: とても遠い余韻 (very distant, long haze — ヒュ〜ゥ↘)
    fwLaunch4(){
      const a = ac(), t = a.currentTime;
      const dur = 1.6;
      const osc = a.createOscillator();
      const g = a.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(1050, t);
      osc.frequency.exponentialRampToValueAtTime(1250, t + 0.2);
      osc.frequency.exponentialRampToValueAtTime(560, t + dur);
      const bp = a.createBiquadFilter();
      bp.type = 'bandpass'; bp.Q.value = 8;
      bp.frequency.setValueAtTime(1200, t);
      bp.frequency.exponentialRampToValueAtTime(600, t + dur);
      const lp = a.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 1600;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.07, t + 0.25);
      g.gain.exponentialRampToValueAtTime(0.02, t + dur);
      osc.connect(bp).connect(lp).connect(g).connect(getMaster());
      osc.start(t); osc.stop(t + dur + 0.05);
    },
    // ── Firework explosion: 3 variants (low, no sparkle) ──
    // 1: deep punchy burst (低く重い破裂)
    fwBoom1(){
      const a = ac(), t = a.currentTime;
      const osc = a.createOscillator();
      const g = a.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(110, t);
      osc.frequency.exponentialRampToValueAtTime(38, t + 0.32);
      env(g, t, { a: 0.002, d: 0.42, peak: 1.0 });
      osc.connect(g).connect(getMaster());
      osc.start(t); osc.stop(t + 0.55);
      // Body burst (low filtered noise)
      const burst = a.createBufferSource(); burst.buffer = noiseBuffer();
      const lp = a.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 700;
      const bg = a.createGain();
      env(bg, t, { a: 0.001, d: 0.3, peak: 0.7 });
      burst.connect(lp).connect(bg).connect(getMaster());
      burst.start(t); burst.stop(t + 0.35);
    },
    // 2: heavy double thud (ズドンと重い二段破裂)
    fwBoom2(){
      const a = ac(), t = a.currentTime;
      const osc = a.createOscillator();
      const g = a.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(95, t);
      osc.frequency.exponentialRampToValueAtTime(35, t + 0.4);
      env(g, t, { a: 0.002, d: 0.5, peak: 0.95 });
      osc.connect(g).connect(getMaster());
      osc.start(t); osc.stop(t + 0.65);
      // First crack
      const burst = a.createBufferSource(); burst.buffer = noiseBuffer();
      const lp = a.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 600;
      const bg = a.createGain();
      env(bg, t, { a: 0.001, d: 0.22, peak: 0.65 });
      burst.connect(lp).connect(bg).connect(getMaster());
      burst.start(t); burst.stop(t + 0.28);
      // Second softer rumble (delayed)
      const osc2 = a.createOscillator();
      const g2 = a.createGain();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(75, t + 0.12);
      osc2.frequency.exponentialRampToValueAtTime(40, t + 0.4);
      env(g2, t + 0.12, { a: 0.005, d: 0.35, peak: 0.45 });
      osc2.connect(g2).connect(getMaster());
      osc2.start(t + 0.12); osc2.stop(t + 0.55);
    },
    // 3: distant low boom (遠くで低く響く)
    fwBoom3(){
      const a = ac(), t = a.currentTime;
      const osc = a.createOscillator();
      const g = a.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(65, t);
      osc.frequency.exponentialRampToValueAtTime(32, t + 0.55);
      env(g, t, { a: 0.04, d: 0.8, peak: 0.75 });
      osc.connect(g).connect(getMaster());
      osc.start(t); osc.stop(t + 1.0);
      const burst = a.createBufferSource(); burst.buffer = noiseBuffer();
      const lp = a.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 280;
      const bg = a.createGain();
      env(bg, t, { a: 0.04, d: 0.65, peak: 0.45 });
      burst.connect(lp).connect(bg).connect(getMaster());
      burst.start(t); burst.stop(t + 0.75);
    },
    // Bubble pop — quick wet pop
    bubblePop(){
      const a = ac(), t = a.currentTime;
      // High pitch quick rise
      const osc = a.createOscillator();
      const g = a.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(700, t);
      osc.frequency.exponentialRampToValueAtTime(1500, t + 0.04);
      env(g, t, { a: 0.002, d: 0.08, peak: 0.4 });
      osc.connect(g).connect(getMaster());
      osc.start(t); osc.stop(t + 0.12);
      // Tiny splash click
      const src = a.createBufferSource(); src.buffer = noiseBuffer();
      const bp = a.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 3500; bp.Q.value = 3;
      const ng = a.createGain();
      env(ng, t, { a: 0.001, d: 0.05, peak: 0.18 });
      src.connect(bp).connect(ng).connect(getMaster());
      src.start(t); src.stop(t + 0.08);
    },
  };
  return {
    play(name){
      if(!sounds[name]) return;
      if(ac().state === 'suspended') ac().resume();
      sounds[name]();
    },
    setVolume(v){ getMaster().gain.value = v; },
    ctx(){ return ac(); },
    resume(){ const c = ac(); if(c.state === 'suspended') c.resume(); },
  };
})();

let muted = true; // master mute (controls all sound)
let selectedSound = 'pon'; // placement sound type
function playPlaceSound(){
  if(muted) return;
  if(selectedSound === 'none') return;
  KawaiiSounds.play(selectedSound);
}
// 動物・人が食べ物を食べたときの効果音（配置音設定とは独立、ミュート尊重）
function playEatSound(){ if(muted) return; KawaiiSounds.play('munch'); }
// 真夜中FM入店音 B→G — drop-in (no deps)。呼び出し側で muted を尊重する
const _a=()=>KawaiiSounds.ctx();   // 単一 AudioContext を共有（resume 経路を一本化）
let _m,_w,_v;
function _bus(){if(_m)return _m;const a=_a();_m=a.createGain();_m.gain.value=.55;
 const L=a.sampleRate*2.6,ir=a.createBuffer(2,L,a.sampleRate);
 for(let c=0;c<2;c++){const d=ir.getChannelData(c);for(let i=0;i<L;i++){const t=i/a.sampleRate;
  d[i]=(Math.random()*2-1)*Math.pow(1-i/L,3.2)*(t>.03?1:.25);}}
 _v=a.createConvolver();_v.buffer=ir;_w=a.createGain();_w.gain.value=.4;
 const dr=a.createGain();dr.gain.value=1;
 _m.connect(dr).connect(a.destination);_m.connect(_v).connect(_w).connect(a.destination);return _m;}
function _bell(f,t,dur,idx,pk){const a=_a();
 const c=a.createOscillator();c.type='sine';c.frequency.value=f;
 const m=a.createOscillator();m.type='sine';m.frequency.value=f*2.74;
 const mg=a.createGain();mg.gain.setValueAtTime(idx,t);
 mg.gain.exponentialRampToValueAtTime(.5,t+dur*.55);m.connect(mg).connect(c.frequency);
 const g=a.createGain();g.gain.setValueAtTime(.0001,t);
 g.gain.exponentialRampToValueAtTime(pk,t+.014);g.gain.exponentialRampToValueAtTime(.0001,t+dur);
 c.connect(g).connect(_bus());m.start(t);c.start(t);m.stop(t+dur+.1);c.stop(t+dur+.1);}
function playEntranceChime(){const a=_a();if(a.state==='suspended')a.resume();
 const t=a.currentTime+.05, root=493.88;
 _bell(root,t,1.70,40,.5);
 _bell(root*0.7937,t+0.52,1.95,34,.46);}
// ブラウザは AudioContext を生成時サスペンド／タブ非アクティブ等で自動サスペンドする。
// ユーザー操作とタブ復帰で単一 context を一括 resume し、音が出なくなるのを防ぐ。
function resumeAudio(){ try{ KawaiiSounds.resume(); }catch(e){} }
['pointerdown','touchstart','keydown'].forEach(ev =>
  window.addEventListener(ev, resumeAudio, { passive: true }));
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible') resumeAudio();
});
// Duration (seconds) of each launch whistle — used to sync shell flight
const FW_LAUNCH_DUR = { '1': 1.15, '2': 0.75, '3': 1.3, '4': 1.6 };

function pickFireworkSounds(){
  const launch = String(1 + Math.floor(Math.random() * 4)); // 1..4
  const boom = String(1 + Math.floor(Math.random() * 3));    // 1..3
  return { launch, boom, dur: FW_LAUNCH_DUR[launch] || 1.15 };
}
function playFireworkLaunch(which){
  if(muted) return;
  KawaiiSounds.play('fwLaunch' + which);
}
function playFireworkBoom(which){
  if(muted) return;
  KawaiiSounds.play('fwBoom' + which);
}

function tr(key, vars){
  let s = (I18N[lang] && I18N[lang][key]);
  if(s == null) s = I18N.ja[key];
  if(s == null) s = key;
  if(vars) s = s.replace(/\{(\w+)\}/g, (m,k) => (vars[k] != null ? vars[k] : m));
  return s;
}
function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = tr(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-title]').forEach(el => { el.title = tr(el.dataset.i18nTitle); });
  document.documentElement.lang = lang;
  // Dynamic / JS-driven text that the generic pass above can't cover
  if(typeof refreshWeatherBtn === 'function') refreshWeatherBtn();
  if(typeof refreshMuteToggle === 'function') refreshMuteToggle();
  if(typeof updateFxAvailability === 'function') updateFxAvailability();
  if(typeof updateLandSummary === 'function') updateLandSummary();
  if(typeof refreshScatterUI === 'function') refreshScatterUI();
  if(typeof refreshAutoEmojiUI === 'function') refreshAutoEmojiUI();
  if(typeof refreshTimePopupUI === 'function') refreshTimePopupUI();
  if(typeof updateNmLabel === 'function') updateNmLabel();
  if(typeof buildCatTabs === 'function'){ buildCatTabs(); buildPalette(); }
  document.querySelectorAll('#lang-opts .lang-opt').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === lang));
}
function setLang(l){
  lang = (l === 'en') ? 'en' : 'ja';
  applyLang();
  if(typeof saveState === 'function') saveState();
  if(typeof showToast === 'function') showToast(tr('toast.langSet'));
}

// NOISE (for terrain gen)
// ═══════════════════════════════════════════
function mulberry32(s){return()=>{s|=0;s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296};}
function makeNoise(seed){
  const rng=mulberry32(seed),p=Array.from({length:256},(_,i)=>i);
  for(let i=255;i>0;i--){const j=Math.floor(rng()*(i+1));[p[i],p[j]]=[p[j],p[i]];}
  const pp=[...p,...p],fade=t=>t*t*t*(t*(t*6-15)+10),lerp=(a,b,t)=>a+(b-a)*t,grad=(h,x,y)=>{h&=3;return((h&1)?-x:x)+((h&2)?-y:y);};
  return(x,y)=>{const X=Math.floor(x)&255,Y=Math.floor(y)&255;x-=Math.floor(x);y-=Math.floor(y);const u=fade(x),v=fade(y),a=pp[X]+Y,b=pp[X+1]+Y;return lerp(lerp(grad(pp[a],x,y),grad(pp[b],x-1,y),u),lerp(grad(pp[a+1],x,y-1),grad(pp[b+1],x-1,y-1),u),v);};
}

// ═══════════════════════════════════════════
// ISO PROJECTION
// ═══════════════════════════════════════════
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let OX = 0, OY = 0; // origin offset (panning)
let scale = 1;

function resizeCanvas(){
  cv.width  = window.innerWidth;
  cv.height = window.innerHeight;
  OX = cv.width  / 2 - (GRID * TILE_W / 2) * scale;
  OY = cv.height / 2 - (GRID * TILE_H / 2) * scale + 30;
}
resizeCanvas();

let rotation = 0;

// Tile dimensions
const TW2 = 40, TH2 = 40;   // 2D square
const TW3 = 52, TH3 = 26;   // 3D isometric

function getTileDims(){ return drawMode==='3d' ? {TW:TW3,TH:TH3} : {TW:TW2,TH:TH2}; }

// grid (c,r) → screen top-left (or iso-top) pixel
function isoToScreen(c, r){
  const {TW,TH} = getTileDims();
  let rc=c, rr=r;
  switch(rotation&3){
    case 1: rc=GRID-1-r; rr=c;        break;
    case 2: rc=GRID-1-c; rr=GRID-1-r; break;
    case 3: rc=r;        rr=GRID-1-c; break;
  }
  if(drawMode==='3d'){
    return {
      x: OX + (rc - rr) * (TW/2) * scale,
      y: OY + (rc + rr) * (TH/2) * scale,
    };
  }
  return {
    x: OX + rc * TW * scale,
    y: OY + rr * TH * scale,
  };
}

// screen pixel → grid cell
function screenToIso(sx, sy){
  const {TW,TH} = getTileDims();
  let rc, rr;
  if(drawMode==='3d'){
    const rx=sx-OX, ry=sy-OY;
    const tw=(TW/2)*scale, th=(TH/2)*scale;
    rc = Math.floor((rx/tw + ry/th)/2);
    rr = Math.floor((ry/th - rx/tw)/2);
  } else {
    rc = Math.floor((sx-OX)/(TW*scale));
    rr = Math.floor((sy-OY)/(TH*scale));
  }
  let c=rc, r=rr;
  switch(rotation&3){
    case 1: c=rr;        r=GRID-1-rc; break;
    case 2: c=GRID-1-rc; r=GRID-1-rr; break;
    case 3: c=GRID-1-rr; r=rc;        break;
  }
  return {c, r};
}

// EMOJI TEXTURE CACHE (offscreen canvas)
// ═══════════════════════════════════════════
const emojiCache = {};
function getEmojiImg(emoji, size=48){
  const key = emoji + size;
  if(emojiCache[key]) return emojiCache[key];
  const oc = document.createElement('canvas');
  oc.width = oc.height = size;
  const octx = oc.getContext('2d');
  octx.font = `${Math.floor(size * 0.75)}px serif`;
  octx.textAlign = 'center'; octx.textBaseline = 'middle';
  octx.fillText(emoji, size/2, size/2 + 2);
  emojiCache[key] = oc;
  return oc;
}

// Rainbow glow for 🏪
function drawRainbowGlow(cx, cy, size){
  const t = animT;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  // 7 layered colored halos rotating in hue
  const colors = [
    [255, 80, 80],
    [255, 160, 60],
    [255, 235, 80],
    [120, 220, 100],
    [80, 180, 240],
    [120, 120, 240],
    [200, 100, 230],
  ];
  for(let i = 0; i < colors.length; i++){
    const phase = t * 1.2 + i * (Math.PI * 2 / colors.length);
    const radius = size * (0.55 + Math.sin(phase) * 0.08);
    const ox = cx + Math.cos(phase) * size * 0.12;
    const oy = cy + Math.sin(phase) * size * 0.08;
    const [r, g, b] = colors[i];
    const grd = ctx.createRadialGradient(ox, oy, 0, ox, oy, radius);
    grd.addColorStop(0,   `rgba(${r},${g},${b},0.55)`);
    grd.addColorStop(0.5, `rgba(${r},${g},${b},0.20)`);
    grd.addColorStop(1,   `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(ox, oy, radius, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// Twinkling sparkle for placed Christmas emojis
function drawSparkle(cx, cy, size){
  const t = animT;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  // Soft warm halo
  const halo = ctx.createRadialGradient(cx, cy, 0, cx, cy, size*0.6);
  const pulse = 0.18 + Math.sin(t*2.4)*0.06;
  halo.addColorStop(0,   `rgba(255,245,210,${pulse})`);
  halo.addColorStop(0.6, `rgba(255,235,170,${pulse*0.5})`);
  halo.addColorStop(1,   'rgba(255,235,170,0)');
  ctx.fillStyle = halo;
  ctx.beginPath(); ctx.arc(cx, cy, size*0.6, 0, Math.PI*2); ctx.fill();
  // Orbiting twinkles (4-point stars)
  const N = 5;
  for(let i = 0; i < N; i++){
    const phase = t * 1.6 + i * (Math.PI * 2 / N);
    const dist = size * (0.42 + Math.sin(t*3 + i)*0.06);
    const sx = cx + Math.cos(phase) * dist;
    const sy = cy + Math.sin(phase) * dist * 0.85;
    const tw = 0.5 + Math.sin(t*5 + i*1.7) * 0.5; // 0..1 twinkle
    const r = size * (0.05 + tw * 0.06);
    const cols = ['255,255,255','255,235,150','180,235,160','255,210,210'];
    const col = cols[i % cols.length];
    ctx.fillStyle = `rgba(${col},${0.5 + tw*0.5})`;
    // 4-point star via two crossed thin rhombi
    ctx.beginPath();
    ctx.moveTo(sx, sy - r*2.2);
    ctx.lineTo(sx + r*0.5, sy);
    ctx.lineTo(sx, sy + r*2.2);
    ctx.lineTo(sx - r*0.5, sy);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(sx - r*2.2, sy);
    ctx.lineTo(sx, sy + r*0.5);
    ctx.lineTo(sx + r*2.2, sy);
    ctx.lineTo(sx, sy - r*0.5);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

// ❄️ Gentle falling snow around the emoji
function drawSnowFx(cx, cy, size){
  const t = animT;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  // Cool bluish halo
  const halo = ctx.createRadialGradient(cx, cy, 0, cx, cy, size*0.55);
  const pulse = 0.12 + Math.sin(t*1.8)*0.04;
  halo.addColorStop(0,   `rgba(200,225,255,${pulse})`);
  halo.addColorStop(0.6, `rgba(180,210,255,${pulse*0.5})`);
  halo.addColorStop(1,   'rgba(180,210,255,0)');
  ctx.fillStyle = halo;
  ctx.beginPath(); ctx.arc(cx, cy, size*0.55, 0, Math.PI*2); ctx.fill();
  // Falling flakes (deterministic per index, looping)
  const N = 7;
  for(let i = 0; i < N; i++){
    const seed = i * 1.7;
    const fall = ((t * (0.35 + (i%3)*0.08) + i*0.5) % 1); // 0..1 down
    const fx = cx + Math.sin(t*1.2 + seed) * size*0.4 + (i - N/2) * size*0.06;
    const fy = cy - size*0.5 + fall * size;
    const fade = Math.sin(fall * Math.PI); // fade in/out at ends
    const r = size * 0.045 * (0.7 + (i%2)*0.4);
    ctx.fillStyle = `rgba(255,255,255,${0.7*fade})`;
    ctx.beginPath(); ctx.arc(fx, fy, r, 0, Math.PI*2); ctx.fill();
    // tiny cross sparkle on bigger flakes
    if(i%2===0){
      ctx.strokeStyle = `rgba(220,240,255,${0.5*fade})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(fx-r*2, fy); ctx.lineTo(fx+r*2, fy);
      ctx.moveTo(fx, fy-r*2); ctx.lineTo(fx, fy+r*2);
      ctx.stroke();
    }
  }
  ctx.restore();
}

// 🕯️ Warm flickering candle/cozy glow
function drawGlowFx(cx, cy, size){
  const t = animT;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  // Flicker = sum of a couple of sines for organic feel
  const flick = 0.5 + Math.sin(t*9)*0.18 + Math.sin(t*5.3+1)*0.12;
  const r = size * (0.55 + flick*0.12);
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  grd.addColorStop(0,   `rgba(255,210,130,${0.30*flick + 0.12})`);
  grd.addColorStop(0.45,`rgba(255,170,80,${0.16*flick})`);
  grd.addColorStop(1,   'rgba(255,150,60,0)');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
  // Inner bright core
  const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, size*0.22);
  core.addColorStop(0, `rgba(255,240,200,${0.35*flick})`);
  core.addColorStop(1, 'rgba(255,240,200,0)');
  ctx.fillStyle = core;
  ctx.beginPath(); ctx.arc(cx, cy, size*0.22, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// 🎄 Multi-color twinkling tree lights
function drawTreeFx(cx, cy, size){
  const t = animT;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  // Faint green ambient
  const halo = ctx.createRadialGradient(cx, cy, 0, cx, cy, size*0.6);
  halo.addColorStop(0,   'rgba(120,220,140,0.10)');
  halo.addColorStop(1,   'rgba(120,220,140,0)');
  ctx.fillStyle = halo;
  ctx.beginPath(); ctx.arc(cx, cy, size*0.6, 0, Math.PI*2); ctx.fill();
  // LED bulbs around a triangle-ish outline
  const cols = ['255,80,80','255,210,80','90,180,255','120,230,120','255,140,220'];
  const N = 9;
  for(let i = 0; i < N; i++){
    const fr = i / N;
    // zig-zag down the tree silhouette
    const yy = cy - size*0.42 + fr * size*0.8;
    const spread = (1 - fr) * size*0.38; // wider at bottom
    const xx = cx + Math.sin(fr * Math.PI * 3) * spread;
    const blink = 0.5 + Math.sin(t*6 + i*1.3) * 0.5; // 0..1 each at own phase
    const col = cols[i % cols.length];
    const r = size * 0.05 * (0.6 + blink*0.7);
    const g = ctx.createRadialGradient(xx, yy, 0, xx, yy, r*2.4);
    g.addColorStop(0, `rgba(${col},${0.8*blink})`);
    g.addColorStop(1, `rgba(${col},0)`);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(xx, yy, r*2.4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = `rgba(255,255,255,${0.7*blink})`;
    ctx.beginPath(); ctx.arc(xx, yy, r*0.6, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// Dispatch the right decoration effect for a placed emoji
function drawEmojiFx(emoji, cx, cy, size){
  const fx = fxType(emoji);
  if(fx === 'sparkle') drawSparkle(cx, cy, size);
  else if(fx === 'snow') drawSnowFx(cx, cy, size);
  else if(fx === 'glow') drawGlowFx(cx, cy, size);
  else if(fx === 'tree') drawTreeFx(cx, cy, size);
}

// Sky colors based on time
const SKIES = [
  {t:0,   sky:'#050510', fog:.7},
  {t:.22, sky:'#0a0a20', fog:.6},
  {t:.27, sky:'#c0512a', fog:.3},
  {t:.32, sky:'#87ceeb', fog:.0},
  {t:.5,  sky:'#4488cc', fog:.0},
  {t:.68, sky:'#87ceeb', fog:.0},
  {t:.73, sky:'#c05020', fog:.3},
  {t:.78, sky:'#0a0a20', fog:.6},
  {t:1,   sky:'#050510', fog:.7},
];
function lerpHex(a,b,t){
  const ah=a.replace('#',''),bh=b.replace('#','');
  const lerp=(x,y,t)=>Math.round(parseInt(x,16)+(parseInt(y,16)-parseInt(x,16))*t).toString(16).padStart(2,'0');
  return '#'+lerp(ah.slice(0,2),bh.slice(0,2),t)+lerp(ah.slice(2,4),bh.slice(2,4),t)+lerp(ah.slice(4,6),bh.slice(4,6),t);
}
function getSky(){
  let a=SKIES[SKIES.length-1],b=SKIES[0];
  for(let i=0;i<SKIES.length-1;i++)if(timeOfDay>=SKIES[i].t&&timeOfDay<=SKIES[i+1].t){a=SKIES[i];b=SKIES[i+1];break;}
  const f=(timeOfDay-a.t)/Math.max(b.t-a.t,.0001);
  return {sky:lerpHex(a.sky,b.sky,f), fog:a.fog+(b.fog-a.fog)*f};
}

// ambient darkness overlay (0=day 1=night)
function getAmbient(){ return getSky().fog; }

function drawTile(c, r){
  const {x,y} = isoToScreen(c, r);
  const {TW,TH} = getTileDims();
  const tw = TW * scale, th = TH * scale;
  const type = terrain[`${c},${r}`] || 'grass';
  const isHover = hoverCell && hoverCell.c===c && hoverCell.r===r;

  let col0, col1;
  if(type === 'water'){
    col0 = '#3a9ed8';
    col1 = '#2a8ec8';
  } else {
    const cc = TERRAIN_COLORS[type] || TERRAIN_COLORS.grass;
    col0 = cc[0]; col1 = cc[1];
  }
  const hCol = isHover ? (mode==='erase'?'#ff6666':mode==='terrain'?'#ffcc44':col0) : col0;
  const hCol1 = isHover ? hCol : col1;

  if(drawMode === '3d'){
    const depth = th * 0.5;
    const h = heights[`${c},${r}`] || 0;
    const lift = h * depth;
    // Top face (lifted up by `lift`)
    const ty = y - lift;
    ctx.beginPath();
    ctx.moveTo(x,        ty);
    ctx.lineTo(x+tw/2,   ty+th/2);
    ctx.lineTo(x,        ty+th);
    ctx.lineTo(x-tw/2,   ty+th/2);
    ctx.closePath();
    ctx.fillStyle = hCol;
    ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.08)'; ctx.lineWidth=.5; ctx.stroke();

    // Left face — extends from top down by (depth + lift)
    const totalDepth = depth + lift;
    ctx.beginPath();
    ctx.moveTo(x-tw/2, ty+th/2);
    ctx.lineTo(x,      ty+th);
    ctx.lineTo(x,      ty+th+totalDepth);
    ctx.lineTo(x-tw/2, ty+th/2+totalDepth);
    ctx.closePath();
    ctx.fillStyle = lerpHex(hCol1,'#000000',.18); ctx.fill(); ctx.stroke();

    // Right face
    ctx.beginPath();
    ctx.moveTo(x+tw/2, ty+th/2);
    ctx.lineTo(x,      ty+th);
    ctx.lineTo(x,      ty+th+totalDepth);
    ctx.lineTo(x+tw/2, ty+th/2+totalDepth);
    ctx.closePath();
    ctx.fillStyle = lerpHex(hCol1,'#000000',.32); ctx.fill(); ctx.stroke();

  } else {
    // 2D square (solid color, no checker)
    ctx.fillStyle = hCol;
    ctx.fillRect(x, y, tw, th);
    ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=1;
    ctx.strokeRect(Math.round(x)+.5, Math.round(y)+.5, Math.round(tw)-1, Math.round(th)-1);
  }
}

// ── Rainbow ─────────────────────────────────────────────
let rainbowOn = false;
let rainbowProgress = 0; // 0..1, fades in/out
function updateRainbow(dt){
  const target = rainbowOn ? 1 : 0;
  // Approach target with eased rate (slower fade = more elegant)
  const speed = 0.6; // full fade takes ~1.7s
  if(rainbowProgress < target){
    rainbowProgress = Math.min(target, rainbowProgress + dt * speed);
  } else if(rainbowProgress > target){
    rainbowProgress = Math.max(target, rainbowProgress - dt * speed);
  }
}
function drawRainbow(){
  if(rainbowProgress <= 0) return;
  // Only show during day
  let dayAlpha = 0;
  if(timeOfDay >= 0.27 && timeOfDay <= 0.73){
    if(timeOfDay < 0.35) dayAlpha = (timeOfDay - 0.27) / 0.08;
    else if(timeOfDay > 0.65) dayAlpha = (0.73 - timeOfDay) / 0.08;
    else dayAlpha = 1;
  }
  if(dayAlpha <= 0) return;

  const W = cv.width, H = cv.height;
  const cx = W * 0.5, cy = H * 0.85;
  const radius = Math.max(W, H) * 0.7;
  const colors = ['#ff5050','#ff9030','#ffd040','#50d050','#3090ff','#7050d0','#a040c0'];

  // Sweep from left horizon (PI) toward right horizon (2*PI)
  // rainbowProgress 0..1 controls how far the arc has drawn
  const fullSweep = Math.PI; // half circle
  const sweep = fullSweep * rainbowProgress;
  // Alpha also eases with progress for a soft fade-in
  const fade = rainbowProgress;

  ctx.save();
  ctx.lineWidth = 8;
  ctx.lineCap = 'butt';
  for(let i = 0; i < colors.length; i++){
    const alphaByte = Math.floor(0x60 * dayAlpha * fade);
    ctx.strokeStyle = colors[i] + alphaByte.toString(16).padStart(2,'0');
    ctx.beginPath();
    ctx.arc(cx, cy, radius - i * 9, Math.PI, Math.PI + sweep);
    ctx.stroke();
  }
  ctx.restore();
}

// ── Fireworks (enhanced) ────────────────────────────────
const fireworks = [];
const fwSparks  = []; // detached sparks with trails
const fwShells  = []; // rising launch shells

function spawnFirework(){
  const W = cv.width, H = cv.height;
  // Launch from bottom — shell rises to target
  const targetX = W * (0.15 + Math.random() * 0.7);
  const targetY = H * (0.12 + Math.random() * 0.25);
  const startX = targetX + (-30 + Math.random() * 60);
  const startY = H + 20;
  const palette = [
    ['#ff4060','#ffc0d0'],['#ffd040','#fff8b0'],['#40ff90','#b0ffd0'],
    ['#4090ff','#b0d8ff'],['#c040ff','#e8b0ff'],['#ffffff','#fff8e0'],
    ['#ff8040','#ffd0a0'],['#40ffff','#b0ffff'],['#ff40ff','#ffb0ff'],
  ];
  const cols = palette[Math.floor(Math.random() * palette.length)];
  const shape = Math.random();
  let shapeType;
  if(shape < 0.25)      shapeType = 'ring';
  else if(shape < 0.45) shapeType = 'chrysanthemum';  // 2-stage with bigger
  else if(shape < 0.65) shapeType = 'palm';            // few large drooping
  else if(shape < 0.85) shapeType = 'willow';          // long-lasting drooping
  else                   shapeType = 'burst';
  const fwSnd = pickFireworkSounds();
  fwShells.push({
    x: startX, y: startY,
    tx: targetX, ty: targetY,
    vx: (targetX - startX) * 0.6,
    vy: -(startY - targetY) * 1.5,
    life: 0,
    color: cols[0], glow: cols[1],
    shape: shapeType,
    trail: [],
    // Random launch+boom combo, remembered on the shell so the
    // explosion matches the launch and stays in sync with flight time.
    boomSound: fwSnd.boom,
    flightTime: muted ? null : fwSnd.dur,
  });
  // Launch whistle (if not muted)
  playFireworkLaunch(fwSnd.launch);
}

function explodeFirework(shell){
  const {tx:x, ty:y, color, glow, shape} = shell;
  // Boom sound (random combo chosen at launch, if not muted)
  playFireworkBoom(shell.boomSound || String(1 + Math.floor(Math.random()*3)));
  let count, baseSpeed, gravity, life, special;
  switch(shape){
    case 'ring':
      count = 70; baseSpeed = 170; gravity = 50; life = 2.0; break;
    case 'chrysanthemum':
      count = 110; baseSpeed = 200; gravity = 70; life = 2.5; break;
    case 'palm':
      count = 40; baseSpeed = 230; gravity = 110; life = 2.2; break;
    case 'willow':
      count = 90; baseSpeed = 130; gravity = 120; life = 3.5; break;
    default:
      count = 100; baseSpeed = 60; gravity = 80; life = 2.0;
  }
  for(let i = 0; i < count; i++){
    const ang = (i / count) * Math.PI * 2 + Math.random() * 0.04;
    const sp = shape === 'ring'
      ? baseSpeed + Math.random() * 15
      : baseSpeed * (0.4 + Math.random() * 0.6);
    fwSparks.push({
      x, y,
      vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp,
      life: 0, maxLife: life + Math.random() * 0.5,
      gravity,
      trail: [],
      trailMax: shape === 'willow' ? 18 : 8,
      color, glow,
      twinklePhase: Math.random() * Math.PI * 2,
      isWillow: shape === 'willow',
    });
  }
  // Launch flash
  fireworks.push({x, y, t: 0, color, big: shape === 'chrysanthemum'});
}

function updateFireworks(dt){
  // Rising shells
  for(let i = fwShells.length - 1; i >= 0; i--){
    const s = fwShells[i];
    s.life += dt;
    if(s.flightTime != null){
      // Sound-synced flight: interpolate position over flightTime,
      // explode exactly when the launch whistle finishes.
      if(s.sx0 == null){ s.sx0 = s.x; s.sy0 = s.y; }
      const p = Math.min(1, s.life / s.flightTime);
      const ep = 1 - Math.pow(1 - p, 2); // ease-out (decelerate near apex)
      s.x = s.sx0 + (s.tx - s.sx0) * ep;
      s.y = s.sy0 + (s.ty - s.sy0) * ep;
      s.trail.unshift({x: s.x, y: s.y});
      if(s.trail.length > 10) s.trail.pop();
      if(s.life >= s.flightTime){
        explodeFirework(s);
        fwShells.splice(i, 1);
      }
    } else {
      // Physics-based flight (muted)
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vy += 80 * dt;
      s.trail.unshift({x: s.x, y: s.y});
      if(s.trail.length > 10) s.trail.pop();
      if(s.y <= s.ty || s.vy >= 0){
        explodeFirework(s);
        fwShells.splice(i, 1);
      }
    }
  }
  // Flash
  for(let i = fireworks.length - 1; i >= 0; i--){
    fireworks[i].t += dt;
    if(fireworks[i].t > 0.3) fireworks.splice(i,1);
  }
  // Sparks
  for(let i = fwSparks.length - 1; i >= 0; i--){
    const s = fwSparks[i];
    s.life += dt;
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.vy += s.gravity * dt;
    s.vx *= 0.975; s.vy *= 0.975;
    s.trail.unshift({x: s.x, y: s.y});
    if(s.trail.length > s.trailMax) s.trail.pop();
    if(s.life >= s.maxLife) fwSparks.splice(i, 1);
  }
}

function drawFireworks(){
  // Rising shells with trail
  for(const s of fwShells){
    for(let i = 1; i < s.trail.length; i++){
      const p = s.trail[i];
      const a = (1 - i / s.trail.length) * 0.6;
      ctx.fillStyle = `rgba(${hexToRgb(s.glow)},${a})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, 2 - i * 0.15, 0, Math.PI*2); ctx.fill();
    }
    // Head spark
    ctx.fillStyle = `rgba(${hexToRgb(s.color)},.95)`;
    ctx.beginPath(); ctx.arc(s.x, s.y, 2.5, 0, Math.PI*2); ctx.fill();
  }
  // Launch flash
  for(const f of fireworks){
    const a = Math.max(0, 1 - f.t / 0.3);
    const r = (f.big ? 80 : 50) + f.t * 220;
    const grd = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r);
    grd.addColorStop(0, `rgba(${hexToRgb(f.color)},${a * 0.55})`);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(f.x, f.y, r, 0, Math.PI*2); ctx.fill();
  }
  // Sparks
  for(const s of fwSparks){
    const t = s.life / s.maxLife;
    if(t >= 1) continue;
    const a = Math.pow(1 - t, 1.3);
    const twinkle = 0.7 + Math.sin(animT * 18 + s.twinklePhase) * 0.3;

    // Tail line
    if(s.trail.length > 1){
      const head = s.trail[0], tail = s.trail[s.trail.length-1];
      const grd = ctx.createLinearGradient(tail.x, tail.y, head.x, head.y);
      grd.addColorStop(0, `rgba(${hexToRgb(s.glow)},0)`);
      grd.addColorStop(1, `rgba(${hexToRgb(s.glow)},${a * 0.45})`);
      ctx.strokeStyle = grd;
      ctx.lineWidth = 1.6;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(tail.x, tail.y);
      ctx.lineTo(head.x, head.y);
      ctx.stroke();
    }
    // Glow
    const gr = 8;
    const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, gr);
    g.addColorStop(0, `rgba(${hexToRgb(s.glow)},${a * twinkle * 0.7})`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(s.x, s.y, gr, 0, Math.PI*2); ctx.fill();
    // Core
    ctx.fillStyle = `rgba(255,255,255,${a * twinkle})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, 1.4, 0, Math.PI*2); ctx.fill();
  }
}

const bubbles = [];
const bubblePops = []; // {x, y, particles:[{x,y,vx,vy,life,maxLife,size}]}

// ── Eat FX (動物が食べ物を食べたときの小演出) ───────────────
