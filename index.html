// Sky colors based on time
const SKIES = [
  {t:0,   sky:'#050510', fog:.7},
  {t:.22, sky:'#0a0a20', fog:.6},
  {t:.27, sky:'#c0512a', fog:.3},
  {t:.32, sky:'#87ceeb', fog:.0},
  {t:.5,  sky:'#4488cc', fog:.0},
  {t:.68, sky:'#87ceeb', fog:.0},
  {t:.73, sky:'#c05020', fog:.3},
  {t:.78, sky:'#0a0a20', fog:.6},
  {t:1,   sky:'#050510', fog:.7},
];
function lerpHex(a,b,t){
  const ah=a.replace('#',''),bh=b.replace('#','');
  const lerp=(x,y,t)=>Math.round(parseInt(x,16)+(parseInt(y,16)-parseInt(x,16))*t).toString(16).padStart(2,'0');
  return '#'+lerp(ah.slice(0,2),bh.slice(0,2),t)+lerp(ah.slice(2,4),bh.slice(2,4),t)+lerp(ah.slice(4,6),bh.slice(4,6),t);
}
function getSky(){
  let a=SKIES[SKIES.length-1],b=SKIES[0];
  for(let i=0;i<SKIES.length-1;i++)if(timeOfDay>=SKIES[i].t&&timeOfDay<=SKIES[i+1].t){a=SKIES[i];b=SKIES[i+1];break;}
  const f=(timeOfDay-a.t)/Math.max(b.t-a.t,.0001);
  return {sky:lerpHex(a.sky,b.sky,f), fog:a.fog+(b.fog-a.fog)*f};
}

// ambient darkness overlay (0=day 1=night)
function getAmbient(){ return getSky().fog; }

function drawTile(c, r){
  const {x,y} = isoToScreen(c, r);
  const {TW,TH} = getTileDims();
  const tw = TW * scale, th = TH * scale;
  const type = terrain[`${c},${r}`] || 'grass';
  const isHover = hoverCell && hoverCell.c===c && hoverCell.r===r;

  let col0, col1;
  if(type === 'water'){
    col0 = '#3a9ed8';
    col1 = '#2a8ec8';
  } else {
    const cc = TERRAIN_COLORS[type] || TERRAIN_COLORS.grass;
    col0 = cc[0]; col1 = cc[1];
  }
  const hCol = isHover ? (mode==='erase'?'#ff6666':mode==='terrain'?'#ffcc44':col0) : col0;
  const hCol1 = isHover ? hCol : col1;

  if(drawMode === '3d'){
    const depth = th * 0.5;
    const h = heights[`${c},${r}`] || 0;
    const lift = h * depth;
    // Top face (lifted up by `lift`)
    const ty = y - lift;
    ctx.beginPath();
    ctx.moveTo(x,        ty);
    ctx.lineTo(x+tw/2,   ty+th/2);
    ctx.lineTo(x,        ty+th);
    ctx.lineTo(x-tw/2,   ty+th/2);
    ctx.closePath();
    ctx.fillStyle = hCol;
    ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.08)'; ctx.lineWidth=.5; ctx.stroke();

    // Left face — extends from top down by (depth + lift)
    const totalDepth = depth + lift;
    ctx.beginPath();
    ctx.moveTo(x-tw/2, ty+th/2);
    ctx.lineTo(x,      ty+th);
    ctx.lineTo(x,      ty+th+totalDepth);
    ctx.lineTo(x-tw/2, ty+th/2+totalDepth);
    ctx.closePath();
    ctx.fillStyle = lerpHex(hCol1,'#000000',.18); ctx.fill(); ctx.stroke();

    // Right face
    ctx.beginPath();
    ctx.moveTo(x+tw/2, ty+th/2);
    ctx.lineTo(x,      ty+th);
    ctx.lineTo(x,      ty+th+totalDepth);
    ctx.lineTo(x+tw/2, ty+th/2+totalDepth);
    ctx.closePath();
    ctx.fillStyle = lerpHex(hCol1,'#000000',.32); ctx.fill(); ctx.stroke();

  } else {
    // 2D square (solid color, no checker)
    ctx.fillStyle = hCol;
    ctx.fillRect(x, y, tw, th);
    ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=1;
    ctx.strokeRect(Math.round(x)+.5, Math.round(y)+.5, Math.round(tw)-1, Math.round(th)-1);
  }
}

// ── Rainbow ─────────────────────────────────────────────
let rainbowOn = false;
let rainbowProgress = 0; // 0..1, fades in/out
function updateRainbow(dt){
  const target = rainbowOn ? 1 : 0;
  // Approach target with eased rate (slower fade = more elegant)
  const speed = 0.6; // full fade takes ~1.7s
  if(rainbowProgress < target){
    rainbowProgress = Math.min(target, rainbowProgress + dt * speed);
  } else if(rainbowProgress > target){
    rainbowProgress = Math.max(target, rainbowProgress - dt * speed);
  }
}
function drawRainbow(){
  if(rainbowProgress <= 0) return;
  // Only show during day
  let dayAlpha = 0;
  if(timeOfDay >= 0.27 && timeOfDay <= 0.73){
    if(timeOfDay < 0.35) dayAlpha = (timeOfDay - 0.27) / 0.08;
    else if(timeOfDay > 0.65) dayAlpha = (0.73 - timeOfDay) / 0.08;
    else dayAlpha = 1;
  }
  if(dayAlpha <= 0) return;

  const W = cv.width, H = cv.height;
  const cx = W * 0.5, cy = H * 0.85;
  const radius = Math.max(W, H) * 0.7;
  const colors = ['#ff5050','#ff9030','#ffd040','#50d050','#3090ff','#7050d0','#a040c0'];

  // Sweep from left horizon (PI) toward right horizon (2*PI)
  // rainbowProgress 0..1 controls how far the arc has drawn
  const fullSweep = Math.PI; // half circle
  const sweep = fullSweep * rainbowProgress;
  // Alpha also eases with progress for a soft fade-in
  const fade = rainbowProgress;

  ctx.save();
  ctx.lineWidth = 8;
  ctx.lineCap = 'butt';
  for(let i = 0; i < colors.length; i++){
    const alphaByte = Math.floor(0x60 * dayAlpha * fade);
    ctx.strokeStyle = colors[i] + alphaByte.toString(16).padStart(2,'0');
    ctx.beginPath();
    ctx.arc(cx, cy, radius - i * 9, Math.PI, Math.PI + sweep);
    ctx.stroke();
  }
  ctx.restore();
}

// ── Fireworks (enhanced) ────────────────────────────────
const fireworks = [];
const fwSparks  = []; // detached sparks with trails
const fwShells  = []; // rising launch shells

function spawnFirework(){
  const W = cv.width, H = cv.height;
  // Launch from bottom — shell rises to target
  const targetX = W * (0.15 + Math.random() * 0.7);
  const targetY = H * (0.12 + Math.random() * 0.25);
  const startX = targetX + (-30 + Math.random() * 60);
  const startY = H + 20;
  const palette = [
    ['#ff4060','#ffc0d0'],['#ffd040','#fff8b0'],['#40ff90','#b0ffd0'],
    ['#4090ff','#b0d8ff'],['#c040ff','#e8b0ff'],['#ffffff','#fff8e0'],
    ['#ff8040','#ffd0a0'],['#40ffff','#b0ffff'],['#ff40ff','#ffb0ff'],
  ];
  const cols = palette[Math.floor(Math.random() * palette.length)];
  const shape = Math.random();
  let shapeType;
  if(shape < 0.25)      shapeType = 'ring';
  else if(shape < 0.45) shapeType = 'chrysanthemum';  // 2-stage with bigger
  else if(shape < 0.65) shapeType = 'palm';            // few large drooping
  else if(shape < 0.85) shapeType = 'willow';          // long-lasting drooping
  else                   shapeType = 'burst';
  const fwSnd = pickFireworkSounds();
  fwShells.push({
    x: startX, y: startY,
    tx: targetX, ty: targetY,
    vx: (targetX - startX) * 0.6,
    vy: -(startY - targetY) * 1.5,
    life: 0,
    color: cols[0], glow: cols[1],
    shape: shapeType,
    trail: [],
    // Random launch+boom combo, remembered on the shell so the
    // explosion matches the launch and stays in sync with flight time.
    boomSound: fwSnd.boom,
    flightTime: muted ? null : fwSnd.dur,
  });
  // Launch whistle (if not muted)
  playFireworkLaunch(fwSnd.launch);
}

function explodeFirework(shell){
  const {tx:x, ty:y, color, glow, shape} = shell;
  // Boom sound (random combo chosen at launch, if not muted)
  playFireworkBoom(shell.boomSound || String(1 + Math.floor(Math.random()*3)));
  let count, baseSpeed, gravity, life, special;
  switch(shape){
    case 'ring':
      count = 70; baseSpeed = 170; gravity = 50; life = 2.0; break;
    case 'chrysanthemum':
      count = 110; baseSpeed = 200; gravity = 70; life = 2.5; break;
    case 'palm':
      count = 40; baseSpeed = 230; gravity = 110; life = 2.2; break;
    case 'willow':
      count = 90; baseSpeed = 130; gravity = 120; life = 3.5; break;
    default:
      count = 100; baseSpeed = 60; gravity = 80; life = 2.0;
  }
  for(let i = 0; i < count; i++){
    const ang = (i / count) * Math.PI * 2 + Math.random() * 0.04;
    const sp = shape === 'ring'
      ? baseSpeed + Math.random() * 15
      : baseSpeed * (0.4 + Math.random() * 0.6);
    fwSparks.push({
      x, y,
      vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp,
      life: 0, maxLife: life + Math.random() * 0.5,
      gravity,
      trail: [],
      trailMax: shape === 'willow' ? 18 : 8,
      color, glow,
      twinklePhase: Math.random() * Math.PI * 2,
      isWillow: shape === 'willow',
    });
  }
  // Launch flash
  fireworks.push({x, y, t: 0, color, big: shape === 'chrysanthemum'});
}

function updateFireworks(dt){
  // Rising shells
  for(let i = fwShells.length - 1; i >= 0; i--){
    const s = fwShells[i];
    s.life += dt;
    if(s.flightTime != null){
      // Sound-synced flight: interpolate position over flightTime,
      // explode exactly when the launch whistle finishes.
      if(s.sx0 == null){ s.sx0 = s.x; s.sy0 = s.y; }
      const p = Math.min(1, s.life / s.flightTime);
      const ep = 1 - Math.pow(1 - p, 2); // ease-out (decelerate near apex)
      s.x = s.sx0 + (s.tx - s.sx0) * ep;
      s.y = s.sy0 + (s.ty - s.sy0) * ep;
      s.trail.unshift({x: s.x, y: s.y});
      if(s.trail.length > 10) s.trail.pop();
      if(s.life >= s.flightTime){
        explodeFirework(s);
        fwShells.splice(i, 1);
      }
    } else {
      // Physics-based flight (muted)
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vy += 80 * dt;
      s.trail.unshift({x: s.x, y: s.y});
      if(s.trail.length > 10) s.trail.pop();
      if(s.y <= s.ty || s.vy >= 0){
        explodeFirework(s);
        fwShells.splice(i, 1);
      }
    }
  }
  // Flash
  for(let i = fireworks.length - 1; i >= 0; i--){
    fireworks[i].t += dt;
    if(fireworks[i].t > 0.3) fireworks.splice(i,1);
  }
  // Sparks
  for(let i = fwSparks.length - 1; i >= 0; i--){
    const s = fwSparks[i];
    s.life += dt;
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.vy += s.gravity * dt;
    s.vx *= 0.975; s.vy *= 0.975;
    s.trail.unshift({x: s.x, y: s.y});
    if(s.trail.length > s.trailMax) s.trail.pop();
    if(s.life >= s.maxLife) fwSparks.splice(i, 1);
  }
}

function drawFireworks(){
  // Rising shells with trail
  for(const s of fwShells){
    for(let i = 1; i < s.trail.length; i++){
      const p = s.trail[i];
      const a = (1 - i / s.trail.length) * 0.6;
      ctx.fillStyle = `rgba(${hexToRgb(s.glow)},${a})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, 2 - i * 0.15, 0, Math.PI*2); ctx.fill();
    }
    // Head spark
    ctx.fillStyle = `rgba(${hexToRgb(s.color)},.95)`;
    ctx.beginPath(); ctx.arc(s.x, s.y, 2.5, 0, Math.PI*2); ctx.fill();
  }
  // Launch flash
  for(const f of fireworks){
    const a = Math.max(0, 1 - f.t / 0.3);
    const r = (f.big ? 80 : 50) + f.t * 220;
    const grd = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r);
    grd.addColorStop(0, `rgba(${hexToRgb(f.color)},${a * 0.55})`);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(f.x, f.y, r, 0, Math.PI*2); ctx.fill();
  }
  // Sparks
  for(const s of fwSparks){
    const t = s.life / s.maxLife;
    if(t >= 1) continue;
    const a = Math.pow(1 - t, 1.3);
    const twinkle = 0.7 + Math.sin(animT * 18 + s.twinklePhase) * 0.3;

    // Tail line
    if(s.trail.length > 1){
      const head = s.trail[0], tail = s.trail[s.trail.length-1];
      const grd = ctx.createLinearGradient(tail.x, tail.y, head.x, head.y);
      grd.addColorStop(0, `rgba(${hexToRgb(s.glow)},0)`);
      grd.addColorStop(1, `rgba(${hexToRgb(s.glow)},${a * 0.45})`);
      ctx.strokeStyle = grd;
      ctx.lineWidth = 1.6;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(tail.x, tail.y);
      ctx.lineTo(head.x, head.y);
      ctx.stroke();
    }
    // Glow
    const gr = 8;
    const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, gr);
    g.addColorStop(0, `rgba(${hexToRgb(s.glow)},${a * twinkle * 0.7})`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(s.x, s.y, gr, 0, Math.PI*2); ctx.fill();
    // Core
    ctx.fillStyle = `rgba(255,255,255,${a * twinkle})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, 1.4, 0, Math.PI*2); ctx.fill();
  }
}

// ── Bubbles (day) ───────────────────────────────────────
let bubblesOn = false;
const bubbles = [];
const bubblePops = []; // {x, y, particles:[{x,y,vx,vy,life,maxLife,size}]}
function updateBubbles(dt){
  if(bubblesOn && bubbles.length < 30 && Math.random() < 0.15){
    bubbles.push({
      x: Math.random() * cv.width,
      y: cv.height + 10,
      vy: -(15 + Math.random() * 25),
      vx: -10 + Math.random() * 20,
      sway: Math.random() * Math.PI * 2,
      size: 12 + Math.random() * 28,
      life: 0,
    });
  }
  for(let i = bubbles.length - 1; i >= 0; i--){
    const b = bubbles[i];
    b.life += dt;
    b.sway += dt * 1.5;
    b.x += b.vx * dt + Math.sin(b.sway) * 0.6;
    b.y += b.vy * dt;
    if(b.y < -30 || b.life > 12) bubbles.splice(i, 1);
  }
  // Update pop particles
  for(let i = bubblePops.length - 1; i >= 0; i--){
    const pop = bubblePops[i];
    let allDead = true;
    for(const p of pop.particles){
      p.life += dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 80 * dt; // gravity
      p.vx *= 0.96; p.vy *= 0.96;
      if(p.life < p.maxLife) allDead = false;
    }
    if(allDead) bubblePops.splice(i, 1);
  }
}
function popBubble(b){
  const particles = [];
  const count = 8 + Math.floor(Math.random()*5);
  for(let i = 0; i < count; i++){
    const ang = (i / count) * Math.PI * 2 + Math.random() * 0.3;
    const sp = 40 + Math.random() * 50;
    particles.push({
      x: b.x, y: b.y,
      vx: Math.cos(ang) * sp,
      vy: Math.sin(ang) * sp,
      life: 0, maxLife: 0.4 + Math.random() * 0.3,
      size: 1.5 + Math.random() * 2,
    });
  }
  bubblePops.push({x: b.x, y: b.y, r: b.size, t: 0, particles});
  if(!muted) KawaiiSounds.play('bubblePop');
}
function tryBubbleTap(sx, sy){
  // Iterate from newest (drawn last/topmost) to oldest
  for(let i = bubbles.length - 1; i >= 0; i--){
    const b = bubbles[i];
    const dx = sx - b.x, dy = sy - b.y;
    if(dx*dx + dy*dy <= b.size * b.size){
      popBubble(b);
      bubbles.splice(i, 1);
      return true;
    }
  }
  return false;
}
function drawBubbles(){
  for(const b of bubbles){
    const grd = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.size);
    grd.addColorStop(0,   'rgba(255,255,255,0)');
    grd.addColorStop(0.7, 'rgba(180,220,255,0.15)');
    grd.addColorStop(1,   'rgba(255,255,255,0.55)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,200,220,0.5)';
    ctx.beginPath(); ctx.arc(b.x - b.size*0.3, b.y - b.size*0.3, b.size*0.15, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath(); ctx.arc(b.x - b.size*0.35, b.y - b.size*0.35, b.size*0.08, 0, Math.PI*2); ctx.fill();
  }
  // Pop splashes
  for(const pop of bubblePops){
    for(const p of pop.particles){
      const fade = Math.max(0, 1 - p.life / p.maxLife);
      if(fade <= 0) continue;
      ctx.fillStyle = `rgba(200,225,255,${fade * 0.85})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = `rgba(255,255,255,${fade})`;
      ctx.beginPath(); ctx.arc(p.x - p.size*0.3, p.y - p.size*0.3, p.size*0.4, 0, Math.PI*2); ctx.fill();
    }
  }
}

// ── Morning Mist (day) ──────────────────────────────────
let mistOn = false;
const mistPatches = [];
function initMist(){
  mistPatches.length = 0;
  // Pre-populate so it's already there when toggled on
  for(let i = 0; i < 14; i++){
    mistPatches.push({
      x: Math.random() * cv.width,
      y: cv.height * (0.55 + Math.random() * 0.35),
      vx: 6 + Math.random() * 8,
      size: 80 + Math.random() * 120,
      opacity: 0.15 + Math.random() * 0.15,
      phase: Math.random() * Math.PI * 2,
    });
  }
}
function updateMist(dt){
  if(!mistOn) return;
  for(const m of mistPatches){
    m.x += m.vx * dt;
    m.phase += dt * 0.3;
    if(m.x - m.size > cv.width){
      m.x = -m.size;
      m.y = cv.height * (0.55 + Math.random() * 0.35);
    }
  }
}
function drawMist(){
  if(!mistOn || mistPatches.length === 0) return;
  // Only show during day with morning-bias (stronger 0.27-0.45)
  let dayAlpha = 0;
  if(timeOfDay >= 0.27 && timeOfDay <= 0.73){
    if(timeOfDay < 0.32) dayAlpha = (timeOfDay - 0.27) / 0.05;
    else if(timeOfDay > 0.68) dayAlpha = (0.73 - timeOfDay) / 0.05;
    else dayAlpha = 1;
    // Bias: thicker in morning, thinner after noon
    if(timeOfDay < 0.5) dayAlpha *= 1.0;
    else dayAlpha *= 0.7;
  }
  if(dayAlpha <= 0) return;

  ctx.save();
  for(const m of mistPatches){
    const breathe = Math.sin(m.phase) * 0.15 + 1;
    const r = m.size * breathe;
    const op = m.opacity * dayAlpha * breathe;
    const grd = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, r);
    grd.addColorStop(0,   `rgba(240,245,250,${op})`);
    grd.addColorStop(0.6, `rgba(240,245,250,${op * 0.4})`);
    grd.addColorStop(1,   `rgba(240,245,250,0)`);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.ellipse(m.x, m.y, r, r * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ── Aurora ──────────────────────────────────────────────
let auroraOn = false;
function drawAurora(){
  if(!auroraOn) return;
  // Only visible at night
  let nightAlpha = 0;
  if(timeOfDay < 0.27)      nightAlpha = Math.min(1, (0.27 - timeOfDay) * 8);
  else if(timeOfDay > 0.73) nightAlpha = Math.min(1, (timeOfDay - 0.73) * 8);
  if(nightAlpha <= 0) return;

  const W = cv.width, H = cv.height;
  const bandsCount = 3;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  for(let b = 0; b < bandsCount; b++){
    const phase = animT * 0.3 + b * 1.7;
    const baseY = H * (0.12 + b * 0.06);
    const amplitude = H * 0.08;
    const segments = 40;

    // Draw one curtain as a vertical gradient ribbon
    ctx.beginPath();
    ctx.moveTo(0, H * 0.5);
    // top wavy edge
    for(let i = 0; i <= segments; i++){
      const x = (i / segments) * W;
      const wave = Math.sin(x * 0.005 + phase) * amplitude
                 + Math.sin(x * 0.013 + phase * 1.6) * amplitude * 0.4;
      ctx.lineTo(x, baseY + wave);
    }
    // bottom (flat baseline)
    ctx.lineTo(W, H * 0.55);
    ctx.lineTo(0, H * 0.55);
    ctx.closePath();

    // Gradient: top fades from green to violet, bottom transparent
    const grd = ctx.createLinearGradient(0, baseY - amplitude, 0, H * 0.55);
    const greens = ['rgba(80,255,180,', 'rgba(120,200,255,', 'rgba(180,120,255,'];
    const top = greens[b % greens.length];
    grd.addColorStop(0,    top + (0.38 * nightAlpha) + ')');
    grd.addColorStop(0.4,  top + (0.18 * nightAlpha) + ')');
    grd.addColorStop(1,    top + '0)');
    ctx.fillStyle = grd;
    ctx.fill();
  }

  // Shimmer streaks
  for(let s = 0; s < 18; s++){
    const seed = s * 53 + 11;
    const x = ((seed * 7919) % 100000) / 100000 * W;
    const localShift = Math.sin(animT * 1.2 + s) * 30;
    const y1 = H * 0.10 + ((seed * 31) % 60);
    const y2 = H * 0.50 + ((seed * 17) % 30);
    const grd = ctx.createLinearGradient(x, y1, x + localShift, y2);
    grd.addColorStop(0, `rgba(180,255,220,${0.25 * nightAlpha})`);
    grd.addColorStop(1, `rgba(180,255,220,0)`);
    ctx.strokeStyle = grd;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(x, y1);
    ctx.lineTo(x + localShift, y2);
    ctx.stroke();
  }

  ctx.restore();
}

// ── Meteor Shower ───────────────────────────────────────
const meteors = [];
function spawnMeteor(){
  // Random start position (upper screen, slight bias to top)
  const startX = Math.random() * cv.width * 1.3 - cv.width * 0.15;
  const startY = Math.random() * cv.height * 0.4 - cv.height * 0.1;
  const angle  = Math.PI * 0.18 + Math.random() * Math.PI * 0.12; // 32°〜54° downward
  const speed  = 700 + Math.random() * 600;
  // Weighted palette: ~50% colorless white-ish, ~50% colored
  const colored = [
    ['#fff8e0','#ffd070'], // warm gold
    ['#e0f0ff','#80b0ff'], // cool blue
    ['#ffe0ff','#ff80c0'], // pink
    ['#e0ffe0','#80ffb0'], // green
  ];
  const whiteish = [
    ['#ffffff','#ffffff'], // pure white
    ['#fafaff','#e0e0f0'], // cool white
    ['#fffaf0','#f0e8d8'], // warm white
    ['#f5f5f5','#cccccc'], // neutral gray-white
  ];
  const c = Math.random() < 0.5
    ? whiteish[Math.floor(Math.random() * whiteish.length)]
    : colored[Math.floor(Math.random() * colored.length)];
  meteors.push({
    x: startX, y: startY,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    life: 0, maxLife: 1.0 + Math.random() * 0.8,
    size: 1.8 + Math.random() * 1.5,
    trail: [],
    coreColor: c[0],
    tailColor: c[1],
  });
}

function updateMeteors(dt){
  for(let i = meteors.length - 1; i >= 0; i--){
    const m = meteors[i];
    m.life += dt;
    m.x += m.vx * dt;
    m.y += m.vy * dt;
    m.trail.unshift({x: m.x, y: m.y});
    if(m.trail.length > 22) m.trail.pop();
    if(m.life > m.maxLife || m.x > cv.width + 100 || m.y > cv.height + 100){
      meteors.splice(i, 1);
    }
  }
}

function drawMeteors(){
  for(const m of meteors){
    const fade = Math.min(1, m.life / 0.15) * Math.max(0, 1 - (m.life - m.maxLife * 0.6) / (m.maxLife * 0.4));

    // Thin tail line
    if(m.trail.length > 1){
      const head = m.trail[0];
      const tail = m.trail[m.trail.length - 1];
      const grd = ctx.createLinearGradient(tail.x, tail.y, head.x, head.y);
      grd.addColorStop(0, `rgba(${hexToRgb(m.tailColor)},0)`);
      grd.addColorStop(1, `rgba(${hexToRgb(m.tailColor)},${fade * 0.6})`);
      ctx.strokeStyle = grd;
      ctx.lineWidth = m.size * 0.8;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(tail.x, tail.y);
      ctx.lineTo(head.x, head.y);
      ctx.stroke();
    }

    // Soft glow around head
    const gradR = m.size * 4;
    const grd = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, gradR);
    grd.addColorStop(0, `rgba(${hexToRgb(m.coreColor)},${fade * 0.6})`);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(m.x, m.y, gradR, 0, Math.PI * 2); ctx.fill();

    // Bright core
    ctx.fillStyle = `rgba(255,255,255,${fade})`;
    ctx.beginPath(); ctx.arc(m.x, m.y, m.size * 0.7, 0, Math.PI * 2); ctx.fill();
  }
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// ── Clouds ──────────────────────────────────────────────
// Cloud visual state — smoothly interpolated toward weather target
let cloudFade = { count: 3, r:255, g:255, b:255, opacity: 0.7 };
function getCloudTarget(){
  const w = weather;
  return {
    count:
      w === 'thunder' ? 14 :
      w === 'rain'    ? 12 :
      w === 'snow'    ? 9  :
      w === 'hail'    ? 11 :
      w === 'sandstorm' ? 2 :
      w === 'sakura' || w === 'leaves' ? 5 :
      3,
    r: w === 'thunder' ? 120 : w === 'rain' ? 180 : w === 'hail' ? 170 : w === 'sandstorm' ? 210 : w === 'snow' ? 220 : 255,
    g: w === 'thunder' ? 120 : w === 'rain' ? 180 : w === 'hail' ? 180 : w === 'sandstorm' ? 180 : w === 'snow' ? 225 : 255,
    b: w === 'thunder' ? 140 : w === 'rain' ? 190 : w === 'hail' ? 200 : w === 'sandstorm' ? 120 : w === 'snow' ? 235 : 255,
    opacity: w === 'clear' ? 0.7 : 0.85,
  };
}
function updateCloudFade(dt){
  const t = getCloudTarget();
  // Slow approach: ~4s to reach target
  const rate = 0.25;
  const step = (a, b) => a + (b - a) * Math.min(1, dt * rate * 6);
  cloudFade.count   = step(cloudFade.count,   t.count);
  cloudFade.r       = step(cloudFade.r,       t.r);
  cloudFade.g       = step(cloudFade.g,       t.g);
  cloudFade.b       = step(cloudFade.b,       t.b);
  cloudFade.opacity = step(cloudFade.opacity, t.opacity);
}

function drawClouds(){
  const W = cv.width, H = cv.height;
  let dayAlpha = 0;
  if(timeOfDay >= 0.22 && timeOfDay <= 0.78){
    if(timeOfDay < 0.32) dayAlpha = (timeOfDay - 0.22) / 0.10;
    else if(timeOfDay > 0.68) dayAlpha = (0.78 - timeOfDay) / 0.10;
    else dayAlpha = 1;
  }
  if(dayAlpha <= 0) return;

  // Always loop through max clouds (14), but each cloud's alpha
  // depends on whether it's within the current "count" budget.
  // This lets clouds fade in/out individually instead of popping.
  const MAX_CLOUDS = 14;
  const visibleCount = cloudFade.count;
  const baseColor = `${Math.round(cloudFade.r)},${Math.round(cloudFade.g)},${Math.round(cloudFade.b)}`;

  for(let i = 0; i < MAX_CLOUDS; i++){
    // Each cloud has a fractional position in the visibility queue.
    // If i < visibleCount, fully visible.
    // If i > visibleCount, invisible.
    // If i is between visibleCount-1 and visibleCount, fade.
    const cloudAlpha = Math.max(0, Math.min(1, visibleCount - i));
    if(cloudAlpha <= 0.005) continue;

    const seed = i * 73 + 17;
    const baseY = ((seed * 7919) % 100000) / 100000 * H * 0.45 + 20;
    const speed = 4 + ((seed * 31) % 20);
    const size  = 12 + ((seed * 53) % 70);
    const totalW = W + size * 4;
    const x = ((animT * speed + (seed * 211) % 1000) % totalW) - size * 2;

    const alpha = cloudFade.opacity * dayAlpha * cloudAlpha;
    ctx.fillStyle = `rgba(${baseColor},${alpha})`;
    ctx.beginPath();
    ctx.arc(x,             baseY,           size * 0.6, 0, Math.PI*2);
    ctx.arc(x + size * .6, baseY - size*.15, size * 0.7, 0, Math.PI*2);
    ctx.arc(x + size * 1.2, baseY,           size * 0.55,0, Math.PI*2);
    ctx.arc(x + size * .4, baseY + size*.2, size * 0.5, 0, Math.PI*2);
    ctx.arc(x + size * 1.0, baseY + size*.18,size * 0.45,0, Math.PI*2);
    ctx.fill();
  }
}

// ── Sun & Moon ────────────────────────────────────────
function drawCelestial(){
  const W = cv.width, H = cv.height;
  // Sun: visible during 0.25 (sunrise) → 0.75 (sunset)
  // Moon: visible during night (0.78 → 0.22)
  // Both follow an arc across the sky

  function drawBody(progress, color, glow, size, isSun){
    if(progress < 0 || progress > 1) return;
    const cx = W * progress;
    const peakY = H * 0.15;
    const horizonY = H * 0.55;
    const arc = Math.sin(progress * Math.PI);
    const cy = horizonY - (horizonY - peakY) * arc;

    if(isSun){
      // Glow halo
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 3.5);
      grad.addColorStop(0, glow);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(cx, cy, size * 3.5, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(cx, cy, size, 0, Math.PI * 2); ctx.fill();
    } else {
      // Moon: render glow + crescent body to offscreen, then composite
      const pad = size * 4;
      const oc = document.createElement('canvas');
      oc.width = pad * 2; oc.height = pad * 2;
      const octx = oc.getContext('2d');
      const ocx = pad, ocy = pad;

      // Glow
      const grad = octx.createRadialGradient(ocx, ocy, 0, ocx, ocy, size * 3.5);
      grad.addColorStop(0, glow);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      octx.fillStyle = grad;
      octx.beginPath(); octx.arc(ocx, ocy, size * 3.5, 0, Math.PI * 2); octx.fill();

      // Body
      octx.fillStyle = color;
      octx.beginPath(); octx.arc(ocx, ocy, size, 0, Math.PI * 2); octx.fill();

      // Bite out crescent from body only
      octx.save();
      octx.beginPath();
      octx.arc(ocx, ocy, size, 0, Math.PI*2);
      octx.clip();
      octx.globalCompositeOperation = 'destination-out';
      const offset = size * 0.45;
      octx.beginPath();
      octx.arc(ocx + offset, ocy - offset*0.2, size, 0, Math.PI*2);
      octx.fill();
      octx.restore();

      // Composite onto main canvas
      ctx.drawImage(oc, cx - pad, cy - pad);
    }
  }

  // Sun: 0.25 (left horizon) → 0.5 (peak) → 0.75 (right horizon)
  if(timeOfDay >= 0.22 && timeOfDay <= 0.78){
    const p = (timeOfDay - 0.22) / 0.56;
    const horizon = Math.abs(p - 0.5) * 2;
    const sunColor = lerpHex('#fff8d0', '#ff8030', horizon);
    drawBody(p, sunColor, 'rgba(255,200,100,0.35)', 30, true);
    // Save sun screen position for click detection
    const peakY = H * 0.15, horizonY = H * 0.55;
    const arc = Math.sin(p * Math.PI);
    sunScreenPos = { x: W * p, y: horizonY - (horizonY - peakY) * arc, r: 30 };
  } else {
    sunScreenPos = null;
  }

  // Moon: 0.78 → 1.0 → 0.0 → 0.22 (wraps)
  let mp = -1;
  if(timeOfDay >= 0.78) mp = (timeOfDay - 0.78) / 0.44;
  else if(timeOfDay <= 0.22) mp = (timeOfDay + 0.22) / 0.44;
  if(mp >= 0 && mp <= 1){
    drawBody(mp, '#f0f0e0', 'rgba(200,210,255,0.25)', 22, false);
    // Save moon screen position for click detection
    const peakY = H * 0.15, horizonY = H * 0.55;
    const arc = Math.sin(mp * Math.PI);
    moonScreenPos = { x: W * mp, y: horizonY - (horizonY - peakY) * arc, r: 22 };
  } else {
    moonScreenPos = null;
  }

  // Starry night sky
  if(timeOfDay < 0.27 || timeOfDay > 0.73){
    const opacity = timeOfDay < 0.27 ? Math.min(1, (0.27 - timeOfDay) * 8) : Math.min(1, (timeOfDay - 0.73) * 8);

    // Star field — varied sizes and warm colors
    for(let i = 0; i < 180; i++){
      const sx = ((i * 9301 + 49297) % 233280) / 233280 * W;
      const sy = ((i * 17321 + 31337) % 100000) / 100000 * H * 0.62;
      const sz = ((i * 7919) % 100) / 100; // 0..1 size category
      const tw = 0.5 + Math.sin(animT * 1.8 + i * 0.7) * 0.4 + 0.5; // twinkle 0..1.4

      let size, color;
      if(sz > 0.95){
        // Bright "stars" with cross spike
        size = 2.2;
        color = `rgba(255,250,220,${opacity * tw})`;
        ctx.fillStyle = color;
        ctx.fillRect(sx - size/2, sy - size/2, size, size);
        // 4-point spike
        ctx.fillStyle = `rgba(255,250,220,${opacity * tw * 0.6})`;
        ctx.fillRect(sx - 4, sy - 0.5, 8, 1);
        ctx.fillRect(sx - 0.5, sy - 4, 1, 8);
      } else if(sz > 0.7){
        size = 1.5;
        // Faint blue or warm tint
        color = i % 3 === 0 ? `rgba(180,200,255,${opacity * tw * 0.85})`
              : i % 3 === 1 ? `rgba(255,230,200,${opacity * tw * 0.85})`
                            : `rgba(255,255,255,${opacity * tw * 0.85})`;
        ctx.fillStyle = color;
        ctx.fillRect(sx, sy, size, size);
      } else {
        // Faint background stars
        size = 1;
        ctx.fillStyle = `rgba(255,255,255,${opacity * tw * 0.5})`;
        ctx.fillRect(sx, sy, size, size);
      }
    }

    // Occasional shooting star — deterministic by 5-second buckets
    const shootBucket = Math.floor(animT / 8);
    const shootRng = ((shootBucket * 16807) % 100000) / 100000;
    if(shootRng > 0.55){
      const phase = (animT % 8) / 8; // 0..1 across the bucket window
      if(phase > 0.1 && phase < 0.3){
        const t = (phase - 0.1) / 0.2; // 0..1 lifetime
        const startX = ((shootBucket * 7919) % 100000) / 100000 * W * 0.6;
        const startY = ((shootBucket * 12347) % 100000) / 100000 * H * 0.3;
        const len = 120;
        const dx = startX + t * 200;
        const dy = startY + t * 80;
        const alpha = Math.sin(t * Math.PI) * opacity;
        const grd = ctx.createLinearGradient(dx - len, dy - len*0.4, dx, dy);
        grd.addColorStop(0, 'rgba(255,255,255,0)');
        grd.addColorStop(1, `rgba(255,255,255,${alpha})`);
        ctx.strokeStyle = grd;
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(dx - len, dy - len*0.4); ctx.lineTo(dx, dy); ctx.stroke();
      }
    }
  }
}

function render(){
  const {sky, fog} = getSky();
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,cv.width,cv.height);

  // ── Sun & Moon ─────────────────────────────────────
  drawCelestial();

  // ── Aurora ─────────────────────────────────────────
  drawAurora();

  // ── Rainbow ────────────────────────────────────────
  drawRainbow();

  // ── Clouds ─────────────────────────────────────────
  drawClouds();

  // ── Bubbles ────────────────────────────────────────
  drawBubbles();

  // ── Meteors ────────────────────────────────────────
  drawMeteors();

  // ── Fireworks ──────────────────────────────────────
  drawFireworks();

  // ── Mist ───────────────────────────────────────────
  drawMist();

  const {TW,TH} = getTileDims();
  const eSize = Math.max(16, Math.floor(TW * scale * 0.82));

  if(drawMode==='3d'){
    const depth = TH * scale * 0.5;
    // Iso back-to-front order
    for(let sum=0;sum<GRID*2-1;sum++){
      for(let c=0;c<=sum;c++){
        const r=sum-c;
        if(c<0||c>=GRID||r<0||r>=GRID) continue;
        drawTile(c,r);
        const key=`${c},${r}`;
        if(items[key]){
          const {x,y}=isoToScreen(c,r);
          const lift = (heights[key]||0) * depth;
          const bob=Math.sin(animT*1.4+items[key].bobOffset)*2*scale;
          const img=getEmojiImg(items[key].emoji,eSize);
          if(items[key].emoji === '🏪') drawRainbowGlow(x, y-eSize*0.1+bob-lift, eSize);
          else drawEmojiFx(items[key].emoji, x, y-eSize*0.1+bob-lift, eSize);
          ctx.drawImage(img, x-eSize/2, y-eSize*0.6+bob-lift, eSize, eSize);
        }
      }
    }
    // Animals in 3D
    for(const a of Object.values(animals)){
      const ac=Math.floor(a.wx), ar=Math.floor(a.wy);
      const {x,y}=isoToScreen(ac,ar);
      const lift = (heights[`${ac},${ar}`]||0) * depth;
      const hop=a.moving?Math.abs(Math.sin(animT*6+a.id))*(6*scale):0;
      const img=getEmojiImg(a.emoji,eSize);
      ctx.save();
      if(a.flip){ctx.translate(x,0);ctx.scale(-1,1);ctx.drawImage(img,-eSize/2,y-eSize*0.7-hop-lift,eSize,eSize);}
      else{ctx.drawImage(img,x-eSize/2,y-eSize*0.7-hop-lift,eSize,eSize);}
      ctx.restore();
    }
  } else {
    // 2D top-down order
    for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++) drawTile(c,r);
    // Height number overlay (only on empty tiles)
    if(showHeights){
      const fontSize = Math.max(10, Math.floor(TW*scale*0.32));
      ctx.font = `bold ${fontSize}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++){
        const key=`${c},${r}`;
        if(items[key]) continue;
        const h = heights[key] || 0;
        const {x,y} = isoToScreen(c,r);
        const tw=TW*scale, th=TH*scale;
        // Subtle shadow for readability
        ctx.fillStyle = 'rgba(0,0,0,.55)';
        ctx.fillText(h, x+tw/2+1, y+th/2+1);
        ctx.fillStyle = 'rgba(255,255,255,.85)';
        ctx.fillText(h, x+tw/2, y+th/2);
      }
    }
    for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++){
      const key=`${c},${r}`;
      if(!items[key]) continue;
      const {x,y}=isoToScreen(c,r);
      const tw=TW*scale,th=TH*scale;
      const bob=Math.sin(animT*1.4+items[key].bobOffset)*2*scale;
      const img=getEmojiImg(items[key].emoji,eSize);
      if(items[key].emoji === '🏪') drawRainbowGlow(x+tw/2, y+th/2+bob, eSize);
      else drawEmojiFx(items[key].emoji, x+tw/2, y+th/2+bob, eSize);
      ctx.drawImage(img, x+tw/2-eSize/2, y+th/2-eSize/2+bob, eSize, eSize);
    }
    for(const a of Object.values(animals)){
      const {x,y}=isoToScreen(Math.floor(a.wx),Math.floor(a.wy));
      const tw=TW*scale,th=TH*scale;
      const hop=a.moving?Math.abs(Math.sin(animT*6+a.id))*(4*scale):0;
      const img=getEmojiImg(a.emoji,eSize);
      const ax=x+tw/2+(a.wx-Math.floor(a.wx))*tw;
      const ay=y+th/2+(a.wy-Math.floor(a.wy))*th;
      ctx.save();
      if(a.flip){ctx.translate(ax,0);ctx.scale(-1,1);ctx.drawImage(img,-eSize/2,ay-eSize/2-hop,eSize,eSize);}
      else{ctx.drawImage(img,ax-eSize/2,ay-eSize/2-hop,eSize,eSize);}
      ctx.restore();
    }
  }

  if(fog>0){ ctx.fillStyle=`rgba(0,0,30,${fog*0.65})`; ctx.fillRect(0,0,cv.width,cv.height); }

  // Thunder flash (overlay during thunder weather)
  if(weather==='thunder' && thunderFlash > 0){
    ctx.fillStyle = `rgba(255,255,255,${thunderFlash * 0.6})`;
    ctx.fillRect(0, 0, cv.width, cv.height);
    if(thunderBolt){
      ctx.strokeStyle = `rgba(255,255,200,${thunderFlash})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(thunderBolt[0].x, thunderBolt[0].y);
      for(let i=1;i<thunderBolt.length;i++) ctx.lineTo(thunderBolt[i].x, thunderBolt[i].y);
      ctx.stroke();
    }
  }

  if(weather!=='clear'){
    for(const p of particles){
      p.x+=p.vx; p.y+=p.vy;
      p.rot = (p.rot||0) + (p.rotSpeed||0);
      if(p.y>cv.height + 20){p.y=-20;p.x=Math.random()*cv.width;}
      if(p.x>cv.width + 20){p.x=-20;}
      if(p.x<-20){p.x=cv.width + 20;}
      ctx.save();
      if(weather==='rain' || weather==='thunder'){
        ctx.strokeStyle=`rgba(180,220,255,${p.op})`;
        ctx.lineWidth=p.size*.5;
        ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+p.vx*4,p.y+p.vy*4);ctx.stroke();
      } else if(weather==='snow'){
        ctx.fillStyle=`rgba(255,255,255,${p.op})`;
        ctx.beginPath();ctx.arc(p.x,p.y,p.size/2,0,Math.PI*2);ctx.fill();
      } else if(weather==='hail'){
        ctx.fillStyle=`rgba(220,235,255,${p.op})`;
        ctx.beginPath();ctx.arc(p.x,p.y,p.size/2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=`rgba(255,255,255,${p.op*0.6})`;
        ctx.beginPath();ctx.arc(p.x-p.size*.2,p.y-p.size*.2,p.size/5,0,Math.PI*2);ctx.fill();
      } else if(weather==='sandstorm'){
        ctx.fillStyle=`rgba(210,170,90,${p.op*0.7})`;
        ctx.fillRect(p.x, p.y, p.size*2, p.size*0.3);
      } else if(weather==='sakura' || weather==='leaves'){
        const emoji = p.emoji;
        const img = getEmojiImg(emoji, Math.floor(p.size));
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = p.op;
        ctx.drawImage(img, -p.size/2, -p.size/2, p.size, p.size);
      }
      ctx.restore();
    }
  }
}

// Weather particles
const particles = [];
let thunderFlash = 0;
let thunderTimer = 0;
let thunderBolt = null;

function initWeather(type){
  particles.length=0;
  thunderFlash = 0; thunderTimer = 0; thunderBolt = null;
  if(type==='clear') return;

  const config = {
    rain:      {count:100, vy:[6,11],  vx:[-0.5,0.5], size:[1,1.5],   op:[0.3,0.8]},
    thunder:   {count:140, vy:[7,13],  vx:[-1,1],     size:[1,2],     op:[0.4,0.9]},
    snow:      {count:60,  vy:[1.2,2.7],vx:[-0.3,0.3],size:[2,5],     op:[0.3,0.8]},
    hail:      {count:80,  vy:[8,14],  vx:[-0.3,0.3], size:[3,6],     op:[0.6,0.95]},
    sandstorm: {count:120, vy:[-0.5,0.5],vx:[5,12],   size:[3,7],     op:[0.3,0.7]},
    sakura:    {count:50,  vy:[0.6,1.5],vx:[-1,1],    size:[14,22],   op:[0.7,1],   emojis:['🌸','🌺']},
    leaves:    {count:40,  vy:[0.5,1.2],vx:[-1.5,1.5],size:[14,22],   op:[0.7,1],   emojis:['🍂','🍁','🍃']},
  };
  const c = config[type];
  if(!c) return;

  for(let i = 0; i < c.count; i++){
    const p = {
      x: Math.random()*cv.width,
      y: Math.random()*cv.height,
      vy: c.vy[0] + Math.random()*(c.vy[1]-c.vy[0]),
      vx: c.vx[0] + Math.random()*(c.vx[1]-c.vx[0]),
      size: c.size[0] + Math.random()*(c.size[1]-c.size[0]),
      op:   c.op[0]  + Math.random()*(c.op[1]-c.op[0]),
    };
    if(c.emojis){
      p.emoji = c.emojis[Math.floor(Math.random()*c.emojis.length)];
      p.rot = Math.random() * Math.PI * 2;
      p.rotSpeed = -0.03 + Math.random() * 0.06;
    }
    particles.push(p);
  }
}

function makeThunderBolt(){
  const x = Math.random() * cv.width;
  const pts = [{x, y: 0}];
  let cy = 0;
  while(cy < cv.height * 0.6){
    cy += 30 + Math.random() * 50;
    pts.push({x: pts[pts.length-1].x + (-40 + Math.random()*80), y: cy});
  }
  return pts;
}

function updateThunder(dt){
  if(weather !== 'thunder') return;
  thunderFlash = Math.max(0, thunderFlash - dt * 4);
  thunderTimer -= dt;
  if(thunderTimer <= 0){
    thunderFlash = 0.9;
    thunderBolt = makeThunderBolt();
    thunderTimer = 3 + Math.random() * 5;
  }
}

// TERRAIN GENERATION

// Helper: smooth a height map by averaging neighbors
function smoothHeights(h, passes=1){
  for(let p=0;p<passes;p++){
    const nh={};
    for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
      let sum=0, cnt=0;
      for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
        const nr=r+dr, nc=c+dc;
        if(nr<0||nr>=GRID||nc<0||nc>=GRID) continue;
        const v = h[`${nc},${nr}`];
        if(v===undefined) continue;
        sum+=v; cnt++;
      }
      if(cnt>0) nh[`${c},${r}`] = Math.round(sum/cnt);
    }
    Object.assign(h, nh);
  }
}

// Helper: carve a river along a winding path
function carveRiver(t, seed, startSide){
  const rng = mulberry32(seed);
  let x, y, dx, dy;
  if(startSide === 'top'){ x = Math.floor(rng()*GRID); y = 0; dx = 0; dy = 1; }
  else if(startSide === 'left'){ x = 0; y = Math.floor(rng()*GRID); dx = 1; dy = 0; }
  else if(startSide === 'right'){ x = GRID-1; y = Math.floor(rng()*GRID); dx = -1; dy = 0; }
  else { x = Math.floor(rng()*GRID); y = GRID-1; dx = 0; dy = -1; }
  for(let step=0; step<GRID*2; step++){
    if(x<0||x>=GRID||y<0||y>=GRID) break;
    t[`${Math.floor(x)},${Math.floor(y)}`] = 'water';
    // Random wobble
    if(rng()<0.35){
      if(dx===0){ x += (rng()<0.5?-1:1); }
      else { y += (rng()<0.5?-1:1); }
    }
    x += dx; y += dy;
  }
}

// Classify terrain by elevation thresholds
function classifyByHeight(t, h, profile){
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const key=`${c},${r}`;
    const v = h[key] ?? 0;
    let type = 'water';
    for(const [thresh, tname] of profile){
      if(v >= thresh){ type = tname; break; }
    }
    t[key] = type;
    if(type === 'water') delete h[key];
  }
}

function genGrassland(s){
  const n=makeNoise(s),n2=makeNoise(s+1),t={},h={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const v = n(c/9, r/9)*0.55 + n2(c/4, r/4)*0.30 + n2(c/2, r/2)*0.15;
    const eleva = (v + 0.4) * 6;
    h[`${c},${r}`] = Math.max(0, Math.round(eleva));
  }
  smoothHeights(h, 1);
  // Add a winding stream
  if(Math.random() < 0.7) carveRiver(t, s+11, ['top','bottom','left','right'][Math.floor(Math.random()*4)]);
  // Classify by height
  classifyByHeight(t, h, [[6,'dark'],[3,'grass'],[2,'grass'],[1,'sand'],[0,'water']]);
  // Re-overlay river (water takes precedence)
  if(Math.random() < 0.7) carveRiver(t, s+11, ['top','bottom','left','right'][Math.floor(Math.random()*4)]);
  // Heights below ground level get cleared
  for(const k in h) if(t[k]==='water') delete h[k];
  return {terrain:t, heights:h};
}

function genIsland(s){
  const n=makeNoise(s), n2=makeNoise(s+1), t={}, h={};
  const cx = GRID/2, cy = GRID/2;
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const dx=(c-cx)/cx, dy=(r-cy)/cy;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const noise = n(c/7, r/7)*0.4 + n2(c/3, r/3)*0.2;
    const v = noise - dist*1.15 + 0.4;
    h[`${c},${r}`] = Math.max(0, Math.round(v * 8));
  }
  smoothHeights(h, 1);
  classifyByHeight(t, h, [[6,'dark'],[3,'grass'],[2,'grass'],[1,'sand'],[0,'water']]);
  return {terrain:t, heights:h};
}

function genMountain(s){
  const n=makeNoise(s), n2=makeNoise(s+99), n3=makeNoise(s+33), t={}, h={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const v = n(c/6, r/6)*0.55 + n2(c/3, r/3)*0.30 + n3(c/12, r/12)*0.15;
    h[`${c},${r}`] = Math.max(0, Math.round((v + 0.35) * 10));
  }
  smoothHeights(h, 1);
  classifyByHeight(t, h, [[8,'snow'],[6,'snow'],[4,'dark'],[2,'grass'],[1,'sand'],[0,'water']]);
  return {terrain:t, heights:h};
}

function genDesert(s){
  const n=makeNoise(s), n2=makeNoise(s+7), t={}, h={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    // Dune-like ridges using directional noise
    const dune = Math.sin((c + n2(c/8,r/8)*6) * 0.7) * 0.3;
    const v = n(c/9, r/9)*0.5 + n2(c/4, r/4)*0.25 + dune;
    h[`${c},${r}`] = Math.max(0, Math.round((v + 0.4) * 5));
  }
  smoothHeights(h, 1);
  classifyByHeight(t, h, [[4,'dark'],[1,'sand'],[0,'sand']]);
  // Rare oasis spot
  if(Math.random() < 0.4){
    const ox = 2 + Math.floor(Math.random()*(GRID-4));
    const oy = 2 + Math.floor(Math.random()*(GRID-4));
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      const cc=ox+dc, rr=oy+dr;
      if(cc<0||cc>=GRID||rr<0||rr>=GRID) continue;
      const d = Math.abs(dc)+Math.abs(dr);
      const k=`${cc},${rr}`;
      if(d===0) t[k]='water';
      else if(d===1) t[k]='grass';
      delete h[k];
    }
  }
  return {terrain:t, heights:h};
}

function genSnow(s){
  const n=makeNoise(s), n2=makeNoise(s+5), t={}, h={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const v = n(c/7, r/7)*0.7 + n2(c/3, r/3)*0.3;
    h[`${c},${r}`] = Math.max(0, Math.round((v + 0.3) * 7));
  }
  smoothHeights(h, 2);
  classifyByHeight(t, h, [[6,'dark'],[2,'snow'],[1,'snow'],[0,'water']]);
  return {terrain:t, heights:h};
}

function genArchipelago(s){
  const n=makeNoise(s), n2=makeNoise(s+42), n3=makeNoise(s+123), t={}, h={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const v = n(c/4, r/4)*0.55 + n2(c/2.2, r/2.2)*0.30 + n3(c/8, r/8)*0.15;
    h[`${c},${r}`] = Math.max(0, Math.round((v + 0.15) * 6));
  }
  smoothHeights(h, 1);
  classifyByHeight(t, h, [[5,'dark'],[2,'grass'],[1,'sand'],[0,'water']]);
  return {terrain:t, heights:h};
}

// NEW: Forest — dense rolling green with rare clearings
function genForest(s){
  const n=makeNoise(s), n2=makeNoise(s+13), t={}, h={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const v = n(c/7, r/7)*0.55 + n2(c/3, r/3)*0.45;
    h[`${c},${r}`] = Math.max(1, Math.round((v + 0.5) * 5));
  }
  smoothHeights(h, 1);
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const k=`${c},${r}`;
    const v = h[k];
    if(v >= 4) t[k] = 'dark';
    else t[k] = 'grass';
  }
  // Occasional water pond
  if(Math.random() < 0.6){
    const px = 2 + Math.floor(Math.random()*(GRID-4));
    const py = 2 + Math.floor(Math.random()*(GRID-4));
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      if(Math.random() < 0.65){
        const k=`${px+dc},${py+dr}`;
        if(t[k]) { t[k] = 'water'; delete h[k]; }
      }
    }
  }
  return {terrain:t, heights:h};
}

// NEW: Volcano — central peak with sloping lava-stone
function genVolcano(s){
  const n=makeNoise(s), t={}, h={};
  const cx = GRID/2, cy = GRID/2;
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const dx=(c-cx)/cx, dy=(r-cy)/cy;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const cone = Math.max(0, 1 - dist*1.1);
    const noise = n(c/5, r/5)*0.25;
    const v = cone * 9 + noise;
    h[`${c},${r}`] = Math.max(0, Math.round(v));
  }
  smoothHeights(h, 1);
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const k=`${c},${r}`;
    const v = h[k];
    if(v >= 7) t[k] = 'dark';
    else if(v >= 4) t[k] = 'dark';
    else if(v >= 2) t[k] = 'grass';
    else if(v >= 1) t[k] = 'sand';
    else { t[k] = 'water'; delete h[k]; }
  }
  // Crater at peak (water/lava pool)
  const peakKey = `${Math.floor(cx)},${Math.floor(cy)}`;
  t[peakKey] = 'water';
  delete h[peakKey];
  return {terrain:t, heights:h};
}

// NEW: Atoll — ring-shaped reef
function genAtoll(s){
  const n=makeNoise(s), t={}, h={};
  const cx = GRID/2, cy = GRID/2;
  const ringR = GRID*0.32;
  const ringW = GRID*0.14;
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const dx=(c-cx), dy=(r-cy);
    const dist = Math.sqrt(dx*dx+dy*dy);
    const ringDist = Math.abs(dist - ringR);
    const noise = n(c/4, r/4)*0.5;
    let v;
    if(ringDist < ringW){
      v = (1 - ringDist/ringW) * 4 + noise;
    } else {
      v = -1 + noise;
    }
    h[`${c},${r}`] = Math.max(0, Math.round(v));
  }
  smoothHeights(h, 1);
  classifyByHeight(t, h, [[3,'grass'],[1,'sand'],[0,'water']]);
  return {terrain:t, heights:h};
}

// NEW: Valley — river through twin mountain ridges
function genValley(s){
  const n=makeNoise(s), n2=makeNoise(s+22), t={}, h={};
  const mid = GRID/2;
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const distFromMid = Math.abs(r - mid + n(c/4,0)*2);
    const ridge = Math.max(0, (distFromMid - 1.5) * 1.5);
    const noise = n2(c/5, r/5)*0.3;
    const v = ridge + noise;
    h[`${c},${r}`] = Math.max(0, Math.round(v));
  }
  smoothHeights(h, 1);
  // Carve river along center
  for(let c=0;c<GRID;c++){
    const wobble = Math.round(n(c/5, 0)*1.5);
    const rr = Math.max(0, Math.min(GRID-1, Math.floor(mid + wobble)));
    t[`${c},${rr}`] = 'water';
    delete h[`${c},${rr}`];
  }
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const k=`${c},${r}`;
    if(t[k]==='water') continue;
    const v = h[k] || 0;
    if(v >= 6) t[k] = 'snow';
    else if(v >= 4) t[k] = 'dark';
    else if(v >= 2) t[k] = 'grass';
    else if(v >= 1) t[k] = 'sand';
    else t[k] = 'grass';
  }
  return {terrain:t, heights:h};
}

const MAP_PRESETS={
  '🌿 草原':genGrassland,
  '🏝 島':genIsland,
  '🏔 山岳':genMountain,
  '🏜 砂漠':genDesert,
  '❄️ 雪原':genSnow,
  '🌊 群島':genArchipelago,
  '🌳 森':genForest,
  '🌋 火山':genVolcano,
  '🏖 環礁':genAtoll,
  '🏞 谷':genValley,
};

function applyTerrainMap(result){
  // Accept either {terrain, heights} or legacy plain terrain object
  const tmap = result.terrain || result;
  const hmap = result.heights || {};
  for(const k in terrain)delete terrain[k];
  for(const k in heights)delete heights[k];
  Object.assign(terrain, tmap);
  Object.assign(heights, hmap);
}

// ANIMAL SYSTEM
// ═══════════════════════════════════════════
function spawnAnimal(emoji,c,r){
  if(c<0||c>=GRID||r<0||r>=GRID) return;
  const id=animalId++;
  animals[id]={id,emoji,wx:c,wy:r,tx:c,ty:r,moving:false,flip:false,speed:.6+Math.random()*.8,waitTimer:.5+Math.random()*2,excited:0};
  history.push({type:'animal',id,c,r,emoji});
}
function removeAnimal(id){delete animals[id];}
function updateAnimals(dt){
  for(const id in animals){
    const a=animals[id];
    if(!a.moving){
      a.waitTimer-=dt;
      if(a.waitTimer<=0){
        for(let attempt=0;attempt<10;attempt++){
          const dc=Math.round((Math.random()-.5)*6), dr=Math.round((Math.random()-.5)*6);
          const nc=Math.floor(a.wx)+dc, nr=Math.floor(a.wy)+dr;
          if(nc<0||nc>=GRID||nr<0||nr>=GRID) continue;
          if(items[`${nc},${nr}`]) continue;
          a.tx=nc; a.ty=nr; a.moving=true;
          a.flip=(a.tx<a.wx);
          break;
        }
        a.waitTimer=.8+Math.random()*2.5;
      }
    } else {
      const dx=a.tx-a.wx, dy=a.ty-a.wy, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<.05){a.wx=a.tx;a.wy=a.ty;a.moving=false;}
      else{const step=Math.min(a.speed*dt,dist);a.wx+=dx/dist*step;a.wy+=dy/dist*step;}
    }
  }
}

let lastKey=null;
const RECENT_MAX = 50;
function pushToRecent(emoji){
  const recent = CATEGORIES['📌 履歴'];
  const idx = recent.indexOf(emoji);
  if(idx >= 0) recent.splice(idx, 1);
  recent.unshift(emoji);
  if(recent.length > RECENT_MAX) recent.length = RECENT_MAX;
  if(selCat === '📌 履歴') buildPalette();
  // Re-enable recent source button if scatter UI is built
  if(typeof refreshScatterUI === 'function') refreshScatterUI();
}

function act(c,r){
  if(c<0||c>=GRID||r<0||r>=GRID) return;
  const key=`${c},${r}`;
  if(key===lastKey) return;
  lastKey=key;
  if(mode==='place'){
    if(!selEmoji || typeof selEmoji !== 'string') return;
    if(ANIMALS.has(selEmoji)){
      spawnAnimal(selEmoji,c,r);
      pushToRecent(selEmoji);
      playPlaceSound();
    }
    else {
      if(items[key]) return;
      items[key]={emoji:selEmoji, bobOffset:Math.random()*Math.PI*2};
      history.push({type:'place',key,c,r,emoji:selEmoji});
      pushToRecent(selEmoji);
      playPlaceSound();
    }
  } else if(mode==='terrain'){
    if(terrainAction==='paint'){
      const old=terrain[key]||'grass';
      if(old===selTerrain) return;
      terrain[key]=selTerrain;
      history.push({type:'terrain',key,c,r,old,terrain:selTerrain});
    } else if(terrainAction==='up'){
      const oldH=heights[key]||0;
      if(oldH>=8) return;
      heights[key]=oldH+1;
      history.push({type:'height',key,c,r,old:oldH,new:heights[key]});
    } else if(terrainAction==='down'){
      const oldH=heights[key]||0;
      if(oldH<=0) return;
      heights[key]=oldH-1;
      if(heights[key]===0) delete heights[key];
      history.push({type:'height',key,c,r,old:oldH,new:oldH-1});
    }
  } else {
    if(items[key]){ history.push({type:'erase',key,c,r,emoji:items[key].emoji}); delete items[key]; }
  }
}

let panning=false, panStart={x:0,y:0}, panOrigin={x:0,y:0};
let placing=false;
let pinch0=null, pinchScale0=1, pinchOrigin={x:0,y:0};
let touchDownPos=null; // for tap detection
const TAP_THRESHOLD = 8; // px movement to distinguish tap vs drag

// Smooth zoom target
let targetScale=1, targetOX=0, targetOY=0;
function syncTargets(){ targetScale=scale; targetOX=OX; targetOY=OY; }
syncTargets();

// fit map on first load (called after resetView is defined below)
window.addEventListener('load', resetView);

function zoomToward(mx, my, newScale){
  newScale = Math.max(.3, Math.min(3.5, newScale));
  targetOX = mx - (mx - targetOX) * (newScale / targetScale);
  targetOY = my - (my - targetOY) * (newScale / targetScale);
  targetScale = newScale;
}

// Mouse (PC): place on mousedown + drag as before
// Moon tap → meteor shower burst
function hitMoon(sx, sy){
  if(!moonScreenPos) return false;
  const dx = sx - moonScreenPos.x, dy = sy - moonScreenPos.y;
  return (dx*dx + dy*dy) <= (moonScreenPos.r * 1.8) ** 2;
}
function tryMoonTap(sx, sy){
  if(!hitMoon(sx, sy)) return false;
  // Burst of meteors
  const total = 18 + Math.floor(Math.random() * 12);
  for(let i = 0; i < total; i++){
    setTimeout(spawnMeteor, i * (60 + Math.random() * 140));
  }
  return true;
}

// Sun tap → only when raining: fade rain out, then rainbow appears
function hitSun(sx, sy){
  if(!sunScreenPos) return false;
  const dx = sx - sunScreenPos.x, dy = sy - sunScreenPos.y;
  return (dx*dx + dy*dy) <= (sunScreenPos.r * 1.5) ** 2;
}
let rainFading = false; // true while rain is stopping after sun tap
function trySunTap(sx, sy){
  if(!hitSun(sx, sy)) return false;
  // Only works during rain or thunder; ignore silently otherwise
  if(weather !== 'rain' && weather !== 'thunder') return true;
  if(rainFading) return true; // already in progress
  rainFading = true;
  return true;
}
function updateRainFade(dt){
  if(!rainFading) return;
  // Fade out particles gradually
  const fadeSpeed = 0.5; // ~2s to vanish
  let allGone = true;
  for(const p of particles){
    p.op = Math.max(0, p.op - fadeSpeed * dt);
    if(p.op > 0.01) allGone = false;
  }
  // When all particles invisible: clear weather and start rainbow
  if(allGone || particles.length === 0){
    weather = 'clear';
    initWeather('clear');
    refreshWeatherBtn();
    rainFading = false;
    rainbowOn = true;
  }
}

cv.addEventListener('mousedown',e=>{
  if(e.button===1||e.button===2){panning=true;panStart={x:e.clientX,y:e.clientY};panOrigin={x:targetOX,y:targetOY};return;}
  if(tryBubbleTap(e.clientX, e.clientY)) return;
  if(tryMoonTap(e.clientX, e.clientY)) return;
  if(trySunTap(e.clientX, e.clientY)) return;
  placing=true; lastKey=null;
  const {c,r}=screenToIso(e.clientX,e.clientY); act(c,r);
});
cv.addEventListener('mousemove',e=>{
  const {c,r}=screenToIso(e.clientX,e.clientY);
  hoverCell=(c>=0&&c<GRID&&r>=0&&r<GRID)?{c,r}:null;
  if(panning){targetOX=panOrigin.x+(e.clientX-panStart.x);targetOY=panOrigin.y+(e.clientY-panStart.y);return;}
  if(placing) act(c,r);
});
cv.addEventListener('mouseup',e=>{if(e.button===1||e.button===2)panning=false;placing=false;lastKey=null;});
cv.addEventListener('contextmenu',e=>e.preventDefault());
cv.addEventListener('wheel',e=>{
  // wheel disabled - use +/- buttons
},{passive:true});

// Touch: place only on touchend if tap (not drag), pan/pinch with 2 fingers
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    // 2-finger pan only (no pinch zoom)
    panStart={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};
    panOrigin={x:targetOX,y:targetOY};
    panning=true; touchDownPos=null; return;
  }
  touchDownPos={x:e.touches[0].clientX, y:e.touches[0].clientY};
  panning=false;
},{passive:false});

cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2&&panning){
    const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
    targetOX=panOrigin.x+(cx-panStart.x);
    targetOY=panOrigin.y+(cy-panStart.y);
    return;
  }
  if(!touchDownPos) return;
  const dx=e.touches[0].clientX-touchDownPos.x, dy=e.touches[0].clientY-touchDownPos.y;
  if(Math.sqrt(dx*dx+dy*dy) > TAP_THRESHOLD){
    if(!panning){
      panning=true;
      panStart={x:touchDownPos.x, y:touchDownPos.y};
      panOrigin={x:targetOX, y:targetOY};
    }
    targetOX=panOrigin.x+(e.touches[0].clientX-panStart.x);
    targetOY=panOrigin.y+(e.touches[0].clientY-panStart.y);
  }
},{passive:false});

cv.addEventListener('touchend',e=>{
  e.preventDefault();
  if(touchDownPos && !panning){
    if(tryBubbleTap(touchDownPos.x, touchDownPos.y) || tryMoonTap(touchDownPos.x, touchDownPos.y) || trySunTap(touchDownPos.x, touchDownPos.y)){
      touchDownPos=null; panning=false; pinch0=null; lastKey=null;
      return;
    }
    const {c,r}=screenToIso(touchDownPos.x, touchDownPos.y);
    lastKey=null;
    act(c,r);
  }
  touchDownPos=null; panning=false; pinch0=null; lastKey=null;
},{passive:false});

// Reset view: fit entire map on screen
function resetView(){
  const {TW,TH} = getTileDims();
  const maxW = cv.width  * 0.88;
  const maxH = (cv.height - 120) * 0.88;
  let fitScale, ox, oy;
  if(drawMode==='3d'){
    // Isometric map: width = GRID*TW, height = GRID*TH (diamond shape)
    fitScale = Math.min(maxW / (GRID * TW), maxH / (GRID * TH));
    // OX = screen center (iso origin is center-top of diamond)
    ox = cv.width / 2;
    oy = cv.height / 2 - (GRID * TH / 2) * fitScale + 20;
  } else {
    // 2D square: simple rect, scaled down 1 step from full-fit
    fitScale = Math.min(maxW / (GRID * TW), maxH / (GRID * TH)) * 0.8;
    ox = cv.width  / 2 - (GRID * TW / 2) * fitScale - 30;
    oy = cv.height / 2 - (GRID * TH / 2) * fitScale + 20;
  }
  targetScale = fitScale;
  targetOX = ox;
  targetOY = oy;
  // Immediately snap (no lerp delay on mode switch)
  scale = fitScale; OX = ox; OY = oy;
}
document.getElementById('btn-reset-view').addEventListener('click', resetView);

let selCat='🌿 自然';
// カテゴリ名の読み（ひらがな昇順ソート用）
const CAT_YOMI = {
  '🎄 イベント':'いべんと',
  '🌿 自然':'しぜん',
  '🎪 その他':'そのた',
  '✨ 空':'そら',
  '🏗 建物':'たてもの',
  '🍎 食べ物':'たべもの',

  '🚗 乗り物':'のりもの',
  '🧑 人':'ひと',
  '📌 履歴':'りれき',
};
function sortedCats(){
  const HISTORY = '📌 履歴';
  const rest = Object.keys(CATEGORIES)
    .filter(c => c !== HISTORY)
    .sort((a,b)=>{
      const ya = CAT_YOMI[a] || a, yb = CAT_YOMI[b] || b;
      return ya.localeCompare(yb, 'ja');
    });
  return Object.keys(CATEGORIES).includes(HISTORY) ? [HISTORY, ...rest] : rest;
}
function buildCatTabs(){
  const el=document.getElementById('cattabs');el.innerHTML='';
  sortedCats().forEach(cat=>{
    const t=document.createElement('button');t.className='cattab'+(cat===selCat?' active':'');
    t.textContent=tr('cat:'+cat);t.addEventListener('click',()=>{selCat=cat;buildCatTabs();buildPalette();});
    el.appendChild(t);
  });
}
function makeEbtn(e){
  const btn=document.createElement('button');
  const fx = fxType(e);
  btn.className='ebtn'+(e===selEmoji?' active':'')+(e==='🏪'?' ebtn-rainbow':'')+(fx?(' ebtn-fx-'+fx):'');
  btn.textContent=e;
  btn.addEventListener('click',()=>{document.querySelectorAll('.ebtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');selEmoji=e;if(mode!=='place'){mode='place';updateModeUI();}});
  return btn;
}
function buildPalette(){
  const el=document.getElementById('palette');el.innerHTML='';
  el.scrollTop = 0;

  if(selCat === '🎄 イベント'){

      h.textContent=tr('evt:'+sec.title);
      el.appendChild(h);
      sec.emojis.forEach(e=>el.appendChild(makeEbtn(e)));

  el.classList.remove('sectioned');

    msg.style.cssText = 'grid-column:1/-1;text-align:center;color:rgba(180,220,180,.45);font-size:11px;padding:20px 10px;line-height:1.6';
    msg.textContent = tr('empty');

}

  for(const p of ALL_POPUPS) document.getElementById(p).style.display = (p === id ? 'block' : 'none');
}
function closeAllPopups(){
  for(const p of ALL_POPUPS) document.getElementById(p).style.display = 'none';
}
function togglePopup(id){
  const el = document.getElementById(id);
  if(el.style.display === 'block') closeAllPopups();
  else openPopup(id);
}

const nmPctx = nmPreview.getContext('2d');

function nmSizeLabel(s){
  if(s<=8) return tr('nmMini');
  if(s<=15) return tr('nmSmall');
  if(s<=25) return tr('nmJust');
  if(s<=35) return tr('nmWide');
  return tr('nmHuge');
}
function drawNmPreview(){
  const W=nmPreview.width,H=nmPreview.height;
  nmPctx.clearRect(0,0,W,H);
  nmPctx.fillStyle='#1a2a1d';nmPctx.fillRect(0,0,W,H);
  const pad=6,inner=W-pad*2,cell=inner/nmSize;
  for(let r=0;r<nmSize;r++)for(let c=0;c<nmSize;c++){
    const x=pad+c*cell,y=pad+r*cell;
    const n=Math.abs(Math.sin(c*12.9+r*78.2)*43.7%1);
    nmPctx.fillStyle=`rgb(${50+n*20|0},${60+n*40|0},${40+n*15|0})`;
    nmPctx.fillRect(x,y,cell,cell);
  }
}
function updateNmLabel(){
  nmSizeEl.textContent=`${nmSize}×${nmSize}`;
  nmCellsEl.textContent=tr('nmCells',{n:nmSize*nmSize});
  nmLabelEl.textContent=nmSizeLabel(nmSize);
  nmSlider.value=nmSize;
  document.querySelectorAll('#nm-presets .nm-preset').forEach(b=>{
    b.classList.toggle('active', parseInt(b.dataset.size)===nmSize);
  });
  drawNmPreview();
}

// Weather menu
const WEATHER_ICONS = {clear:'☀️',rain:'🌧',snow:'❄️',thunder:'⛈',hail:'🧊',sandstorm:'🏜',sakura:'🌸',leaves:'🍂'};
const WEATHER_LABELS = {clear:'晴',rain:'雨',snow:'雪',thunder:'雷',hail:'雹',sandstorm:'砂',sakura:'桜',leaves:'紅'};

// Random weather state
let weatherRandomOn = false;
let weatherRandomPool = new Set(); // weather keys checked as candidates
let weatherRandomTimer = 0; // seconds until next change

function refreshWeatherBtn(){
  document.getElementById('weather-btn').textContent =
    `${WEATHER_ICONS[weather]||'☀️'} ${tr('wlabel:'+(weather||''))}`;
}
function applyWeather(w){
  weather = w;
  initWeather(w);
  rainbowOn = false;
  rainFading = false;
  refreshWeatherBtn();
}

function pickRandomWeather(){
  // Pick a random one from pool that's different from current
  const pool = [...weatherRandomPool].filter(w => w !== weather);
  if(pool.length === 0){
    // Fall back to any from pool (even if same)
    const any = [...weatherRandomPool];
    if(any.length === 0) return;
    return applyWeather(any[Math.floor(Math.random()*any.length)]);
  }
  applyWeather(pool[Math.floor(Math.random()*pool.length)]);
}

function refreshRandomToggle(){
  const tog = document.getElementById('weather-random-toggle');
  tog.classList.toggle('is-on', weatherRandomOn);
  document.getElementById('weather-popup').classList.toggle('random-on', weatherRandomOn);
  document.getElementById('weather-random-hint').style.display = weatherRandomOn ? 'block' : 'none';
}

function refreshWeatherChecks(){
  document.querySelectorAll('.weather-opt').forEach(btn=>{
    btn.classList.toggle('checked', weatherRandomPool.has(btn.dataset.weather));
  });
}

document.getElementById('weather-random-toggle').addEventListener('click',e=>{
  e.stopPropagation();
  weatherRandomOn = !weatherRandomOn;
  if(weatherRandomOn){
    // If pool is empty, seed with the current weather + 2 common ones
    if(weatherRandomPool.size === 0){
      weatherRandomPool.add('clear');
      weatherRandomPool.add('rain');
      weatherRandomPool.add('snow');
    }
    weatherRandomTimer = 30 + Math.random() * 30; // 30-60s
  }
  refreshRandomToggle();
  refreshWeatherChecks();
});

document.getElementById('weather-btn').addEventListener('click',e=>{
  e.stopPropagation();
  togglePopup('weather-popup');
  refreshRandomToggle();
  refreshWeatherChecks();
});

document.querySelectorAll('.weather-opt').forEach(btn=>{
  btn.addEventListener('click',e=>{
    const w = btn.dataset.weather;
    // If random is ON, the whole button toggles pool membership
    if(weatherRandomOn){
      if(weatherRandomPool.has(w)) weatherRandomPool.delete(w);
      else weatherRandomPool.add(w);
      refreshWeatherChecks();
      return;
    }
    // Otherwise apply immediately
    applyWeather(w);
    closeAllPopups();
  });
});

// Toggle helper: bind a toggle button to a state setter
function bindFxToggle(id, getOn, setOn, opts){
  const btn = document.getElementById(id);
  function refresh(){ btn.classList.toggle('on', getOn()); }
  btn.addEventListener('click', e=>{
    e.stopPropagation();
    if(btn.classList.contains('locked')) return;
    setOn(!getOn());
    if(opts && opts.afterToggle) opts.afterToggle(getOn());
    refresh();
  });
  return refresh;
}

// PERSISTENCE (localStorage + 1-min autosave)
// ═══════════════════════════════════════════
const SAVE_KEY = 'emoji-niwa-save';
const SAVE_VERSION = 1;
const HISTORY_SAVE_CAP = 1000; // bound persisted undo stack so it can't exceed the storage quota
const AUTOSAVE_PRESETS = [
  {ms:0,      label:'オフ'},
  {ms:30000,  label:'30秒'},
  {ms:60000,  label:'1分'},
  {ms:180000, label:'3分'},
  {ms:300000, label:'5分'},
];
let autosaveMs = 60000;
let autosaveTimerId = null;
const btnSave = document.getElementById('btn-save');
let saveFlashTid = null;

// Briefly badge the 💾 button with ✅ to signal an autosave fired.
// Uses an absolutely-positioned ::after so button/column width never shifts.
function flashSaved(){
  btnSave.classList.add('saved');
  clearTimeout(saveFlashTid);
  saveFlashTid = setTimeout(() => btnSave.classList.remove('saved'), 1600);
}
// (Re)create the autosave interval from autosaveMs; 0 = off
function restartAutosave(){
  if(autosaveTimerId !== null){ clearInterval(autosaveTimerId); autosaveTimerId = null; }
  if(autosaveMs > 0){
    autosaveTimerId = setInterval(() => { saveState(); flashSaved(); }, autosaveMs);
  }
}
function refreshAutosaveUI(){
  document.querySelectorAll('#autosave-opts .autosave-opt').forEach(b => {
    b.classList.toggle('active', Number(b.dataset.ms) === autosaveMs);
  });
}

function saveState(){
  try{
    const data = {
      v: SAVE_VERSION,
      grid: GRID,
      terrain, items, heights, animals, animalId,
      history: history.length > HISTORY_SAVE_CAP ? history.slice(-HISTORY_SAVE_CAP) : history,
      recent: CATEGORIES['📌 履歴'],
      selCat, selEmoji, selTerrain, mode,
      timeOfDay, dayPaused, weather,
      drawMode, showHeights, heightsTouched,
      muted, selectedSound,
      weatherRandomOn,
      weatherRandomPool: [...weatherRandomPool],
      fx: { aurora:auroraOn, fireworks:fireworksOn, bubbles:bubblesOn, mist:mistOn },
      autosaveMs,
      lang,
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  }catch(e){ /* quota exceeded or storage disabled — keep running */ }
}

function clearSave(){
  try{ localStorage.removeItem(SAVE_KEY); }catch(e){}
}

function loadState(){
  let data;
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    data = JSON.parse(raw);
  }catch(e){ return false; }
  if(!data || data.v !== SAVE_VERSION) return false;
  try{
    if(typeof data.grid === 'number') GRID = data.grid;

    const repl = (target, src) => { for(const k in target) delete target[k]; if(src) Object.assign(target, src); };
    repl(terrain, data.terrain);
    repl(items,   data.items);
    repl(heights, data.heights);
    repl(animals, data.animals);
    if(typeof data.animalId === 'number') animalId = data.animalId;

    // Custom solid/paint colors are stored straight into terrain as hex
    // strings; their TERRAIN_COLORS entry must be rebuilt or they fall
    // back to grass on reload.
    for(const v of Object.values(terrain)){
      if(typeof v === 'string' && v[0] === '#' && !TERRAIN_COLORS[v]) TERRAIN_COLORS[v] = [v, v];
    }

    history = Array.isArray(data.history) ? data.history : [];

    const recent = CATEGORIES['📌 履歴'];
    recent.length = 0;
    if(Array.isArray(data.recent)) recent.push(...data.recent);

    if(typeof data.selCat === 'string' && CATEGORIES[data.selCat]) selCat = data.selCat;
    if(data.selEmoji != null)   selEmoji   = data.selEmoji;
    if(data.selTerrain != null) selTerrain = data.selTerrain;
    if(data.mode)               mode       = data.mode;

    if(typeof data.timeOfDay === 'number') timeOfDay = data.timeOfDay;
    dayPaused = !!data.dayPaused;

    drawMode = data.drawMode === '2d' ? '2d' : '3d';
    rotation = drawMode === '2d' ? 1 : 0;
    showHeights    = !!data.showHeights;
    heightsTouched = !!data.heightsTouched;

    muted = !!data.muted;
    if(typeof data.selectedSound === 'string') selectedSound = data.selectedSound;

    weatherRandomOn = !!data.weatherRandomOn;
    weatherRandomPool = new Set(Array.isArray(data.weatherRandomPool) ? data.weatherRandomPool : []);
    weatherRandomTimer = 30 + Math.random() * 30;

    if(typeof data.autosaveMs === 'number' && AUTOSAVE_PRESETS.some(p => p.ms === data.autosaveMs)){
      autosaveMs = data.autosaveMs;
    }

    if(data.lang === 'en' || data.lang === 'ja') lang = data.lang;

    if(data.fx){
      auroraOn    = !!data.fx.aurora;
      fireworksOn = !!data.fx.fireworks;
      bubblesOn   = !!data.fx.bubbles;
      mistOn      = !!data.fx.mist;
    }
    if(mistOn && mistPatches.length === 0) initMist();

    // Reflect restored state across the UI
    buildCatTabs(); buildPalette();
    updateModeUI();
    refreshDimToggle();
    refreshHeightsBtn();
    refreshSoundBtn(); refreshMuteToggle();
    document.querySelectorAll('.sound-opt').forEach(b => b.classList.toggle('active', b.dataset.sound === selectedSound));
    refreshAllFxToggles();
    applyWeather(typeof data.weather === 'string' ? data.weather : weather);
    refreshRandomToggle(); refreshWeatherChecks();
    refreshAutosaveUI();
    refreshScatterUI();
    resetView(); // refit camera to the restored grid size
    return true;
  }catch(e){
    return false;
  }
}

// Build autosave-interval options into the ⚙️ settings menu
AUTOSAVE_PRESETS.forEach(({ms,label}) => {
  const b = document.createElement('button');
  b.className = 'tbtn autosave-opt';
  b.dataset.ms = ms;
  b.dataset.i18n = 'as:'+ms;
  b.textContent = tr('as:'+ms);
  b.addEventListener('click', e => {
    e.stopPropagation();
    autosaveMs = ms;
    restartAutosave();
    refreshAutosaveUI();
    saveState();
    showToast(ms === 0 ? tr('toast.autosaveOff') : tr('toast.autosaveSet',{label:tr('as:'+ms)}));
  });
  document.getElementById('autosave-opts').appendChild(b);
});
refreshAutosaveUI();

loadState();
restartAutosave();
window.addEventListener('pagehide', saveState);
document.addEventListener('visibilitychange', () => { if(document.hidden) saveState(); });

// Manual save button (💾, next to ⚙️ settings)
document.getElementById('btn-save').addEventListener('click', () => {
  saveState();
  showToast(tr('toast.saved'));
});

// Language switch (settings menu)
document.querySelectorAll('#lang-opts .lang-opt').forEach(b => {
  b.addEventListener('click', e => {
    e.stopPropagation();
    setLang(b.dataset.lang);
  });
});

// Reflect restored / default language across the whole UI
applyLang();

// ═══════════════════════════════════════════
// ANIMATE LOOP
// ═══════════════════════════════════════════
const DAY_SPEED=0.00008;
let last=performance.now(), mmTimer=0;

function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min((now-last)/1000,.05); last=now;
  animT+=dt;

  // Smooth zoom & pan
  const ease=1-Math.pow(0.01, dt*6);
  scale += (targetScale - scale) * ease;
  OX    += (targetOX - OX)       * ease;
  OY    += (targetOY - OY)       * ease;

  if(!dayPaused) timeOfDay=(timeOfDay+DAY_SPEED*60*dt)%1;

  // Auto-stop time-locked effects when time of day changes
  const night = timeOfDay < 0.27 || timeOfDay > 0.73;
  // Night-only: aurora — stop if day arrives
  if(auroraOn && !night){ auroraOn = false; refreshAurora(); }
  if(fireworksOn && !night){ fireworksOn = false; refreshFireworks(); }
  if(rainbowOn && night){ rainbowOn = false; }
  if(bubblesOn && night){ bubblesOn = false; refreshBubbles(); }
  if(mistOn && night){ mistOn = false; refreshMist(); }

  const totalMin = Math.round(timeOfDay*1440);
  document.getElementById('clock-display').textContent = `${tIcon(totalMin)} ${fmtTime(totalMin)}`;
  document.getElementById('clock-display').style.opacity = dayPaused ? .6 : 1;
  if(!dayPaused && timePopup.style.display === 'block') refreshTimePopupUI();

  updateAnimals(dt);
  updateMeteors(dt);
  updateFireworks(dt);
  if(fireworksOn){
    fireworksTimer -= dt;
    if(fireworksTimer <= 0){
      spawnFirework();
      fireworksTimer = 0.8 + Math.random() * 1.8;
    }
  }
  updateBubbles(dt);
  updateMist(dt);
  updateThunder(dt);
  updateRainbow(dt);
  updateRainFade(dt);
  // Random weather rotation
  if(weatherRandomOn && weatherRandomPool.size > 0){
    weatherRandomTimer -= dt;
    if(weatherRandomTimer <= 0){
      pickRandomWeather();
      weatherRandomTimer = 30 + Math.random() * 30;
    }
  }
  updateCloudFade(dt);
  render();

  mmTimer+=dt;if(mmTimer>.4){if(minimapEl.classList.contains('visible')) drawMinimap();mmTimer=0;}
}
requestAnimationFrame(loop);

window.addEventListener('resize',()=>{resizeCanvas();syncTargets();});
</script>
