(function mpChatWire(){
  const exp=document.getElementById('mpc-exp'), min=document.getElementById('mpc-min'),
        snd=document.getElementById('mpc-send'), inp=document.getElementById('mpc-in'),
        el=document.getElementById('mp-chat');
  if(!el) return;
  exp.addEventListener('click',e=>{ e.stopPropagation();
    el.classList.remove('min'); el.classList.toggle('exp'); mpChatLift(); });
  min.addEventListener('click',e=>{ e.stopPropagation();
    el.classList.remove('exp'); el.classList.toggle('min');
    min.textContent = el.classList.contains('min') ? '▴' : '▾'; mpChatLift(); });
  snd.addEventListener('click',e=>{ e.stopPropagation(); mpChatSend(); });
  inp.addEventListener('keydown',e=>{
    e.stopPropagation();
    if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); mpChatSend(); }
  });
  window.addEventListener('resize', mpChatLift);
})();
function mpConnect(){
  if(!MP_WS || !mpRoomId) return;
  mpRosterInit=false;   // (再)接続後の最初の peers は基準化（再接続で既存者を誤告知しない）
  let ws; try{ ws=new WebSocket(MP_WS + '/room/' + encodeURIComponent(mpRoomId)); }catch(_){ return; }
  mpWs=ws;
  ws.onopen=()=>{ mpRetry=0; try{ if(mpMyName) ws.send(JSON.stringify({t:'hello',name:mpMyName})); }catch(_){ } };
  ws.onmessage=mpOnMsg;
  ws.onclose=()=>{
    mpWs=null;
    if(!mpActive) return;
    mpRetry=Math.min(mpRetry+1,5);
    showToast(tr('toast.mpDisconnected'));
    setTimeout(()=>{ if(mpActive) mpConnect(); }, 800*Math.pow(2,mpRetry-1));
  };
  ws.onerror=()=>{ try{ ws.close(); }catch(_){ } };
}
function mpJoin(roomId, name){
  mpRoomId=roomId; mpMyName=name||mpName()||'ゲスト';
  // 同じタブで同じroomを再ロード（ブラウザ更新）した場合は自分の参加ログを抑制
  try{
    mpSuppressOwnJoin = sessionStorage.getItem(MP_SESS_ROOM) === roomId;
    sessionStorage.setItem(MP_SESS_ROOM, roomId);
  }catch(_){ mpSuppressOwnJoin=false; }
  mpActive=true; mpGotSnap=false; mpSeeded=false; mpJoinAnnounced=false;
  mpPeers=0; mpNames=[]; mpUpdateCountBadge();
  const log=document.getElementById('mpc-log'); if(log) log.textContent='';
  mpChatShow(true);
  mpConnect();
  mpBar('hide');                 // メニューは折りたたみ既定（👥 で展開）
  if(mpOwnerTimer) clearInterval(mpOwnerTimer);
  mpOwnerTimer=setInterval(()=>{ if(mpActive && mpOwner) mpSend(); }, 2500);  // 動物/時間の定期再同期
}

function nmSizeLabel(s){

function drawNmPreview(){
  const W=nmPreview.width,H=nmPreview.height;
  nmPctx.clearRect(0,0,W,H);
  nmPctx.fillStyle='#1a2a1d';nmPctx.fillRect(0,0,W,H);
  const pad=6,inner=W-pad*2,cell=inner/nmSize;
  for(let r=0;r<nmSize;r++)for(let c=0;c<nmSize;c++){
    const x=pad+c*cell,y=pad+r*cell;
    const n=Math.abs(Math.sin(c*12.9+r*78.2)*43.7%1);
    nmPctx.fillStyle=`rgb(${50+n*20|0},${60+n*40|0},${40+n*15|0})`;
    nmPctx.fillRect(x,y,cell,cell);
  }
}

function refreshWeatherBtn(){

    `${weatherRandomOn?'🎲 ':''}${WEATHER_ICONS[weather]||'☀️'} ${tr('wlabel:'+(weather||''))}`;

  weather = w;

function pickRandomWeather(){
  // Pick a random one from pool that's different from current
  const pool = [...weatherRandomPool].filter(w => w !== weather);
  if(pool.length === 0){
    // Fall back to any from pool (even if same)
    const any = [...weatherRandomPool];
    if(any.length === 0) return;
    return applyWeather(any[Math.floor(Math.random()*any.length)]);
  }
  applyWeather(pool[Math.floor(Math.random()*pool.length)]);
}

// ── 生成レシピ：共有URLの最小化と決定論再現に必要な「直近生成」の意図を保持 ──
// lastGen={s:seed, i:プリセット添字, m:genMode}。genClean=直前生成以降に手編集が無い印。
// MAP_PRESET_NAMES は MAP_PRESETS の宣言順を凍結（共有 av と整合：順序変更時は AE_VER を +1）。
const MAP_PRESET_NAMES = Object.keys(MAP_PRESETS);
let lastGen = null;
let genClean = false;
// 自動絵文字配置の状態（セッションのみ・localStorage 非永続）

// プリセット添字を受け取り、生成→既存 items/animals/history クリア→自動絵文字配置→genClean=true。
// 戻り値＝自動配置した個数（toast 切替用）。idx<0 or 範囲外で 0。seed 未指定で乱数。
function genByIndex(idx, seed){
  if(typeof idx !== 'number' || idx < 0 || idx >= MAP_PRESET_NAMES.length) return 0;
  if(typeof seed !== 'number') seed = Math.floor(Math.random()*99999);
  const name = MAP_PRESET_NAMES[idx];
  applyGenResult(MAP_PRESETS[name](seed));
  for(const k in items) delete items[k];
  for(const k in animals) delete animals[k];
  history = [];
  lastGen = { s: seed|0, i: idx, m: genMode };
  let aePlaced = 0;
  if(aeOn) aePlaced = placeTerrainEmoji(seed, aeDensity);
  genClean = true;
  return aePlaced;
}

// Toggle helper: bind a toggle button to a state setter
function bindFxToggle(id, getOn, setOn, opts){
  const btn = document.getElementById(id);
  function refresh(){ btn.classList.toggle('on', getOn()); }

// (Re)create the autosave interval from autosaveMs; 0 = off
function restartAutosave(){
  if(autosaveTimerId !== null){ clearInterval(autosaveTimerId); autosaveTimerId = null; }
  if(autosaveMs > 0){
    autosaveTimerId = setInterval(() => { saveState(); flashSaved(); }, autosaveMs);
  }
}
function refreshAutosaveUI(){
  document.querySelectorAll('#autosave-opts .autosave-opt').forEach(b => {
    b.classList.toggle('active', Number(b.dataset.ms) === autosaveMs);
  });
}
function refreshFpsUI(){
  document.querySelectorAll('#fps-opts .fps-opt').forEach(b => {
    b.classList.toggle('active', Number(b.dataset.v) === fpsCap);
  });
}

// 共有URL閲覧モード：true の間は一切 localStorage へ書かない（自分の箱庭を守る）
let visiting = false;

// 共有する「世界＋情景」のみ（個人設定 lang/音/ミュート/履歴等は含めない）
// 共有用コンパクトペイロード（sf:2／sf:3）。bobOffset や animals の実行時 float など
// エンティティ毎の高エントロピー値を捨て、deflate が効く形にして URL を短縮。
// sf:3 は「直近生成のレシピ＋AE 密度」だけを載せ、開封側で同一の純関数から再生成する形。
// 手編集が無い（genClean=true）かつ直近生成がある時のみ採用。それ以外は従来 sf:2 で厳密往復。
// 保存形式(saveState)と applyState は不変。decodeWorld 側で元の形へ復元する。
function worldPayload(){
  // 共通：時刻・天気・表示設定など、レシピでは再現できない情景。
  const scene = {
    timeOfDay: Math.round(timeOfDay*1e4)/1e4, dayPaused, weather,
    drawMode, showHeights, heightsTouched,
    weatherRandomOn,
    weatherRandomPool: [...weatherRandomPool],
    fx: { aurora:auroraOn, fireworks:fireworksOn, bubbles:bubblesOn, mist:mistOn },
  };
  // レシピ採用条件：直近生成が記録されており、その後に手編集が一切無いこと。
  if(lastGen && genClean){
    const p = {
      v: SAVE_VERSION, sf: 3,
      g: GRID,
      s: lastGen.s, gi: lastGen.i, gm: lastGen.m || 'height',
      av: AE_VER,
    };
    if(aeOn) p.ae = aeDensity|0;
    Object.assign(p, scene);
    return p;
  }
  // フォールバック：sf:2 で全 items/animals を載せる（厳密往復）
  const it = {};
  for(const k in items){ const v = items[k]; it[k] = (v.size>1) ? [v.emoji, v.size] : v.emoji; }
  const an = [];
  for(const id in animals){ const a = animals[id]; an.push([a.emoji, Math.round(a.wx), Math.round(a.wy)]); }
  return Object.assign({
    v: SAVE_VERSION, sf: 2,
    grid: GRID,
    terrain, heights,
    it, an,
  }, scene);
}
// コンパクト共有形式(sf:2 / sf:3) を applyState が期待する通常 data 形へ復元
function expandShared(d){
  if(!d || (d.sf !== 2 && d.sf !== 3)) return d;   // 旧共有URL(sf無し)はそのまま
  // ── sf:3：レシピから地形を再生成し、自動絵文字を計算して sf:2 相当の形を組み立てる
  let baseTerrain = null, baseHeights = null, aeIt = {}, aeAn = [], gridN = d.grid || d.g || GRID;
  if(d.sf === 3){
    gridN = (typeof d.g === 'number') ? d.g : GRID;
    const idx = (typeof d.gi === 'number') ? d.gi : -1;
    const name = (idx>=0 && idx<MAP_PRESET_NAMES.length) ? MAP_PRESET_NAMES[idx] : null;
    if(name && MAP_PRESETS[name]){
      // 配信時の GRID を一時セットして MAP_PRESETS を実行（既存ジェネレータは GRID 参照）
      const savedGrid = GRID;
      GRID = gridN;
      try {
        const res = MAP_PRESETS[name](d.s|0);
        const tmap = res.terrain || res;
        const hmapSrc = res.heights || {};
        const hmap = {};
        for(const k in hmapSrc) hmap[k] = Math.min(MAX_H, Math.max(0, Math.round(hmapSrc[k]*GEN_H_SCALE)));
        baseTerrain = tmap;
        baseHeights = (d.gm === 'flat') ? {} : hmap;
        if(typeof d.ae === 'number'){
          const r = computeTerrainEmoji(d.s|0, d.ae, baseTerrain, gridN);
          aeIt = r.it; aeAn = r.an;
        }
      } finally { GRID = savedGrid; }
    }
  }
  // ── 統合：sf:3 由来の aeIt/aeAn と、明示の d.it/d.an（sf:2 または非 clean パスの sf:3 用）をマージ
  const itSrc = Object.assign({}, aeIt, d.it || {});
  const items = {};
  for(const k in itSrc){
    const v = itSrc[k];
    const o = { emoji: Array.isArray(v) ? v[0] : v, bobOffset: Math.random()*Math.PI*2 };
    if(Array.isArray(v) && v[1] > 1) o.size = v[1];
    items[k] = o;
  }
  const anList = [...aeAn, ...(Array.isArray(d.an) ? d.an : [])];
  const animals = {};
  anList.forEach(([emoji,c,r], i) => {
    animals[i] = { id:i, emoji, wx:c, wy:r, tx:c, ty:r, moving:false, flip:false,
      speed:.6+Math.random()*.8, waitTimer:.5+Math.random()*2, excited:0, eatCD:0 };
  });
  // sf:2 互換の戻り値。sf:3 は terrain/heights を baseTerrain/baseHeights から、grid は gridN から。
  if(d.sf === 3){
    return {
      v: d.v, grid: gridN,
      terrain: baseTerrain || {}, heights: baseHeights || {},
      items, animals, animalId: anList.length,
      timeOfDay: d.timeOfDay, dayPaused: d.dayPaused, weather: d.weather,
      drawMode: d.drawMode, showHeights: d.showHeights, heightsTouched: d.heightsTouched,
      weatherRandomOn: d.weatherRandomOn, weatherRandomPool: d.weatherRandomPool,
      fx: d.fx,
    };
  }
  return {
    v: d.v, grid: d.grid,
    terrain: d.terrain || {}, heights: d.heights || {},
    items, animals, animalId: anList.length,
    timeOfDay: d.timeOfDay, dayPaused: d.dayPaused, weather: d.weather,
    drawMode: d.drawMode, showHeights: d.showHeights, heightsTouched: d.heightsTouched,
    weatherRandomOn: d.weatherRandomOn, weatherRandomPool: d.weatherRandomPool,
    fx: d.fx,
  };
}
function _b64urlFromBytes(bytes){
  let s = '';
  for(let i = 0; i < bytes.length; i += 0x8000) s += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
  return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function _bytesFromB64url(str){
  const b64 = str.replace(/-/g,'+').replace(/_/g,'/');
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for(let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}
async function _streamBytes(bytes, StreamCtor){
  const cs = new StreamCtor('deflate-raw');
  const w = cs.writable.getWriter(); w.write(bytes); w.close();
  const chunks = []; const r = cs.readable.getReader();
  for(;;){ const {done,value} = await r.read(); if(done) break; chunks.push(value); }
  let len = 0; for(const c of chunks) len += c.length;
  const out = new Uint8Array(len); let o = 0;
  for(const c of chunks){ out.set(c, o); o += c.length; }
  return out;
}
// JSON→(deflate-raw 圧縮があれば圧縮)→base64url。先頭1文字タグ '1'=圧縮 '0'=非圧縮
async function encodeWorld(obj){
  const raw = new TextEncoder().encode(JSON.stringify(obj));
  if(typeof CompressionStream === 'function'){
    try{ return '1' + _b64urlFromBytes(await _streamBytes(raw, CompressionStream)); }catch(e){}
  }
  return '0' + _b64urlFromBytes(raw);
}
async function decodeWorld(str){
  try{
    if(!str || str.length < 2) return null;
    const tag = str[0], body = _bytesFromB64url(str.slice(1));
    let json;
    if(tag === '1'){
      if(typeof DecompressionStream !== 'function') return null;
      json = new TextDecoder().decode(await _streamBytes(body, DecompressionStream));
    } else {
      json = new TextDecoder().decode(body);
    }
    return expandShared(JSON.parse(json));
  }catch(e){ return null; }
}

function saveState(){
  if(visiting||mpActive) return;   // 閲覧/マルチプレイ中は保存しない（オートセーブ非干渉）
  try{
    const data = {
      v: SAVE_VERSION,
      grid: GRID,
      terrain, items, heights, animals, animalId,
      history: history.length > HISTORY_SAVE_CAP ? history.slice(-HISTORY_SAVE_CAP) : history,
      recent: CATEGORIES['📌 履歴'],
      selCat, selEmoji, selTerrain, mode,
      timeOfDay, dayPaused, weather,
      drawMode, showHeights, heightsTouched,
      muted, selectedSound,
      weatherRandomOn,
      weatherRandomPool: [...weatherRandomPool],
      fx: { aurora:auroraOn, fireworks:fireworksOn, bubbles:bubblesOn, mist:mistOn },
      autosaveMs,
      fpsCap,
      lang,
      lastStoreSize,
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  }catch(e){ /* quota exceeded or storage disabled — keep running */ }
}

function clearSave(){
  if(visiting||mpActive) return;   // 閲覧/マルチプレイ中は自分のセーブを消さない
  try{ localStorage.removeItem(SAVE_KEY); }catch(e){}
}

function loadState(){
  let data;
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    data = JSON.parse(raw);
  }catch(e){ return false; }
  return applyState(data);
}
// パース済み world データを state へ適用＋UI更新（loadState と共有URL経路で再利用）
function applyState(data){
  if(!data || data.v !== SAVE_VERSION) return false;
  try{
    if(typeof data.grid === 'number') GRID = data.grid;

    const repl = (target, src) => { for(const k in target) delete target[k]; if(src) Object.assign(target, src); };
    repl(terrain, data.terrain);
    repl(items,   data.items);
    repl(heights, data.heights);
    repl(animals, data.animals);
    // ロード／共有閲覧の世界はスナップショット。直近生成の意図は引き継がない（共有は厳密往復パスへ）。
    lastGen = null;
    genClean = false;
    if(typeof data.animalId === 'number') animalId = data.animalId;

    // Custom solid/paint colors are stored straight into terrain as hex
    // strings; their TERRAIN_COLORS entry must be rebuilt or they fall
    // back to grass on reload.
    for(const v of Object.values(terrain)){
      if(typeof v === 'string' && v[0] === '#' && !TERRAIN_COLORS[v]) TERRAIN_COLORS[v] = [v, v];
    }

    history = Array.isArray(data.history) ? data.history : [];

    // recent はセーブには必ず含まれるが共有ペイロードには無い。
    // 無い場合は閲覧者の履歴を消さない（個人設定を尊重）。
    if(Array.isArray(data.recent)){
      const recent = CATEGORIES['📌 履歴'];
      recent.length = 0;
      recent.push(...data.recent);
    }

    if(typeof data.selCat === 'string' && CATEGORIES[data.selCat]) selCat = data.selCat;
    if(data.selEmoji != null)   selEmoji   = data.selEmoji;
    if(data.selTerrain != null) selTerrain = data.selTerrain;
    if(data.mode)               mode       = data.mode;

    if(typeof data.timeOfDay === 'number') timeOfDay = data.timeOfDay;
    dayPaused = !!data.dayPaused;

    drawMode = data.drawMode === '2d' ? '2d' : '3d';
    rotation = drawMode === '2d' ? 1 : 0;
    showHeights    = !!data.showHeights;
    heightsTouched = !!data.heightsTouched;

    // muted も共有ペイロードには無い。無い場合は閲覧者のミュート設定を維持。
    if(typeof data.muted === 'boolean') muted = !!data.muted;
    if(typeof data.selectedSound === 'string') selectedSound = data.selectedSound;

    weatherRandomOn = !!data.weatherRandomOn;
    weatherRandomPool = new Set(Array.isArray(data.weatherRandomPool) ? data.weatherRandomPool : []);
    weatherRandomTimer = 30 + Math.random() * 30;

    if(typeof data.autosaveMs === 'number' && AUTOSAVE_PRESETS.some(p => p.ms === data.autosaveMs)){
      autosaveMs = data.autosaveMs;
    }
    if(FPS_PRESETS.includes(data.fpsCap)) fpsCap = data.fpsCap;

    if(data.lang === 'en' || data.lang === 'ja') lang = data.lang;
    if(data.lastStoreSize === 3 || data.lastStoreSize === 1) lastStoreSize = data.lastStoreSize;

    if(data.fx){
      auroraOn    = !!data.fx.aurora;
      fireworksOn = !!data.fx.fireworks;
      bubblesOn   = !!data.fx.bubbles;
      mistOn      = !!data.fx.mist;
    }
    if(mistOn && mistPatches.length === 0) initMist();

    // Reflect restored state across the UI
    buildCatTabs(); buildPalette();
    updateModeUI();
    refreshDimToggle();
    refreshHeightsBtn();
    refreshSoundBtn(); refreshMuteToggle();
    document.querySelectorAll('.sound-opt').forEach(b => b.classList.toggle('active', b.dataset.sound === selectedSound));
    refreshAllFxToggles();
    applyWeather(typeof data.weather === 'string' ? data.weather : weather);
    refreshRandomToggle(); refreshWeatherChecks();
    refreshAutosaveUI();
    refreshFpsUI();
    refreshScatterUI();
    resetView(); // refit camera to the restored grid size
    return true;
  }catch(e){
    return false;
  }
}

// Build autosave-interval options into the ⚙️ settings menu
AUTOSAVE_PRESETS.forEach(({ms,label}) => {
  const b = document.createElement('button');
  b.className = 'tbtn autosave-opt';
  b.dataset.ms = ms;
  b.dataset.i18n = 'as:'+ms;
  b.textContent = tr('as:'+ms);
  b.addEventListener('click', e => {
    e.stopPropagation();
    autosaveMs = ms;
    restartAutosave();
    refreshAutosaveUI();
    saveState();
    showToast(ms === 0 ? tr('toast.autosaveOff') : tr('toast.autosaveSet',{label:tr('as:'+ms)}));
  });
  document.getElementById('autosave-opts').appendChild(b);
});
refreshAutosaveUI();

FPS_PRESETS.forEach(v => {
  const b = document.createElement('button');
  b.className = 'tbtn fps-opt';
  b.dataset.v = v;
  b.dataset.i18n = 'fps:'+v;
  b.textContent = tr('fps:'+v);
  b.addEventListener('click', e => {
    e.stopPropagation();
    fpsCap = v;
    refreshFpsUI();   // 選択を色づけ表示（トーストなし）
    saveState();
  });
  document.getElementById('fps-opts').appendChild(b);
});
refreshFpsUI();

// 起動分岐: #auth=（ログイン受領）→ #r=（マルチプレイルーム）→ #w=（共有リンク閲覧）→ 通常ロード
(async () => {
  let h = location.hash || '';
  if(h.startsWith('#auth=')){
    mpSetToken(decodeURIComponent(h.slice(6)));
    try{ history.replaceState(null, '', location.pathname); }catch(_){}
    showToast(tr('toast.loggedIn'));
    h = location.hash || '';
  } else if(h.startsWith('#authdenied')){
    try{ history.replaceState(null, '', location.pathname); }catch(_){}
    showToast(tr('auth.denied'));
    h = location.hash || '';
  }
  if(h.startsWith('#r=')){
    const saved=mpName();
    const nm = saved ? saved : mpAskName();   // 保存名があれば再入力不要＝ブラウザ更新時に聞かない
    if(nm==null){                // 表示名キャンセル（保存名なし時のみ）→ 参加せず自分の世界へ
      try{ history.replaceState(null,'',location.pathname); }catch(_){ }
      loadState(); restartAutosave(); return;
    }
    loadState();                 // 自分の世界をメモリへ（保存は mpActive でガード＝非干渉）
    mpJoin(h.slice(3), nm);
    showToast(tr('toast.roomJoined'));
    return;                      // restartAutosave しない＝オートセーブ非干渉
  }
  if(h.startsWith('#w=')){
    const d = await decodeWorld(h.slice(3));
    if(d && d.v === SAVE_VERSION && applyState(d)){
      visiting = true;            // saveState/clearSave を無効化（オートセーブ非干渉）
      showVisitingBar();          // restartAutosave は呼ばない＝タイマー非起動
      return;
    }
    showToast(tr('toast.shareError'));   // 不正/非対応 → 自分の世界へフォールバック
  }
  loadState();
  restartAutosave();
})();
window.addEventListener('pagehide', saveState);
document.addEventListener('visibilitychange', () => { if(document.hidden) saveState(); });

// Manual save button (💾, next to ⚙️ settings)
document.getElementById('btn-save').addEventListener('click', () => {
  saveState();
  showToast(tr('toast.saved'));
});

// Language switch (settings menu)
document.querySelectorAll('#lang-opts .lang-opt').forEach(b => {
  b.addEventListener('click', e => {
    e.stopPropagation();
    setLang(b.dataset.lang);
  });
});

// Reflect restored / default language across the whole UI
applyLang();

// ═══════════════════════════════════════════
// ANIMATE LOOP
// ═══════════════════════════════════════════
const DAY_SPEED=0.00008;
let last=performance.now(), mmTimer=0;

function loop(now){
  requestAnimationFrame(loop);
  if(fpsCap>0 && now-last < 1000/fpsCap - 1) return; // フレーム間引き（rAFは自走）
  const dt=Math.min((now-last)/1000,.05); last=now;
  animT+=dt;

  // Smooth zoom & pan
  const ease=1-Math.pow(0.01, dt*6);
  scale += (targetScale - scale) * ease;
  OX    += (targetOX - OX)       * ease;
  OY    += (targetOY - OY)       * ease;

  if(!dayPaused) timeOfDay=(timeOfDay+DAY_SPEED*60*dt)%1;

  // Auto-stop time-locked effects when time of day changes
  const night = timeOfDay < 0.27 || timeOfDay > 0.73;
  // Night-only: aurora — stop if day arrives
  if(auroraOn && !night){ auroraOn = false; refreshAurora(); }
  if(fireworksOn && !night){ fireworksOn = false; refreshFireworks(); }
  if(rainbowOn && night){ rainbowOn = false; }
  if(bubblesOn && night){ bubblesOn = false; refreshBubbles(); }
  if(mistOn && night){ mistOn = false; refreshMist(); }

  const totalMin = Math.round(timeOfDay*1440);
  document.getElementById('clock-display').textContent = `${tIcon(totalMin)} ${fmtTime(totalMin)}`;
  document.getElementById('clock-display').style.opacity = dayPaused ? .6 : 1;
  if(!dayPaused && timePopup.style.display === 'block') refreshTimePopupUI();

  updateAnimals(dt);
  updateMeteors(dt);
  updateFireworks(dt);
  if(fireworksOn){
    fireworksTimer -= dt;
    if(fireworksTimer <= 0){
      spawnFirework();
      fireworksTimer = 0.8 + Math.random() * 1.8;
    }
  }
  updateBubbles(dt);
  updateEatFx(dt);
  updateMist(dt);
  updateThunder(dt);
  updateRainbow(dt);
  updateRainFade(dt);
  // Random weather rotation
  if(weatherRandomOn && weatherRandomPool.size > 0){
    weatherRandomTimer -= dt;
    if(weatherRandomTimer <= 0){
      pickRandomWeather();
      weatherRandomTimer = 30 + Math.random() * 30;
    }
  }
  updateCloudFade(dt);
  render();

  mmTimer+=dt;if(mmTimer>.4){if(minimapEl.classList.contains('visible')) drawMinimap();mmTimer=0;}
}
requestAnimationFrame(loop);

window.addEventListener('resize',()=>{resizeCanvas();syncTargets();});
