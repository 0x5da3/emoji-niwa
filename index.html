  for(let i=0;i<n;i++){
    const ang=(i/n)*Math.PI*2+Math.random()*0.4, sp=30+Math.random()*40;
    particles.push({x:sx,y:sy,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp-20,
      life:0,maxLife:0.35+Math.random()*0.25,size:1.5+Math.random()*2});
  }
  eatFx.push({x:sx,y:sy,emoji,t:0,maxT:0.4,particles});
}
function updateEatFx(dt){
  for(let i=eatFx.length-1;i>=0;i--){
    const f=eatFx[i]; f.t+=dt; let alive=f.t<f.maxT;
    for(const p of f.particles){
      p.life+=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=120*dt;
      p.vx*=0.95; p.vy*=0.95; if(p.life<p.maxLife) alive=true;
    }
    if(!alive) eatFx.splice(i,1);
  }
}
function drawEatFx(){
  for(const f of eatFx){
    const k=Math.max(0,1-f.t/f.maxT);          // 絵文字: 縮小フェード
    if(k>0){
      const sz=Math.max(8,Math.floor(TILE_W*scale*0.7*k));
      ctx.globalAlpha=k;
      ctx.drawImage(getEmojiImg(f.emoji,sz),f.x-sz/2,f.y-sz/2,sz,sz);
      ctx.globalAlpha=1;
    }
    for(const p of f.particles){                // くずパーティクル
      const fade=Math.max(0,1-p.life/p.maxLife); if(fade<=0) continue;
      ctx.fillStyle=`rgba(180,140,90,${fade*0.85})`;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    }
  }
}
function updateBubbles(dt){
  if(bubblesOn && bubbles.length < 30 && Math.random() < 0.15){
    bubbles.push({
      x: Math.random() * cv.width,
      y: cv.height + 10,
      vy: -(15 + Math.random() * 25),
      vx: -10 + Math.random() * 20,
      sway: Math.random() * Math.PI * 2,
      size: 12 + Math.random() * 28,
      life: 0,
    });
  }
  for(let i = bubbles.length - 1; i >= 0; i--){
    const b = bubbles[i];
    b.life += dt;
    b.sway += dt * 1.5;
    b.x += b.vx * dt + Math.sin(b.sway) * 0.6;
    b.y += b.vy * dt;
    if(b.y < -30 || b.life > 12) bubbles.splice(i, 1);
  }
  // Update pop particles
  for(let i = bubblePops.length - 1; i >= 0; i--){
    const pop = bubblePops[i];
    let allDead = true;
    for(const p of pop.particles){
      p.life += dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 80 * dt; // gravity
      p.vx *= 0.96; p.vy *= 0.96;
      if(p.life < p.maxLife) allDead = false;
    }
    if(allDead) bubblePops.splice(i, 1);
  }
}
function popBubble(b){
  const particles = [];
  const count = 8 + Math.floor(Math.random()*5);
  for(let i = 0; i < count; i++){
    const ang = (i / count) * Math.PI * 2 + Math.random() * 0.3;
    const sp = 40 + Math.random() * 50;
    particles.push({
      x: b.x, y: b.y,
      vx: Math.cos(ang) * sp,
      vy: Math.sin(ang) * sp,
      life: 0, maxLife: 0.4 + Math.random() * 0.3,
      size: 1.5 + Math.random() * 2,
    });
  }
  bubblePops.push({x: b.x, y: b.y, r: b.size, t: 0, particles});
  if(!muted) KawaiiSounds.play('bubblePop');
}
function tryBubbleTap(sx, sy){
  // Iterate from newest (drawn last/topmost) to oldest
  for(let i = bubbles.length - 1; i >= 0; i--){
    const b = bubbles[i];
    const dx = sx - b.x, dy = sy - b.y;
    if(dx*dx + dy*dy <= b.size * b.size){
      popBubble(b);
      bubbles.splice(i, 1);
      return true;
    }
  }
  return false;
}
function drawBubbles(){
  for(const b of bubbles){
    const grd = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.size);
    grd.addColorStop(0,   'rgba(255,255,255,0)');
    grd.addColorStop(0.7, 'rgba(180,220,255,0.15)');
    grd.addColorStop(1,   'rgba(255,255,255,0.55)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,200,220,0.5)';
    ctx.beginPath(); ctx.arc(b.x - b.size*0.3, b.y - b.size*0.3, b.size*0.15, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath(); ctx.arc(b.x - b.size*0.35, b.y - b.size*0.35, b.size*0.08, 0, Math.PI*2); ctx.fill();
  }
  // Pop splashes
  for(const pop of bubblePops){
    for(const p of pop.particles){
      const fade = Math.max(0, 1 - p.life / p.maxLife);
      if(fade <= 0) continue;
      ctx.fillStyle = `rgba(200,225,255,${fade * 0.85})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = `rgba(255,255,255,${fade})`;
      ctx.beginPath(); ctx.arc(p.x - p.size*0.3, p.y - p.size*0.3, p.size*0.4, 0, Math.PI*2); ctx.fill();
    }
  }
}

// ── Morning Mist (day) ──────────────────────────────────
let mistOn = false;
const mistPatches = [];
function initMist(){
  mistPatches.length = 0;
  // Pre-populate so it's already there when toggled on
  for(let i = 0; i < 14; i++){
    mistPatches.push({
      x: Math.random() * cv.width,
      y: cv.height * (0.55 + Math.random() * 0.35),
      vx: 6 + Math.random() * 8,
      size: 80 + Math.random() * 120,
      opacity: 0.15 + Math.random() * 0.15,
      phase: Math.random() * Math.PI * 2,
    });
  }
}
function updateMist(dt){
  if(!mistOn) return;
  for(const m of mistPatches){
    m.x += m.vx * dt;
    m.phase += dt * 0.3;
    if(m.x - m.size > cv.width){
      m.x = -m.size;
      m.y = cv.height * (0.55 + Math.random() * 0.35);
    }
  }
}
function drawMist(){
  if(!mistOn || mistPatches.length === 0) return;
  // Only show during day with morning-bias (stronger 0.27-0.45)
  let dayAlpha = 0;
  if(timeOfDay >= 0.27 && timeOfDay <= 0.73){
    if(timeOfDay < 0.32) dayAlpha = (timeOfDay - 0.27) / 0.05;
    else if(timeOfDay > 0.68) dayAlpha = (0.73 - timeOfDay) / 0.05;
    else dayAlpha = 1;
    // Bias: thicker in morning, thinner after noon
    if(timeOfDay < 0.5) dayAlpha *= 1.0;
    else dayAlpha *= 0.7;
  }
  if(dayAlpha <= 0) return;

  ctx.save();
  for(const m of mistPatches){
    const breathe = Math.sin(m.phase) * 0.15 + 1;
    const r = m.size * breathe;
    const op = m.opacity * dayAlpha * breathe;
    const grd = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, r);
    grd.addColorStop(0,   `rgba(240,245,250,${op})`);
    grd.addColorStop(0.6, `rgba(240,245,250,${op * 0.4})`);
    grd.addColorStop(1,   `rgba(240,245,250,0)`);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.ellipse(m.x, m.y, r, r * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ── Aurora ──────────────────────────────────────────────
let auroraOn = false;
function drawAurora(){
  if(!auroraOn) return;
  // Only visible at night
  let nightAlpha = 0;
  if(timeOfDay < 0.27)      nightAlpha = Math.min(1, (0.27 - timeOfDay) * 8);
  else if(timeOfDay > 0.73) nightAlpha = Math.min(1, (timeOfDay - 0.73) * 8);
  if(nightAlpha <= 0) return;

  const W = cv.width, H = cv.height;
  const bandsCount = 3;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  for(let b = 0; b < bandsCount; b++){
    const phase = animT * 0.3 + b * 1.7;
    const baseY = H * (0.12 + b * 0.06);
    const amplitude = H * 0.08;
    const segments = 40;

    // Draw one curtain as a vertical gradient ribbon
    ctx.beginPath();
    ctx.moveTo(0, H * 0.5);
    // top wavy edge
    for(let i = 0; i <= segments; i++){
      const x = (i / segments) * W;
      const wave = Math.sin(x * 0.005 + phase) * amplitude
                 + Math.sin(x * 0.013 + phase * 1.6) * amplitude * 0.4;
      ctx.lineTo(x, baseY + wave);
    }
    // bottom (flat baseline)
    ctx.lineTo(W, H * 0.55);
    ctx.lineTo(0, H * 0.55);
    ctx.closePath();

    // Gradient: top fades from green to violet, bottom transparent
    const grd = ctx.createLinearGradient(0, baseY - amplitude, 0, H * 0.55);
    const greens = ['rgba(80,255,180,', 'rgba(120,200,255,', 'rgba(180,120,255,'];
    const top = greens[b % greens.length];
    grd.addColorStop(0,    top + (0.38 * nightAlpha) + ')');
    grd.addColorStop(0.4,  top + (0.18 * nightAlpha) + ')');
    grd.addColorStop(1,    top + '0)');
    ctx.fillStyle = grd;
    ctx.fill();
  }

  // Shimmer streaks
  for(let s = 0; s < 18; s++){
    const seed = s * 53 + 11;
    const x = ((seed * 7919) % 100000) / 100000 * W;
    const localShift = Math.sin(animT * 1.2 + s) * 30;
    const y1 = H * 0.10 + ((seed * 31) % 60);
    const y2 = H * 0.50 + ((seed * 17) % 30);
    const grd = ctx.createLinearGradient(x, y1, x + localShift, y2);
    grd.addColorStop(0, `rgba(180,255,220,${0.25 * nightAlpha})`);
    grd.addColorStop(1, `rgba(180,255,220,0)`);
    ctx.strokeStyle = grd;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(x, y1);
    ctx.lineTo(x + localShift, y2);
    ctx.stroke();
  }

  ctx.restore();
}

// ── Meteor Shower ───────────────────────────────────────
const meteors = [];
function spawnMeteor(){
  // Random start position (upper screen, slight bias to top)
  const startX = Math.random() * cv.width * 1.3 - cv.width * 0.15;
  const startY = Math.random() * cv.height * 0.4 - cv.height * 0.1;
  const angle  = Math.PI * 0.18 + Math.random() * Math.PI * 0.12; // 32°〜54° downward
  const speed  = 700 + Math.random() * 600;
  // Weighted palette: ~50% colorless white-ish, ~50% colored
  const colored = [
    ['#fff8e0','#ffd070'], // warm gold
    ['#e0f0ff','#80b0ff'], // cool blue
    ['#ffe0ff','#ff80c0'], // pink
    ['#e0ffe0','#80ffb0'], // green
  ];
  const whiteish = [
    ['#ffffff','#ffffff'], // pure white
    ['#fafaff','#e0e0f0'], // cool white
    ['#fffaf0','#f0e8d8'], // warm white
    ['#f5f5f5','#cccccc'], // neutral gray-white
  ];
  const c = Math.random() < 0.5
    ? whiteish[Math.floor(Math.random() * whiteish.length)]
    : colored[Math.floor(Math.random() * colored.length)];
  meteors.push({
    x: startX, y: startY,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    life: 0, maxLife: 1.0 + Math.random() * 0.8,
    size: 1.8 + Math.random() * 1.5,
    trail: [],
    coreColor: c[0],
    tailColor: c[1],
  });
}

function updateMeteors(dt){
  for(let i = meteors.length - 1; i >= 0; i--){
    const m = meteors[i];
    m.life += dt;
    m.x += m.vx * dt;
    m.y += m.vy * dt;
    m.trail.unshift({x: m.x, y: m.y});
    if(m.trail.length > 22) m.trail.pop();
    if(m.life > m.maxLife || m.x > cv.width + 100 || m.y > cv.height + 100){
      meteors.splice(i, 1);
    }
  }
}

function drawMeteors(){
  for(const m of meteors){
    const fade = Math.min(1, m.life / 0.15) * Math.max(0, 1 - (m.life - m.maxLife * 0.6) / (m.maxLife * 0.4));

    // Thin tail line
    if(m.trail.length > 1){
      const head = m.trail[0];
      const tail = m.trail[m.trail.length - 1];
      const grd = ctx.createLinearGradient(tail.x, tail.y, head.x, head.y);
      grd.addColorStop(0, `rgba(${hexToRgb(m.tailColor)},0)`);
      grd.addColorStop(1, `rgba(${hexToRgb(m.tailColor)},${fade * 0.6})`);
      ctx.strokeStyle = grd;
      ctx.lineWidth = m.size * 0.8;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(tail.x, tail.y);
      ctx.lineTo(head.x, head.y);
      ctx.stroke();
    }

    // Soft glow around head
    const gradR = m.size * 4;
    const grd = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, gradR);
    grd.addColorStop(0, `rgba(${hexToRgb(m.coreColor)},${fade * 0.6})`);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(m.x, m.y, gradR, 0, Math.PI * 2); ctx.fill();

    // Bright core
    ctx.fillStyle = `rgba(255,255,255,${fade})`;
    ctx.beginPath(); ctx.arc(m.x, m.y, m.size * 0.7, 0, Math.PI * 2); ctx.fill();
  }
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// ── Clouds ──────────────────────────────────────────────
// Cloud visual state — smoothly interpolated toward weather target
let cloudFade = { count: 3, r:255, g:255, b:255, opacity: 0.7 };
function getCloudTarget(){
  const w = weather;
  return {
    count:
      w === 'thunder' ? 14 :
      w === 'rain'    ? 12 :
      w === 'snow'    ? 9  :
      w === 'hail'    ? 11 :
      w === 'sandstorm' ? 2 :
      w === 'sakura' || w === 'leaves' ? 5 :
      3,
    r: w === 'thunder' ? 120 : w === 'rain' ? 180 : w === 'hail' ? 170 : w === 'sandstorm' ? 210 : w === 'snow' ? 220 : 255,
    g: w === 'thunder' ? 120 : w === 'rain' ? 180 : w === 'hail' ? 180 : w === 'sandstorm' ? 180 : w === 'snow' ? 225 : 255,
    b: w === 'thunder' ? 140 : w === 'rain' ? 190 : w === 'hail' ? 200 : w === 'sandstorm' ? 120 : w === 'snow' ? 235 : 255,
    opacity: w === 'clear' ? 0.7 : 0.85,
  };
}
function updateCloudFade(dt){
  const t = getCloudTarget();
  // Slow approach: ~4s to reach target
  const rate = 0.25;
  const step = (a, b) => a + (b - a) * Math.min(1, dt * rate * 6);
  cloudFade.count   = step(cloudFade.count,   t.count);
  cloudFade.r       = step(cloudFade.r,       t.r);
  cloudFade.g       = step(cloudFade.g,       t.g);
  cloudFade.b       = step(cloudFade.b,       t.b);
  cloudFade.opacity = step(cloudFade.opacity, t.opacity);
}

function drawClouds(){
  const W = cv.width, H = cv.height;
  let dayAlpha = 0;
  if(timeOfDay >= 0.22 && timeOfDay <= 0.78){
    if(timeOfDay < 0.32) dayAlpha = (timeOfDay - 0.22) / 0.10;
    else if(timeOfDay > 0.68) dayAlpha = (0.78 - timeOfDay) / 0.10;
    else dayAlpha = 1;
  }
  if(dayAlpha <= 0) return;

  // Always loop through max clouds (14), but each cloud's alpha
  // depends on whether it's within the current "count" budget.
  // This lets clouds fade in/out individually instead of popping.
  const MAX_CLOUDS = 14;
  const visibleCount = cloudFade.count;
  const baseColor = `${Math.round(cloudFade.r)},${Math.round(cloudFade.g)},${Math.round(cloudFade.b)}`;

  for(let i = 0; i < MAX_CLOUDS; i++){
    // Each cloud has a fractional position in the visibility queue.
    // If i < visibleCount, fully visible.
    // If i > visibleCount, invisible.
    // If i is between visibleCount-1 and visibleCount, fade.
    const cloudAlpha = Math.max(0, Math.min(1, visibleCount - i));
    if(cloudAlpha <= 0.005) continue;

    const seed = i * 73 + 17;
    const baseY = ((seed * 7919) % 100000) / 100000 * H * 0.45 + 20;
    const speed = 4 + ((seed * 31) % 20);
    const size  = 12 + ((seed * 53) % 70);
    const totalW = W + size * 4;
    const x = ((animT * speed + (seed * 211) % 1000) % totalW) - size * 2;

    const alpha = cloudFade.opacity * dayAlpha * cloudAlpha;
    ctx.fillStyle = `rgba(${baseColor},${alpha})`;
    ctx.beginPath();
    ctx.arc(x,             baseY,           size * 0.6, 0, Math.PI*2);
    ctx.arc(x + size * .6, baseY - size*.15, size * 0.7, 0, Math.PI*2);
    ctx.arc(x + size * 1.2, baseY,           size * 0.55,0, Math.PI*2);
    ctx.arc(x + size * .4, baseY + size*.2, size * 0.5, 0, Math.PI*2);
    ctx.arc(x + size * 1.0, baseY + size*.18,size * 0.45,0, Math.PI*2);
    ctx.fill();
  }
}

// ── Sun & Moon ────────────────────────────────────────
function drawCelestial(){
  const W = cv.width, H = cv.height;
  // Sun: visible during 0.25 (sunrise) → 0.75 (sunset)
  // Moon: visible during night (0.78 → 0.22)
  // Both follow an arc across the sky

  function drawBody(progress, color, glow, size, isSun){
    if(progress < 0 || progress > 1) return;
    const cx = W * progress;
    const peakY = H * 0.15;
    const horizonY = H * 0.55;
    const arc = Math.sin(progress * Math.PI);
    const cy = horizonY - (horizonY - peakY) * arc;

    if(isSun){
      // Glow halo
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 3.5);
      grad.addColorStop(0, glow);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(cx, cy, size * 3.5, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(cx, cy, size, 0, Math.PI * 2); ctx.fill();
    } else {
      // Moon: render glow + crescent body to offscreen, then composite
      const pad = size * 4;
      const oc = document.createElement('canvas');
      oc.width = pad * 2; oc.height = pad * 2;
      const octx = oc.getContext('2d');
      const ocx = pad, ocy = pad;

      // Glow
      const grad = octx.createRadialGradient(ocx, ocy, 0, ocx, ocy, size * 3.5);
      grad.addColorStop(0, glow);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      octx.fillStyle = grad;
      octx.beginPath(); octx.arc(ocx, ocy, size * 3.5, 0, Math.PI * 2); octx.fill();

      // Body
      octx.fillStyle = color;
      octx.beginPath(); octx.arc(ocx, ocy, size, 0, Math.PI * 2); octx.fill();

      // Bite out crescent from body only
      octx.save();
      octx.beginPath();
      octx.arc(ocx, ocy, size, 0, Math.PI*2);
      octx.clip();
      octx.globalCompositeOperation = 'destination-out';
      const offset = size * 0.45;
      octx.beginPath();
      octx.arc(ocx + offset, ocy - offset*0.2, size, 0, Math.PI*2);
      octx.fill();
      octx.restore();

      // Composite onto main canvas
      ctx.drawImage(oc, cx - pad, cy - pad);
    }
  }

  // Sun: 0.25 (left horizon) → 0.5 (peak) → 0.75 (right horizon)
  if(timeOfDay >= 0.22 && timeOfDay <= 0.78){
    const p = (timeOfDay - 0.22) / 0.56;
    const horizon = Math.abs(p - 0.5) * 2;
    const sunColor = lerpHex('#fff8d0', '#ff8030', horizon);
    drawBody(p, sunColor, 'rgba(255,200,100,0.35)', 30, true);
    // Save sun screen position for click detection
    const peakY = H * 0.15, horizonY = H * 0.55;
    const arc = Math.sin(p * Math.PI);
    sunScreenPos = { x: W * p, y: horizonY - (horizonY - peakY) * arc, r: 30 };
  } else {
    sunScreenPos = null;
  }

  // Moon: 0.78 → 1.0 → 0.0 → 0.22 (wraps)
  let mp = -1;
  if(timeOfDay >= 0.78) mp = (timeOfDay - 0.78) / 0.44;
  else if(timeOfDay <= 0.22) mp = (timeOfDay + 0.22) / 0.44;
  if(mp >= 0 && mp <= 1){
    drawBody(mp, '#f0f0e0', 'rgba(200,210,255,0.25)', 22, false);
    // Save moon screen position for click detection
    const peakY = H * 0.15, horizonY = H * 0.55;
    const arc = Math.sin(mp * Math.PI);
    moonScreenPos = { x: W * mp, y: horizonY - (horizonY - peakY) * arc, r: 22 };
  } else {
    moonScreenPos = null;
  }

  // Starry night sky
  if(timeOfDay < 0.27 || timeOfDay > 0.73){
    const opacity = timeOfDay < 0.27 ? Math.min(1, (0.27 - timeOfDay) * 8) : Math.min(1, (timeOfDay - 0.73) * 8);

    // Star field — varied sizes and warm colors
    for(let i = 0; i < 180; i++){
      const sx = ((i * 9301 + 49297) % 233280) / 233280 * W;
      const sy = ((i * 17321 + 31337) % 100000) / 100000 * H * 0.62;
      const sz = ((i * 7919) % 100) / 100; // 0..1 size category
      const tw = 0.5 + Math.sin(animT * 1.8 + i * 0.7) * 0.4 + 0.5; // twinkle 0..1.4

      let size, color;
      if(sz > 0.95){
        // Bright "stars" with cross spike
        size = 2.2;
        color = `rgba(255,250,220,${opacity * tw})`;
        ctx.fillStyle = color;
        ctx.fillRect(sx - size/2, sy - size/2, size, size);
        // 4-point spike
        ctx.fillStyle = `rgba(255,250,220,${opacity * tw * 0.6})`;
        ctx.fillRect(sx - 4, sy - 0.5, 8, 1);
        ctx.fillRect(sx - 0.5, sy - 4, 1, 8);
      } else if(sz > 0.7){
        size = 1.5;
        // Faint blue or warm tint
        color = i % 3 === 0 ? `rgba(180,200,255,${opacity * tw * 0.85})`
              : i % 3 === 1 ? `rgba(255,230,200,${opacity * tw * 0.85})`
                            : `rgba(255,255,255,${opacity * tw * 0.85})`;
        ctx.fillStyle = color;
        ctx.fillRect(sx, sy, size, size);
      } else {
        // Faint background stars
        size = 1;
        ctx.fillStyle = `rgba(255,255,255,${opacity * tw * 0.5})`;
        ctx.fillRect(sx, sy, size, size);
      }
    }

    // Occasional shooting star — deterministic by 5-second buckets
    const shootBucket = Math.floor(animT / 8);
    const shootRng = ((shootBucket * 16807) % 100000) / 100000;
    if(shootRng > 0.55){
      const phase = (animT % 8) / 8; // 0..1 across the bucket window
      if(phase > 0.1 && phase < 0.3){
        const t = (phase - 0.1) / 0.2; // 0..1 lifetime
        const startX = ((shootBucket * 7919) % 100000) / 100000 * W * 0.6;
        const startY = ((shootBucket * 12347) % 100000) / 100000 * H * 0.3;
        const len = 120;
        const dx = startX + t * 200;
        const dy = startY + t * 80;
        const alpha = Math.sin(t * Math.PI) * opacity;
        const grd = ctx.createLinearGradient(dx - len, dy - len*0.4, dx, dy);
        grd.addColorStop(0, 'rgba(255,255,255,0)');
        grd.addColorStop(1, `rgba(255,255,255,${alpha})`);
        ctx.strokeStyle = grd;
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(dx - len, dy - len*0.4); ctx.lineTo(dx, dy); ctx.stroke();
      }
    }
  }
}

function render(){
  const {sky, fog} = getSky();
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,cv.width,cv.height);

  // ── Sun & Moon ─────────────────────────────────────
  drawCelestial();

  // ── Aurora ─────────────────────────────────────────
  drawAurora();

  // ── Rainbow ────────────────────────────────────────
  drawRainbow();

  // ── Clouds ─────────────────────────────────────────
  drawClouds();

  // ── Bubbles ────────────────────────────────────────
  drawBubbles();

  // ── Meteors ────────────────────────────────────────
  drawMeteors();

  // ── Fireworks ──────────────────────────────────────
  drawFireworks();

  // ── Mist ───────────────────────────────────────────
  drawMist();

  const {TW,TH} = getTileDims();
  const eSize = Math.max(16, Math.floor(TW * scale * 0.82));

  if(drawMode==='3d'){
    const depth = TH * scale * 0.5;
    // Iso back-to-front order
    for(let sum=0;sum<GRID*2-1;sum++){
      for(let c=0;c<=sum;c++){
        const r=sum-c;
        if(c<0||c>=GRID||r<0||r>=GRID) continue;
        drawTile(c,r);
        const key=`${c},${r}`;
        if(items[key] && !(items[key].emoji === '🏪' && items[key].size > 1)){
          const {x,y}=isoToScreen(c,r);
          const lift = (heights[key]||0) * depth;
          const bob=Math.sin(animT*1.4+items[key].bobOffset)*2*scale;
          const img=getEmojiImg(items[key].emoji,eSize);
          if(items[key].emoji === '🏪') drawRainbowGlow(x, y-eSize*0.1+bob-lift, eSize);
          else drawEmojiFx(items[key].emoji, x, y-eSize*0.1+bob-lift, eSize);
          ctx.drawImage(img, x-eSize/2, y-eSize*0.6+bob-lift, eSize, eSize);
          if(items[key].emoji==='🏪') drawStoreCount(x, y-eSize*0.6+bob-lift, items[key].customers||0, eSize);
        }
      }
    }
    // Big 🏪 (size>1) — drawn on top after all tiles so front tiles can't overpaint
    for(const k in items){
      const it=items[k];
      if(it.emoji!=='🏪' || !(it.size>1)) continue;
      const n=Math.min(3,it.size|0);
      const [ac,ar]=k.split(',').map(Number);
      const p0=isoToScreen(ac,ar), p1=isoToScreen(ac+n-1,ar), p2=isoToScreen(ac,ar+n-1), p3=isoToScreen(ac+n-1,ar+n-1);
      const cx=(p0.x+p1.x+p2.x+p3.x)/4, cy=(p0.y+p1.y+p2.y+p3.y)/4;
      const lift=(heights[k]||0)*depth;
      const bob=Math.sin(animT*1.4+it.bobOffset)*2*scale;
      const bigSize=eSize*n;
      const gy=cy-eSize*0.1+bob-lift;            // glow & emoji concentric (matches 1×1)
      drawRainbowGlow(cx, gy, bigSize);
      const img=getEmojiImg('🏪',bigSize);
      ctx.drawImage(img, cx-bigSize/2, gy-bigSize/2, bigSize, bigSize);
      drawStoreCount(cx, gy-bigSize/2, it.customers||0, eSize);
    }
    // Animals in 3D
    for(const a of Object.values(animals)){
      const ac=Math.floor(a.wx), ar=Math.floor(a.wy);
      const {x,y}=isoToScreen(ac,ar);
      const lift = (heights[`${ac},${ar}`]||0) * depth;
      const hop=a.moving?Math.abs(Math.sin(animT*6+a.id))*(6*scale):0;
      const img=getEmojiImg(a.emoji,eSize);
      ctx.save();
      if(a.flip){ctx.translate(x,0);ctx.scale(-1,1);ctx.drawImage(img,-eSize/2,y-eSize*0.7-hop-lift,eSize,eSize);}
      else{ctx.drawImage(img,x-eSize/2,y-eSize*0.7-hop-lift,eSize,eSize);}
      ctx.restore();
      if(isAsleep(a)){
        const zs=Math.max(8,Math.floor(eSize*0.45));
        const zb=Math.sin(animT*2+a.id)*1.5*scale;
        ctx.globalAlpha=0.55+0.25*Math.sin(animT*3+a.id);
        ctx.drawImage(getEmojiImg('💤',zs), x+eSize*0.18, y-eSize*0.95-lift+zb, zs, zs);
        ctx.globalAlpha=1;
      }
    }
  } else {
    // 2D top-down order
    for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++) drawTile(c,r);
    // Height number overlay (only on empty tiles)
    if(showHeights){
      const fontSize = Math.max(10, Math.floor(TW*scale*0.32));
      ctx.font = `bold ${fontSize}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++){
        const key=`${c},${r}`;
        if(items[key] || storeCovering(c,r)) continue;
        const h = heights[key] || 0;
        const {x,y} = isoToScreen(c,r);
        const tw=TW*scale, th=TH*scale;
        // Subtle shadow for readability
        ctx.fillStyle = 'rgba(0,0,0,.55)';
        ctx.fillText(h, x+tw/2+1, y+th/2+1);
        ctx.fillStyle = 'rgba(255,255,255,.85)';
        ctx.fillText(h, x+tw/2, y+th/2);
      }
    }
    for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++){
      const key=`${c},${r}`;
      if(!items[key]) continue;
      if(items[key].emoji === '🏪' && items[key].size > 1) continue;   // big store: post-pass
      const {x,y}=isoToScreen(c,r);
      const tw=TW*scale,th=TH*scale;
      const bob=Math.sin(animT*1.4+items[key].bobOffset)*2*scale;
      const img=getEmojiImg(items[key].emoji,eSize);
      if(items[key].emoji === '🏪') drawRainbowGlow(x+tw/2, y+th/2+bob, eSize);
      else drawEmojiFx(items[key].emoji, x+tw/2, y+th/2+bob, eSize);
      ctx.drawImage(img, x+tw/2-eSize/2, y+th/2-eSize/2+bob, eSize, eSize);
      if(items[key].emoji==='🏪') drawStoreCount(x+tw/2, y+th/2-eSize/2+bob, items[key].customers||0, eSize);
    }
    // Big 🏪 (size>1) on top of the 2D board
    for(const k in items){
      const it=items[k];
      if(it.emoji!=='🏪' || !(it.size>1)) continue;
      const n=Math.min(3,it.size|0);
      const [ac,ar]=k.split(',').map(Number);
      const a=isoToScreen(ac,ar), b=isoToScreen(ac+n-1,ar+n-1);
      const tw=TW*scale, th=TH*scale;
      const cx=(a.x+b.x)/2+tw/2, cy=(a.y+b.y)/2+th/2;
      const bob=Math.sin(animT*1.4+it.bobOffset)*2*scale;
      const bigSize=eSize*n;
      drawRainbowGlow(cx, cy+bob, bigSize);
      const img=getEmojiImg('🏪',bigSize);
      ctx.drawImage(img, cx-bigSize/2, cy-bigSize/2+bob, bigSize, bigSize);
      drawStoreCount(cx, cy-bigSize/2+bob, it.customers||0, eSize);
    }
    for(const a of Object.values(animals)){
      const {x,y}=isoToScreen(Math.floor(a.wx),Math.floor(a.wy));
      const tw=TW*scale,th=TH*scale;
      const hop=a.moving?Math.abs(Math.sin(animT*6+a.id))*(4*scale):0;
      const img=getEmojiImg(a.emoji,eSize);
      const ax=x+tw/2+(a.wx-Math.floor(a.wx))*tw;
      const ay=y+th/2+(a.wy-Math.floor(a.wy))*th;
      ctx.save();
      if(a.flip){ctx.translate(ax,0);ctx.scale(-1,1);ctx.drawImage(img,-eSize/2,ay-eSize/2-hop,eSize,eSize);}
      else{ctx.drawImage(img,ax-eSize/2,ay-eSize/2-hop,eSize,eSize);}
      ctx.restore();
      if(isAsleep(a)){
        const zs=Math.max(8,Math.floor(eSize*0.45));
        const zb=Math.sin(animT*2+a.id)*1.5*scale;
        ctx.globalAlpha=0.55+0.25*Math.sin(animT*3+a.id);
        ctx.drawImage(getEmojiImg('💤',zs), ax+eSize*0.18, ay-eSize*0.7+zb, zs, zs);
        ctx.globalAlpha=1;
      }
    }
  }

  drawEatFx();

  if(fog>0){ ctx.fillStyle=`rgba(0,0,30,${fog*0.65})`; ctx.fillRect(0,0,cv.width,cv.height); }

  // Thunder flash (overlay during thunder weather)
  if(weather==='thunder' && thunderFlash > 0){
    ctx.fillStyle = `rgba(255,255,255,${thunderFlash * 0.6})`;
    ctx.fillRect(0, 0, cv.width, cv.height);
    if(thunderBolt){
      ctx.strokeStyle = `rgba(255,255,200,${thunderFlash})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(thunderBolt[0].x, thunderBolt[0].y);
      for(let i=1;i<thunderBolt.length;i++) ctx.lineTo(thunderBolt[i].x, thunderBolt[i].y);
      ctx.stroke();
    }
  }

  if(weather!=='clear'){
    for(const p of particles){
      p.x+=p.vx; p.y+=p.vy;
      p.rot = (p.rot||0) + (p.rotSpeed||0);
      if(p.y>cv.height + 20){p.y=-20;p.x=Math.random()*cv.width;}
      if(p.x>cv.width + 20){p.x=-20;}
      if(p.x<-20){p.x=cv.width + 20;}
      ctx.save();
      if(weather==='rain' || weather==='thunder'){
        ctx.strokeStyle=`rgba(180,220,255,${p.op})`;
        ctx.lineWidth=p.size*.5;
        ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+p.vx*4,p.y+p.vy*4);ctx.stroke();
      } else if(weather==='snow'){
        ctx.fillStyle=`rgba(255,255,255,${p.op})`;
        ctx.beginPath();ctx.arc(p.x,p.y,p.size/2,0,Math.PI*2);ctx.fill();
      } else if(weather==='hail'){
        ctx.fillStyle=`rgba(220,235,255,${p.op})`;
        ctx.beginPath();ctx.arc(p.x,p.y,p.size/2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=`rgba(255,255,255,${p.op*0.6})`;
        ctx.beginPath();ctx.arc(p.x-p.size*.2,p.y-p.size*.2,p.size/5,0,Math.PI*2);ctx.fill();
      } else if(weather==='sandstorm'){
        ctx.fillStyle=`rgba(210,170,90,${p.op*0.7})`;
        ctx.fillRect(p.x, p.y, p.size*2, p.size*0.3);
      } else if(weather==='sakura' || weather==='leaves'){
        const emoji = p.emoji;
        const img = getEmojiImg(emoji, Math.floor(p.size));
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = p.op;
        ctx.drawImage(img, -p.size/2, -p.size/2, p.size, p.size);
      }
      ctx.restore();
    }
  }
}

// Weather particles
const particles = [];
let thunderFlash = 0;
let thunderTimer = 0;
let thunderBolt = null;

function initWeather(type){
  particles.length=0;
  thunderFlash = 0; thunderTimer = 0; thunderBolt = null;
  if(type==='clear') return;

  const config = {
    rain:      {count:100, vy:[6,11],  vx:[-0.5,0.5], size:[1,1.5],   op:[0.3,0.8]},
    thunder:   {count:140, vy:[7,13],  vx:[-1,1],     size:[1,2],     op:[0.4,0.9]},
    snow:      {count:60,  vy:[1.2,2.7],vx:[-0.3,0.3],size:[2,5],     op:[0.3,0.8]},
    hail:      {count:80,  vy:[8,14],  vx:[-0.3,0.3], size:[3,6],     op:[0.6,0.95]},
    sandstorm: {count:120, vy:[-0.5,0.5],vx:[5,12],   size:[3,7],     op:[0.3,0.7]},
    sakura:    {count:50,  vy:[0.6,1.5],vx:[-1,1],    size:[14,22],   op:[0.7,1],   emojis:['🌸','🌺']},
    leaves:    {count:40,  vy:[0.5,1.2],vx:[-1.5,1.5],size:[14,22],   op:[0.7,1],   emojis:['🍂','🍁','🍃']},
  };
  const c = config[type];
  if(!c) return;

  for(let i = 0; i < c.count; i++){
    const p = {
      x: Math.random()*cv.width,
      y: Math.random()*cv.height,
      vy: c.vy[0] + Math.random()*(c.vy[1]-c.vy[0]),
      vx: c.vx[0] + Math.random()*(c.vx[1]-c.vx[0]),
      size: c.size[0] + Math.random()*(c.size[1]-c.size[0]),
      op:   c.op[0]  + Math.random()*(c.op[1]-c.op[0]),
    };
    if(c.emojis){
      p.emoji = c.emojis[Math.floor(Math.random()*c.emojis.length)];
      p.rot = Math.random() * Math.PI * 2;
      p.rotSpeed = -0.03 + Math.random() * 0.06;
    }
    particles.push(p);
  }
}

function makeThunderBolt(){
  const x = Math.random() * cv.width;
  const pts = [{x, y: 0}];
  let cy = 0;
  while(cy < cv.height * 0.6){
    cy += 30 + Math.random() * 50;
    pts.push({x: pts[pts.length-1].x + (-40 + Math.random()*80), y: cy});
  }
  return pts;
}

function updateThunder(dt){
  if(weather !== 'thunder') return;
  thunderFlash = Math.max(0, thunderFlash - dt * 4);
  thunderTimer -= dt;
  if(thunderTimer <= 0){
    thunderFlash = 0.9;
    thunderBolt = makeThunderBolt();
    thunderTimer = 3 + Math.random() * 5;
  }
}

// TERRAIN GENERATION

// Helper: smooth a height map by averaging neighbors
function smoothHeights(h, passes=1){
  for(let p=0;p<passes;p++){
    const nh={};
    for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
      let sum=0, cnt=0;
      for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
        const nr=r+dr, nc=c+dc;
        if(nr<0||nr>=GRID||nc<0||nc>=GRID) continue;
        const v = h[`${nc},${nr}`];
        if(v===undefined) continue;
        sum+=v; cnt++;
      }
      if(cnt>0) nh[`${c},${r}`] = Math.round(sum/cnt);
    }
    Object.assign(h, nh);
  }
}

// Helper: carve a river along a winding path
function carveRiver(t, seed, startSide){
  const rng = mulberry32(seed);
  let x, y, dx, dy;
  if(startSide === 'top'){ x = Math.floor(rng()*GRID); y = 0; dx = 0; dy = 1; }
  else if(startSide === 'left'){ x = 0; y = Math.floor(rng()*GRID); dx = 1; dy = 0; }
  else if(startSide === 'right'){ x = GRID-1; y = Math.floor(rng()*GRID); dx = -1; dy = 0; }
  else { x = Math.floor(rng()*GRID); y = GRID-1; dx = 0; dy = -1; }
  for(let step=0; step<GRID*2; step++){
    if(x<0||x>=GRID||y<0||y>=GRID) break;
    t[`${Math.floor(x)},${Math.floor(y)}`] = 'water';
    // Random wobble
    if(rng()<0.35){
      if(dx===0){ x += (rng()<0.5?-1:1); }
      else { y += (rng()<0.5?-1:1); }
    }
    x += dx; y += dy;
  }
}

// Classify terrain by elevation thresholds
// 高さ上限（手動編集・生成共通）。生成された高さは GEN_H_SCALE 倍して
// 0..MAX_H レンジを活用する。地形タイプ判定は各ジェネレータ側で確定済みのため
// この再スケールでは変わらず、見た目の起伏だけが大きくなる。
const MAX_H = 16;
const GEN_H_SCALE = 1.5;

function classifyByHeight(t, h, profile){
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const key=`${c},${r}`;
    const v = h[key] ?? 0;
    let type = 'water';
    for(const [thresh, tname] of profile){
      if(v >= thresh){ type = tname; break; }
    }
    t[key] = type;
    if(type === 'water') delete h[key];
  }
}

function genGrassland(s){
  const n=makeNoise(s),n2=makeNoise(s+1),t={},h={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const v = n(c/9, r/9)*0.55 + n2(c/4, r/4)*0.30 + n2(c/2, r/2)*0.15;
    const eleva = (v + 0.4) * 6;
    h[`${c},${r}`] = Math.max(0, Math.round(eleva));
  }
  smoothHeights(h, 1);
  // Add a winding stream
  if(Math.random() < 0.7) carveRiver(t, s+11, ['top','bottom','left','right'][Math.floor(Math.random()*4)]);
  // Classify by height
  classifyByHeight(t, h, [[6,'dark'],[3,'grass'],[2,'grass'],[1,'sand'],[0,'water']]);
  // Re-overlay river (water takes precedence)
  if(Math.random() < 0.7) carveRiver(t, s+11, ['top','bottom','left','right'][Math.floor(Math.random()*4)]);
  // Heights below ground level get cleared
  for(const k in h) if(t[k]==='water') delete h[k];
  return {terrain:t, heights:h};
}

function genIsland(s){
  const n=makeNoise(s), n2=makeNoise(s+1), t={}, h={};
  const cx = GRID/2, cy = GRID/2;
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const dx=(c-cx)/cx, dy=(r-cy)/cy;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const noise = n(c/7, r/7)*0.4 + n2(c/3, r/3)*0.2;
    const v = noise - dist*1.15 + 0.4;
    h[`${c},${r}`] = Math.max(0, Math.round(v * 8));
  }
  smoothHeights(h, 1);
  classifyByHeight(t, h, [[6,'dark'],[3,'grass'],[2,'grass'],[1,'sand'],[0,'water']]);
  return {terrain:t, heights:h};
}

function genMountain(s){
  const n=makeNoise(s), n2=makeNoise(s+99), n3=makeNoise(s+33), t={}, h={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const v = n(c/6, r/6)*0.55 + n2(c/3, r/3)*0.30 + n3(c/12, r/12)*0.15;
    h[`${c},${r}`] = Math.max(0, Math.round((v + 0.35) * 10));
  }
  smoothHeights(h, 1);
  classifyByHeight(t, h, [[8,'snow'],[6,'snow'],[4,'dark'],[2,'grass'],[1,'sand'],[0,'water']]);
  return {terrain:t, heights:h};
}

function genDesert(s){
  const n=makeNoise(s), n2=makeNoise(s+7), t={}, h={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    // Dune-like ridges using directional noise
    const dune = Math.sin((c + n2(c/8,r/8)*6) * 0.7) * 0.3;
    const v = n(c/9, r/9)*0.5 + n2(c/4, r/4)*0.25 + dune;
    h[`${c},${r}`] = Math.max(0, Math.round((v + 0.4) * 5));
  }
  smoothHeights(h, 1);
  classifyByHeight(t, h, [[4,'dark'],[1,'sand'],[0,'sand']]);
  // Rare oasis spot
  if(Math.random() < 0.4){
    const ox = 2 + Math.floor(Math.random()*(GRID-4));
    const oy = 2 + Math.floor(Math.random()*(GRID-4));
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      const cc=ox+dc, rr=oy+dr;
      if(cc<0||cc>=GRID||rr<0||rr>=GRID) continue;
      const d = Math.abs(dc)+Math.abs(dr);
      const k=`${cc},${rr}`;
      if(d===0) t[k]='water';
      else if(d===1) t[k]='grass';
      delete h[k];
    }
  }
  return {terrain:t, heights:h};
}

function genSnow(s){
  const n=makeNoise(s), n2=makeNoise(s+5), t={}, h={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const v = n(c/7, r/7)*0.7 + n2(c/3, r/3)*0.3;
    h[`${c},${r}`] = Math.max(0, Math.round((v + 0.3) * 7));
  }
  smoothHeights(h, 2);
  classifyByHeight(t, h, [[6,'dark'],[2,'snow'],[1,'snow'],[0,'water']]);
  return {terrain:t, heights:h};
}

// NEW: Forest — dense rolling green with rare clearings
function genForest(s){
  const n=makeNoise(s), n2=makeNoise(s+13), t={}, h={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const v = n(c/7, r/7)*0.55 + n2(c/3, r/3)*0.45;
    h[`${c},${r}`] = Math.max(1, Math.round((v + 0.5) * 5));
  }
  smoothHeights(h, 1);
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const k=`${c},${r}`;
    const v = h[k];
    if(v >= 4) t[k] = 'dark';
    else t[k] = 'grass';
  }
  // Occasional water pond
  if(Math.random() < 0.6){
    const px = 2 + Math.floor(Math.random()*(GRID-4));
    const py = 2 + Math.floor(Math.random()*(GRID-4));
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      if(Math.random() < 0.65){
        const k=`${px+dc},${py+dr}`;
        if(t[k]) { t[k] = 'water'; delete h[k]; }
      }
    }
  }
  return {terrain:t, heights:h};
}

// NEW: Volcano — central peak with sloping lava-stone
function genVolcano(s){
  const n=makeNoise(s), t={}, h={};
  const cx = GRID/2, cy = GRID/2;
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const dx=(c-cx)/cx, dy=(r-cy)/cy;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const cone = Math.max(0, 1 - dist*1.1);
    const noise = n(c/5, r/5)*0.25;
    const v = cone * 9 + noise;
    h[`${c},${r}`] = Math.max(0, Math.round(v));
  }
  smoothHeights(h, 1);
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const k=`${c},${r}`;
    const v = h[k];
    if(v >= 7) t[k] = 'dark';
    else if(v >= 4) t[k] = 'dark';
    else if(v >= 2) t[k] = 'grass';
    else if(v >= 1) t[k] = 'sand';
    else { t[k] = 'water'; delete h[k]; }
  }
  // Crater at peak (water/lava pool)
  const peakKey = `${Math.floor(cx)},${Math.floor(cy)}`;
  t[peakKey] = 'water';
  delete h[peakKey];
  return {terrain:t, heights:h};
}

// NEW: Atoll — ring-shaped reef
function genAtoll(s){
  const n=makeNoise(s), t={}, h={};
  const cx = GRID/2, cy = GRID/2;
  const ringR = GRID*0.32;
  const ringW = GRID*0.14;
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const dx=(c-cx), dy=(r-cy);
    const dist = Math.sqrt(dx*dx+dy*dy);
    const ringDist = Math.abs(dist - ringR);
    const noise = n(c/4, r/4)*0.5;
    let v;
    if(ringDist < ringW){
      v = (1 - ringDist/ringW) * 4 + noise;
    } else {
      v = -1 + noise;
    }
    h[`${c},${r}`] = Math.max(0, Math.round(v));
  }
  smoothHeights(h, 1);
  classifyByHeight(t, h, [[3,'grass'],[1,'sand'],[0,'water']]);
  return {terrain:t, heights:h};
}

// NEW: Valley — river through twin mountain ridges
function genValley(s){
  const n=makeNoise(s), n2=makeNoise(s+22), t={}, h={};
  const mid = GRID/2;
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const distFromMid = Math.abs(r - mid + n(c/4,0)*2);
    const ridge = Math.max(0, (distFromMid - 1.5) * 1.5);
    const noise = n2(c/5, r/5)*0.3;
    const v = ridge + noise;
    h[`${c},${r}`] = Math.max(0, Math.round(v));
  }
  smoothHeights(h, 1);
  // Carve river along center
  for(let c=0;c<GRID;c++){
    const wobble = Math.round(n(c/5, 0)*1.5);
    const rr = Math.max(0, Math.min(GRID-1, Math.floor(mid + wobble)));
    t[`${c},${rr}`] = 'water';
    delete h[`${c},${rr}`];
  }
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const k=`${c},${r}`;
    if(t[k]==='water') continue;
    const v = h[k] || 0;
    if(v >= 5) t[k] = 'dark';        // 岩がちな尾根筋（雪は使わない＝緑の谷）
    else if(v >= 1) t[k] = 'grass';  // 緑の斜面・谷底
    else t[k] = 'sand';              // 川沿いの低い砂地
  }
  return {terrain:t, heights:h};
}

// NEW: City — dense street grid with raised building blocks
function genCity(s){
  const rng=mulberry32(s), t={}, h={};
  const blk=4; // block pitch (1-tile road + interior)
  // Per-block building height, precomputed
  const bh={};
  const bcols=Math.ceil(GRID/blk), brows=Math.ceil(GRID/blk);
  for(let by=0;by<brows;by++)for(let bx=0;bx<bcols;bx++) bh[`${bx},${by}`]=1+Math.floor(rng()*4);
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const k=`${c},${r}`;
    if(c%blk===0||r%blk===0){ t[k]='dark'; h[k]=0; }       // road
    else { t[k]='dark'; h[k]=bh[`${Math.floor(c/blk)},${Math.floor(r/blk)}`]||1; }
  }
  // Central green park (one block)
  const px=Math.floor(bcols/2)*blk+1, py=Math.floor(brows/2)*blk+1;
  for(let dr=0;dr<blk-1;dr++)for(let dc=0;dc<blk-1;dc++){
    const cc=px+dc, rr=py+dr;
    if(cc<GRID&&rr<GRID){ const k=`${cc},${rr}`; t[k]='grass'; h[k]=0; }
  }
  return {terrain:t, heights:h};
}

// NEW: Town — grassy with cross streets and scattered low houses
function genTown(s){
  const n=makeNoise(s), rng=mulberry32(s+5), t={}, h={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){ const k=`${c},${r}`; t[k]='grass'; h[k]=0; }
  const rv=Math.floor(GRID/2), cv=Math.floor(GRID/2);
  for(let i=0;i<GRID;i++){ t[`${i},${rv}`]='sand'; t[`${cv},${i}`]='sand'; }   // main streets
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    if(r===rv||c===cv) continue;
    if(n(c/3,r/3)>0.12 && rng()<0.45){ const k=`${c},${r}`; t[k]='dark'; h[k]=1+(rng()<0.25?1:0); }
  }
  // Small pond
  if(rng()<0.7){
    const px=2+Math.floor(rng()*(GRID-4)), py=2+Math.floor(rng()*(GRID-4));
    for(let dr=0;dr<=1;dr++)for(let dc=0;dc<=1;dc++){
      const k=`${px+dc},${py+dr}`; if(t[k]){ t[k]='water'; delete h[k]; }
    }
  }
  return {terrain:t, heights:h};
}

// NEW: River — rolling grassland split by a wide meandering river
function genRiver(s){
  const n=makeNoise(s), n2=makeNoise(s+3), t={}, h={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const v=n(c/8,r/8)*0.6 + n2(c/4,r/4)*0.4;
    h[`${c},${r}`]=Math.max(0,Math.round((v+0.5)*4));
  }
  smoothHeights(h,1);
  classifyByHeight(t,h,[[4,'dark'],[2,'grass'],[1,'grass'],[0,'sand']]);
  const mid=GRID/2;
  for(let c=0;c<GRID;c++){
    const rr=Math.round(mid + n(c/5,0)*GRID*0.18);
    for(let w=-2;w<=2;w++){
      const r2=rr+w; if(r2<0||r2>=GRID) continue;
      const k=`${c},${r2}`;
      if(Math.abs(w)<=1){ t[k]='water'; delete h[k]; }       // channel
      else { t[k]='sand'; h[k]=0; }                          // bank
    }
  }
  return {terrain:t, heights:h};
}

// NEW: Waterfall — high plateau dropping over a cliff into a plunge pool
function genWaterfall(s){
  const n=makeNoise(s), t={}, h={};
  const cliff=Math.floor(GRID*0.45);
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const k=`${c},${r}`;
    if(r<cliff){ const hh=6+Math.round(n(c/5,r/5)*2); h[k]=hh; t[k]= hh>=8?'snow':'dark'; }
    else { const hh=Math.max(0,Math.round(n(c/5,r/5)*2)); h[k]=hh; t[k]= hh>=2?'grass':'sand'; }
  }
  smoothHeights(h,1);
  const wc=Math.floor(GRID/2);
  for(let r=0;r<cliff;r++){                                   // feeder river on the plateau
    for(let w=-1;w<=1;w++){ const c2=wc+w; if(c2<0||c2>=GRID) continue; t[`${c2},${r}`]='water'; }
  }
  for(let r=cliff;r<GRID;r++)for(let c=0;c<GRID;c++){          // plunge pool / outflow basin
    const k=`${c},${r}`;
    if(r<cliff+3 || Math.abs(c-wc)<=1){ t[k]='water'; delete h[k]; }
  }
  return {terrain:t, heights:h};
}

// NEW: Seaside — wavy coastline with a sandy beach band, sea on one side
function genCoast(s){
  const n=makeNoise(s), n2=makeNoise(s+9), t={}, h={};
  // 砂浜の幅はマップサイズ連動。最大 6 マス、最小 2 マス（フラットな平地）
  const beachW = Math.min(6, Math.max(2, Math.round(GRID*0.25)));
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const k=`${c},${r}`;
    const shore = GRID*0.55 + n(c/7,0)*GRID*0.10;     // うねる波打ち際
    const d = r - shore;                               // d>=0=海側 / d<0=陸側
    if(d >= 0){
      t[k]='water';                                    // 海
    } else if(d >= -beachW){
      t[k]='sand'; h[k]=1;                             // 砂浜＝フラットな平地
    } else {
      const v = 1 + (-d - beachW)*0.45 + n2(c/5,r/5)*1.4; // 砂浜の先から起伏
      h[k] = Math.round(v);
      t[k] = v >= 6 ? 'dark' : 'grass';                // 草地→内陸の丘
    }
  }
  return {terrain:t, heights:h};
}

// NEW: Snowy Peaks — taller than Mountains with a much lower snow line
function genSnowMountain(s){
  const n=makeNoise(s), n2=makeNoise(s+99), n3=makeNoise(s+33), t={}, h={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const v = n(c/6,r/6)*0.55 + n2(c/3,r/3)*0.30 + n3(c/12,r/12)*0.15;
    h[`${c},${r}`] = Math.max(0, Math.round((v + 0.5) * 11));
  }
  smoothHeights(h,1);
  classifyByHeight(t,h,[[9,'snow'],[6,'snow'],[4,'snow'],[2,'dark'],[1,'sand'],[0,'water']]);
  return {terrain:t, heights:h};
}

// NEW: Amazon — dense low rainforest split by a meandering river + tributary
function genAmazon(s){
  const n=makeNoise(s), n2=makeNoise(s+17), t={}, h={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const v = n(c/8,r/8)*0.5 + n2(c/3,r/3)*0.5;
    h[`${c},${r}`] = Math.max(1, Math.round((v + 0.45) * 4));
  }
  smoothHeights(h,1);
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const k=`${c},${r}`;
    t[k] = (h[k] >= 3) ? 'dark' : 'grass';   // 密林=暗緑 / 林床=草
  }
  const mid=GRID*0.5;
  for(let c=0;c<GRID;c++){                    // 蛇行する本流
    const rr=Math.round(mid + n(c/5,0)*GRID*0.22);
    for(let w=-2;w<=2;w++){ const r2=rr+w; if(r2<0||r2>=GRID) continue;
      const k=`${c},${r2}`;
      if(Math.abs(w)<=1){ t[k]='water'; delete h[k]; } else { t[k]='sand'; h[k]=0; } }
  }
  for(let r=0;r<GRID;r++){                    // 支流
    const cc=Math.round(GRID*0.3 + n2(0,r/5)*GRID*0.15);
    for(let w=-1;w<=1;w++){ const c2=cc+w; if(c2<0||c2>=GRID) continue;
      const k=`${c2},${r}`;
      if(w===0){ t[k]='water'; delete h[k]; } else if(t[k]!=='water'){ t[k]='sand'; h[k]=0; } }
  }
  return {terrain:t, heights:h};
}

// NEW: Wetland — very flat marsh with scattered shallow pools and reed banks
function genWetland(s){
  const n=makeNoise(s), n2=makeNoise(s+8), t={}, h={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const k=`${c},${r}`;
    const w = n(c/3,r/3)*0.6 + n2(c/6,r/6)*0.4;
    if(w < -0.12){ t[k]='water'; }                       // 浅い水たまり
    else if(w < 0.05){ t[k]='sand'; h[k]=0; }            // 泥・葦の岸
    else { t[k]='grass'; h[k]= (w>0.35?1:0); }           // 湿地草（ほぼ平坦）
  }
  return {terrain:t, heights:h};
}

// NEW: Canyon — high rocky mesa carved by a branching canyon (vs. grassy Valley)
function genCanyon(s){
  const n=makeNoise(s), n2=makeNoise(s+19), t={}, h={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const v = n(c/7,r/7)*0.4 + n2(c/3,r/3)*0.2;
    h[`${c},${r}`] = Math.max(0, Math.round((v + 0.65) * 8));
  }
  smoothHeights(h,1);
  const mid=GRID*0.5;
  for(let c=0;c<GRID;c++){                    // 本谷
    const rr=Math.round(mid + n(c/6,0)*GRID*0.2);
    for(let w=-2;w<=2;w++){ const r2=rr+w; if(r2<0||r2>=GRID) continue;
      const k=`${c},${r2}`;
      if(Math.abs(w)<=1){ t[k]='water'; delete h[k]; } else { h[k]=1; } }
  }
  const fc=GRID*0.55;
  for(let r=Math.floor(mid);r<GRID;r++){      // 支谷
    const cc=Math.round(fc + n2(0,r/6)*GRID*0.12);
    const k=`${cc},${r}`;
    t[k]='water'; delete h[k];
  }
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const k=`${c},${r}`;
    if(t[k]==='water') continue;
    t[k] = (h[k]||0) >= 5 ? 'dark' : 'sand'; // 岩のメサ天端 / 砂の斜面
  }
  return {terrain:t, heights:h};
}

// NEW: Mesa — flat-topped rock buttes rising from sand flats
function genMesa(s){
  const n=makeNoise(s), t={}, h={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const base = n(c/5,r/5);
    const v = base > 0.18 ? 4 + base*5 : base*1.5;     // ビュート or 砂の平地
    h[`${c},${r}`] = Math.max(0, Math.round(v));
  }
  smoothHeights(h,1);
  classifyByHeight(t,h,[[5,'dark'],[3,'dark'],[1,'sand'],[0,'sand']]);
  return {terrain:t, heights:h};
}

// NEW: Savanna — flat patchy dry grass & dirt with a rare waterhole
function genSavanna(s){
  const n=makeNoise(s), n2=makeNoise(s+4), t={}, h={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const k=`${c},${r}`;
    const v = n(c/7,r/7)*0.6 + n2(c/3,r/3)*0.4;
    h[k] = Math.max(0, Math.round((v+0.4)*2));
    t[k] = v > 0.05 ? 'grass' : 'sand';
  }
  if(Math.random()<0.5){
    const px=3+Math.floor(Math.random()*(GRID-6)), py=3+Math.floor(Math.random()*(GRID-6));
    for(let dr=0;dr<=1;dr++)for(let dc=0;dc<=1;dc++){ const kk=`${px+dc},${py+dr}`; t[kk]='water'; delete h[kk]; }
  }
  return {terrain:t, heights:h};
}

// NEW: Castle — central keep with concentric ward, moat, and castle town
function genCastle(s){
  const rng=mulberry32(s+2), t={}, h={};
  const cx=GRID/2, cy=GRID/2;
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const k=`${c},${r}`;
    const d=Math.max(Math.abs(c-cx),Math.abs(r-cy));   // 四角いリング（チェビシェフ距離）
    if(d < GRID*0.10){ t[k]='dark'; h[k]=5; }          // 天守
    else if(d < GRID*0.16){ t[k]='dark'; h[k]=3; }     // 本丸
    else if(d < GRID*0.22){ t[k]='water'; }            // 堀
    else if(d < GRID*0.40){ t[k]='dark'; h[k]= rng()<0.5?1:0; } // 城下町
    else { t[k]='grass'; h[k]=0; }                     // 郊外
  }
  return {terrain:t, heights:h};
}

// NEW: Farmland — checkerboard fields with lanes, farmhouses and a pond
function genFarm(s){
  const rng=mulberry32(s+3), t={}, h={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const k=`${c},${r}`;
    if((r%3===2)||(c%3===2)){ t[k]='sand'; h[k]=0; }   // あぜ道
    else { t[k]=((Math.floor(r/3)+Math.floor(c/3))%2===0)?'grass':'sand'; h[k]=0; } // 田畑の市松
  }
  for(let i=0;i<3;i++){ const k=`${1+Math.floor(rng()*(GRID-2))},${1+Math.floor(rng()*(GRID-2))}`; t[k]='dark'; h[k]=1; } // 農家
  if(rng()<0.7){
    const px=2+Math.floor(rng()*(GRID-4)), py=2+Math.floor(rng()*(GRID-4));
    for(let dr=0;dr<=1;dr++)for(let dc=0;dc<=1;dc++){ const kk=`${px+dc},${py+dr}`; t[kk]='water'; delete h[kk]; }
  }
  return {terrain:t, heights:h};
}

function applyTerrainMap(result){
  // Accept either {terrain, heights} or legacy plain terrain object
  const tmap = result.terrain || result;
  const hmap = result.heights || {};
  for(const k in hmap) hmap[k] = Math.min(MAX_H, Math.max(0, Math.round(hmap[k]*GEN_H_SCALE)));
  for(const k in terrain)delete terrain[k];
  for(const k in heights)delete heights[k];
  Object.assign(terrain, tmap);
  Object.assign(heights, hmap);
}

// ── 自動絵文字配置（コア）— (seed, densityPct, terrainMap, grid) → {it,an} の純関数
// グローバルへ触れずローカル占有 Set のみで衝突回避。配信側／開封側で同一の compact 形を返す。
// it[k]=emoji, an=[[emoji,c,r],...]（共有最小形と一致）。🏪 は絶対に置かない。
function computeTerrainEmoji(seed, densityPct, terrainMap, grid){
  const rng = mulberry32(((seed|0) + AE_SALT) >>> 0);
  // 固定正準順（r外c内）でセル列を作り、決定論的 Fisher–Yates でシャッフル
  const cells = [];
  for(let r=0;r<grid;r++) for(let c=0;c<grid;c++) cells.push([c,r]);
  for(let i=cells.length-1;i>0;i--){
    const j = Math.floor(rng()*(i+1));
    const tmp = cells[i]; cells[i] = cells[j]; cells[j] = tmp;
  }
  const it = {}, an = [];
  const taken = new Set();
  const d = Math.max(0, Math.min(100, densityPct|0)) / 100;
  for(const [c,r] of cells){
    const k = `${c},${r}`;
    const type = terrainMap[k];
    const pool = type && TERRAIN_EMOJI[type];
    const fill = TERRAIN_FILL[type] || 0;
    // RNG は分岐の有無に関わらず必ず1回引く（後段の分岐順を変えない）
    const roll = rng();
    if(!pool || roll >= d*fill) continue;
    if(taken.has(k)) continue;
    const wantFauna = rng() < 0.35 && pool.fauna && pool.fauna.length > 0;
    const arr = wantFauna ? pool.fauna : (pool.decor || []);
    if(!arr.length) continue;
    const e = arr[Math.floor(rng()*arr.length)];
    if(e === '🏪') continue;   // 安全弁（pool に混入していても置かない）
    taken.add(k);
    if(wantFauna) an.push([e,c,r]);
    else it[k] = e;
  }
  return { it, an };
}

// ── 自動絵文字配置（薄いラッパ）— ライブの items/spawnAnimal へ実体化。戻り値＝配置数。
function placeTerrainEmoji(seed, densityPct){
  const r = computeTerrainEmoji(seed, densityPct, terrain, GRID);
  for(const k in r.it){
    if(items[k]) continue;   // 念のため衝突回避（act 由来の手置きは genByIndex で先にクリア済み）
    items[k] = { emoji: r.it[k], bobOffset: Math.random()*Math.PI*2 };
  }
  for(const [e,c,r2] of r.an){ spawnAnimal(e, c, r2); }
  return Object.keys(r.it).length + r.an.length;
}

// ANIMAL SYSTEM
// ═══════════════════════════════════════════
function spawnAnimal(emoji,c,r){
  if(c<0||c>=GRID||r<0||r>=GRID) return;
  const id=animalId++;
  animals[id]={id,emoji,wx:c,wy:r,tx:c,ty:r,moving:false,flip:false,speed:.6+Math.random()*.8,waitTimer:.5+Math.random()*2,excited:0,eatCD:0};
  history.push({type:'animal',id,c,r,emoji});
}
function removeAnimal(id){delete animals[id];}
// 人（徘徊する人物絵文字）が 🏪 に入店する
// 人（体パーツ除く）を 🏪 へ誘引（PEOPLE_EMOJI を唯一の真実源に）
const PEOPLE = new Set(PEOPLE_EMOJI);
const STORE_RADIUS = 8;   // 人が 🏪 に吸い寄せられる半径（セル）
function storeAnchorKey(){ for(const k in items) if(items[k].emoji==='🏪') return k; return null; }
function nearestStoreCell(a, key){
  const [ac,ar]=key.split(',').map(Number);
  const n=storeSize(items[key]);
  let best={c:ac,r:ar}, bd=Infinity;
  for(let dc=0;dc<n;dc++)for(let dr=0;dr<n;dr++){
    const c=ac+dc, r=ar+dr, d=(c-a.wx)*(c-a.wx)+(r-a.wy)*(r-a.wy);
    if(d<bd){ bd=d; best={c,r}; }
  }
  return best;
}
function storeKeyAt(c,r){
  const k=`${c},${r}`;
  if(items[k] && items[k].emoji==='🏪') return k;   // 1×1
  return storeCovering(c,r);                          // 3×3 footprint
}
// 🏪 の上に入店人数を表示（topY = 店画像の上端、sz = 店の描画サイズ）
function drawStoreCount(cx, topY, count, sz){
  if(!(count>0)) return;
  const fs=Math.max(11, Math.floor(sz*0.42));
  ctx.save();
  ctx.font=`bold ${fs}px sans-serif`;
  ctx.textAlign='center';
  ctx.textBaseline='bottom';
  const txt=`👤${count}`;
  ctx.fillStyle='rgba(0,0,0,.6)';
  ctx.fillText(txt, cx+1, topY-3+1);
  ctx.fillStyle='#fff';
  ctx.fillText(txt, cx, topY-3);
  ctx.restore();
}
const EAT_RADIUS = 5;     // 食べ物探索半径（セル）
const EAT_COOLDOWN = 4;   // 食後クールダウン（秒）
// アイドルの動物の周囲から最も近い食べ物セルを探す（無ければ null）
function findNearestFood(a){
  const cx=Math.floor(a.wx), cy=Math.floor(a.wy);
  let best=null, bestD=Infinity;
  for(let r=Math.max(0,cy-EAT_RADIUS); r<=Math.min(GRID-1,cy+EAT_RADIUS); r++)
  for(let c=Math.max(0,cx-EAT_RADIUS); c<=Math.min(GRID-1,cx+EAT_RADIUS); c++){
    const it=items[`${c},${r}`];
    if(!it || !isFood(it.emoji)) continue;
    const d=(c-cx)*(c-cx)+(r-cy)*(r-cy);
    if(d<bestD){ bestD=d; best={c,r}; }
  }
  return best;
}
// 水セル判定 / 最寄りの水セル（水生動物用）。terrain は "c,r"→type 文字列。
function isWaterCell(c,r){ return terrain[`${c},${r}`] === 'water'; }
function findNearestWater(cx, cy){
  let best=null, bestD=Infinity;
  for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++){
    if(terrain[`${c},${r}`] !== 'water') continue;
    const d=(c-cx)*(c-cx)+(r-cy)*(r-cy);
    if(d<bestD){ bestD=d; best={c,r}; }
  }
  return best;
}
function updateAnimals(dt){
  for(const id in animals){
    const a=animals[id];
    if(a.eatCD>0) a.eatCD-=dt;
    // 水生：陸セル滞在のタイマー進行 → 限界超過で消去（水中はリセット）。
    // aqua フラグはセーブに乗らないため都度 AQUATIC.has() で判定し、古いセーブとも整合。
    const aqua = AQUATIC.has(a.emoji);
    if(aqua){
      const cx=Math.floor(a.wx), cy=Math.floor(a.wy);
      if(isWaterCell(cx,cy)){ a.strandT = 0; }
      else {
        a.strandT = (a.strandT||0) + dt;
        if(a.strandT >= AQUA_STRAND_LIMIT){ delete animals[id]; continue; }
      }
    }
    if(!a.moving){
      a.waitTimer-=dt;
      if(a.waitTimer<=0){
        // 就寝中は徘徊・採餌・入店をせずその場で休む（移動中の個体は到達後に就寝）
        if(isAsleep(a)){ a.waitTimer=.8+Math.random()*2.5; continue; }
        let picked=false;
        // 水生で陸にいる：最寄りの水セルへ強制（店・食べ物・通常 wander は無視）
        if(aqua && !isWaterCell(Math.floor(a.wx), Math.floor(a.wy))){
          const w = findNearestWater(Math.floor(a.wx), Math.floor(a.wy));
          if(w){ a.tx=w.c; a.ty=w.r; a.moving=true; a.flip=(a.tx<a.wx); picked=true; }
        }
        if(!picked && !aqua && PEOPLE.has(a.emoji)){
          const sk=storeAnchorKey();
          if(sk){
            const cell=nearestStoreCell(a,sk);
            const cx=Math.floor(a.wx), cy=Math.floor(a.wy);
            if((cell.c-cx)*(cell.c-cx)+(cell.r-cy)*(cell.r-cy) <= STORE_RADIUS*STORE_RADIUS){
              a.tx=cell.c; a.ty=cell.r; a.moving=true; a.flip=(a.tx<a.wx); picked=true;
            }
          }
        }
        if(!picked && !aqua && (a.eatCD||0)<=0){
          const f=findNearestFood(a);
          if(f){ a.tx=f.c; a.ty=f.r; a.moving=true; a.flip=(a.tx<a.wx); picked=true; }
        }
        if(!picked){
          for(let attempt=0;attempt<10;attempt++){
            const dc=Math.round((Math.random()-.5)*6), dr=Math.round((Math.random()-.5)*6);
            const nc=Math.floor(a.wx)+dc, nr=Math.floor(a.wy)+dr;
            if(nc<0||nc>=GRID||nr<0||nr>=GRID) continue;
            // 水生は水セルのみへ移動（陸への徘徊を防ぐ）
            if(aqua && !isWaterCell(nc,nr)) continue;
            // 食べ物セルへの進入は許可。その他のアイテムと大型🏪フットプリントはブロック。
            if(cellOccupied(nc,nr) && !(items[`${nc},${nr}`] && isFood(items[`${nc},${nr}`].emoji))) continue;
            a.tx=nc; a.ty=nr; a.moving=true;
            a.flip=(a.tx<a.wx);
            break;
          }
        }
        a.waitTimer=.8+Math.random()*2.5;
      }
    } else {
      const dx=a.tx-a.wx, dy=a.ty-a.wy, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<.05){
        a.wx=a.tx;a.wy=a.ty;a.moving=false;
        const key=`${a.tx},${a.ty}`, it=items[key];
        if(it && isFood(it.emoji)){
          delete items[key];
          spawnEatFx(a.tx,a.ty,it.emoji);
          playEatSound();
          a.eatCD=EAT_COOLDOWN;
        }
        else if(PEOPLE.has(a.emoji)){
          const sk=storeKeyAt(a.tx,a.ty);
          if(sk){ items[sk].customers=(items[sk].customers||0)+1; delete animals[id]; if(!muted) playEntranceChime(); }
        }
      }
      else{const step=Math.min(a.speed*dt,dist);a.wx+=dx/dist*step;a.wy+=dy/dist*step;}
    }
  }
}

// PLACE / ERASE
// ═══════════════════════════════════════════
let lastKey=null;
const RECENT_MAX = 50;
function pushToRecent(emoji){
  const recent = CATEGORIES['📌 履歴'];
  const idx = recent.indexOf(emoji);
  if(idx >= 0) recent.splice(idx, 1);
  recent.unshift(emoji);
  if(recent.length > RECENT_MAX) recent.length = RECENT_MAX;
  if(selCat === '📌 履歴') buildPalette();
  // Re-enable recent source button if scatter UI is built
  if(typeof refreshScatterUI === 'function') refreshScatterUI();
}

// 🏪 store footprint helpers — a 🏪 may occupy an n×n block (size 1..3)
function storeSize(it){ return (it && it.emoji === '🏪' && it.size > 1) ? Math.min(3, it.size|0) : 1; }
function hasStore(){ for(const k in items) if(items[k].emoji === '🏪') return true; return false; }
function storeCovering(c, r){
  for(const k in items){
    const it = items[k];
    if(it.emoji !== '🏪') continue;
    const n = storeSize(it);
    if(n === 1) continue;
    const [ac, ar] = k.split(',').map(Number);
    if(c >= ac && c < ac+n && r >= ar && r < ar+n) return k;
  }
  return null;
}
function cellOccupied(c, r){ return !!items[`${c},${r}`] || storeCovering(c, r) !== null; }
function storeFits(ac, ar, n){
  if(ac < 0 || ar < 0 || ac+n > GRID || ar+n > GRID) return false;
  const selfKey = `${ac},${ar}`;
  for(let dc=0; dc<n; dc++) for(let dr=0; dr<n; dr++){
    const c=ac+dc, r=ar+dr, k=`${c},${r}`;
    if(k !== selfKey && items[k]) return false;
    const cov = storeCovering(c, r);
    if(cov && cov !== selfKey) return false;
  }
  return true;
}

function act(c,r){
  if(gifFraming) return;   // GIF枠の表示中は配置/塗りを抑止（パン/ズームのみ許可）
  if(c<0||c>=GRID||r<0||r>=GRID) return;
  genClean = false;   // 手編集＝レシピ純度を破棄（共有時は厳密往復パスへ）
  const key=`${c},${r}`;
  if(key===lastKey) return;
  lastKey=key;
  if(mode==='place'){
    if(!selEmoji || typeof selEmoji !== 'string') return;
    if(ANIMALS.has(selEmoji)){
      spawnAnimal(selEmoji,c,r);
      pushToRecent(selEmoji);
      playPlaceSound();
    }
    else {
      if(cellOccupied(c,r)) return;
      if(selEmoji==='🏪' && hasStore()){ showToast(tr('toast.storeOnce')); return; }
      let ac=c, ar=r, sz=1;
      if(selEmoji==='🏪' && lastStoreSize>1){
        const n=3;
        if(storeFits(ac,ar,n)){ sz=n; }
        else {
          const ca=Math.max(0,Math.min(ac,GRID-n)), cr=Math.max(0,Math.min(ar,GRID-n));
          if((ca!==ac||cr!==ar) && storeFits(ca,cr,n)){ ac=ca; ar=cr; sz=n; }
          else return;   // 3×3 が置けない場所では何も置かない（1×1 フォールバックしない）
        }
      }
      const aKey=`${ac},${ar}`;
      const it={emoji:selEmoji, bobOffset:Math.random()*Math.PI*2};
      if(sz>1) it.size=sz;
      items[aKey]=it;
      history.push({type:'place',key:aKey,c:ac,r:ar,emoji:selEmoji});
      pushToRecent(selEmoji);
      playPlaceSound();
    }
  } else if(mode==='terrain'){
    if(terrainAction==='paint'){
      const old=terrain[key]||'grass';
      if(old===selTerrain) return;
      terrain[key]=selTerrain;
      history.push({type:'terrain',key,c,r,old,terrain:selTerrain});
    } else if(terrainAction==='up'){
      const oldH=heights[key]||0;
      if(oldH>=MAX_H) return;
      heights[key]=oldH+1;
      history.push({type:'height',key,c,r,old:oldH,new:heights[key]});
    } else if(terrainAction==='down'){
      const oldH=heights[key]||0;
      if(oldH<=0) return;
      heights[key]=oldH-1;
      if(heights[key]===0) delete heights[key];
      history.push({type:'height',key,c,r,old:oldH,new:oldH-1});
    }
  } else {
    const anchor = items[key] ? key : storeCovering(c,r);
    if(anchor){
      const it = items[anchor];
      const [ac,ar] = anchor.split(',').map(Number);
      history.push({type:'erase', key:anchor, c:ac, r:ar, emoji:it.emoji, size:it.size||1});
      delete items[anchor];
    }
  }
  mpTouch();
}

let panning=false, panStart={x:0,y:0}, panOrigin={x:0,y:0};
let placing=false;
let pinch0=null, pinchScale0=1, pinchOrigin={x:0,y:0};
let touchDownPos=null; // for tap detection
const TAP_THRESHOLD = 8; // px movement to distinguish tap vs drag

// Smooth zoom target
let targetScale=1, targetOX=0, targetOY=0;
function syncTargets(){ targetScale=scale; targetOX=OX; targetOY=OY; }
syncTargets();

// fit map on first load (called after resetView is defined below)
window.addEventListener('load', resetView);

function zoomToward(mx, my, newScale){
  // 最小ズームはマップ全体が収まる fit スケール基準（リセット視点と整合）。
  // 小さいマップでは従来の 0.3 を下限に保つ。
  const minScale = Math.min(.3, getFitScale() * 0.85);
  newScale = Math.max(minScale, Math.min(3.5, newScale));
  targetOX = mx - (mx - targetOX) * (newScale / targetScale);
  targetOY = my - (my - targetOY) * (newScale / targetScale);
  targetScale = newScale;
}

// Mouse (PC): place on mousedown + drag as before
// Moon tap → meteor shower burst
function hitMoon(sx, sy){
  if(!moonScreenPos) return false;
  const dx = sx - moonScreenPos.x, dy = sy - moonScreenPos.y;
  return (dx*dx + dy*dy) <= (moonScreenPos.r * 1.8) ** 2;
}
function tryMoonTap(sx, sy){
  if(!hitMoon(sx, sy)) return false;
  // Burst of meteors
  const total = 18 + Math.floor(Math.random() * 12);
  for(let i = 0; i < total; i++){
    setTimeout(spawnMeteor, i * (60 + Math.random() * 140));
  }
  return true;
}

// Sun tap → only when raining: fade rain out, then rainbow appears
function hitSun(sx, sy){
  if(!sunScreenPos) return false;
  const dx = sx - sunScreenPos.x, dy = sy - sunScreenPos.y;
  return (dx*dx + dy*dy) <= (sunScreenPos.r * 1.5) ** 2;
}
let rainFading = false; // true while rain is stopping after sun tap
function trySunTap(sx, sy){
  if(!hitSun(sx, sy)) return false;
  // Only works during rain or thunder; ignore silently otherwise
  if(weather !== 'rain' && weather !== 'thunder') return true;
  if(rainFading) return true; // already in progress
  rainFading = true;
  return true;
}

function updateRainFade(dt){
  if(!rainFading) return;
  // Fade out particles gradually
  const fadeSpeed = 0.5; // ~2s to vanish
  let allGone = true;
  for(const p of particles){
    p.op = Math.max(0, p.op - fadeSpeed * dt);
    if(p.op > 0.01) allGone = false;
  }
  // When all particles invisible: clear weather and start rainbow
  if(allGone || particles.length === 0){
    weather = 'clear';
    initWeather('clear');
    refreshWeatherBtn();
    rainFading = false;
    rainbowOn = true;
  }
}

cv.addEventListener('mousedown',e=>{
  closeAllPopups();   // 箱庭をクリックしたら開いているメニューを閉じる
  if(e.button===1||e.button===2){panning=true;panStart={x:e.clientX,y:e.clientY};panOrigin={x:targetOX,y:targetOY};return;}
  if(tryBubbleTap(e.clientX, e.clientY)) return;
  if(tryMoonTap(e.clientX, e.clientY)) return;
  if(trySunTap(e.clientX, e.clientY)) return;
  placing=true; lastKey=null;
  const {c,r}=screenToIso(e.clientX,e.clientY); act(c,r);
});
cv.addEventListener('mousemove',e=>{
  const {c,r}=screenToIso(e.clientX,e.clientY);
  hoverCell=(c>=0&&c<GRID&&r>=0&&r<GRID)?{c,r}:null;
  if(panning){targetOX=panOrigin.x+(e.clientX-panStart.x);targetOY=panOrigin.y+(e.clientY-panStart.y);return;}
  if(placing) act(c,r);
});
cv.addEventListener('mouseup',e=>{if(e.button===1||e.button===2)panning=false;placing=false;lastKey=null;});
cv.addEventListener('contextmenu',e=>e.preventDefault());
cv.addEventListener('wheel',e=>{
  // wheel disabled - use +/- buttons
},{passive:true});

// Touch: place only on touchend if tap (not drag), pan/pinch with 2 fingers
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  closeAllPopups();   // 箱庭をタップしたら開いているメニューを閉じる（touchはclick不発のため明示）
  if(e.touches.length===2){
    // 2-finger pan only (no pinch zoom)
    panStart={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};
    panOrigin={x:targetOX,y:targetOY};
    panning=true; touchDownPos=null; return;
  }
  touchDownPos={x:e.touches[0].clientX, y:e.touches[0].clientY};
  panning=false;
},{passive:false});

cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2&&panning){
    const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
    targetOX=panOrigin.x+(cx-panStart.x);
    targetOY=panOrigin.y+(cy-panStart.y);
    return;
  }
  if(!touchDownPos) return;
  const dx=e.touches[0].clientX-touchDownPos.x, dy=e.touches[0].clientY-touchDownPos.y;
  if(Math.sqrt(dx*dx+dy*dy) > TAP_THRESHOLD){
    if(!panning){
      panning=true;
      panStart={x:touchDownPos.x, y:touchDownPos.y};
      panOrigin={x:targetOX, y:targetOY};
    }
    targetOX=panOrigin.x+(e.touches[0].clientX-panStart.x);
    targetOY=panOrigin.y+(e.touches[0].clientY-panStart.y);
  }
},{passive:false});

cv.addEventListener('touchend',e=>{
  e.preventDefault();
  if(touchDownPos && !panning){
    if(tryBubbleTap(touchDownPos.x, touchDownPos.y) || tryMoonTap(touchDownPos.x, touchDownPos.y) || trySunTap(touchDownPos.x, touchDownPos.y)){
      touchDownPos=null; panning=false; pinch0=null; lastKey=null;
      return;
    }
    const {c,r}=screenToIso(touchDownPos.x, touchDownPos.y);
    lastKey=null;
    act(c,r);
  }
  touchDownPos=null; panning=false; pinch0=null; lastKey=null;
},{passive:false});

// マップ全体が画面に収まるスケール（resetView と最小ズームで共有）
function getFitScale(){
  const {TW,TH} = getTileDims();
  const maxW = cv.width  * 0.88;
  const maxH = (cv.height - 120) * 0.88;
  // 3D は高い柱（最大 MAX_H、1段=TH*0.5 持ち上げ）が上にはみ出すので、
  // 縦の必要量にピーク分の余白を見込んで fit させる。
  const gridH = drawMode==='3d' ? (GRID + MAX_H*0.5) * TH : GRID * TH;
  let fs = Math.min(maxW / (GRID * TW), maxH / gridH);
  if(drawMode!=='3d') fs *= 0.8; // 2D は full-fit から 1 段引く
  return fs;
}

// Reset view: fit entire map on screen
function resetView(){
  const {TW,TH} = getTileDims();
  const fitScale = getFitScale();
  let ox, oy;
  if(drawMode==='3d'){
    // OX = screen center (iso origin is center-top of diamond)
    ox = cv.width / 2;
    // ピーク余白の半分だけ下げ、高い柱が上端で切れないようにする
    oy = cv.height / 2 - (GRID * TH / 2) * fitScale + 20 + (MAX_H * TH * fitScale * 0.5) / 2;
  } else {
    ox = cv.width  / 2 - (GRID * TW / 2) * fitScale - 30;
    oy = cv.height / 2 - (GRID * TH / 2) * fitScale + 20;
  }
  targetScale = fitScale;
  targetOX = ox;
  targetOY = oy;
  // Immediately snap (no lerp delay on mode switch)
  scale = fitScale; OX = ox; OY = oy;
}

// ═══════════════════════════════════════════
// 📸 箱庭GIF書き出し（依存ゼロ・自前GIF89aエンコーダ）
//   📸 タップで即「今の見たまま」を正方形クリップに（メニューなし）。
//   UI は cv 非描画ゆえ含まれない。保存後ヒントは端末別（iOS/Android/その他）。
//   Live Photo 化は端末側の Shortcut/アプリで（埋め込み不可・文言案内のみ）。
// ═══════════════════════════════════════════
const GIF_SECONDS = 3, GIF_FPS = 12, GIF_SIZE = 320;
let gifBusy = false, gifFraming = false;

// 全フレームを median-cut で ≤256 色に量子化
function _gifQuantize(frames, n){
  const samp = [];
  const stride = Math.max(4, (Math.floor(frames[0].length / 4 / 6000)) * 4); // ~6k/frame
  for(const f of frames)
    for(let p = 0; p < f.length; p += stride) samp.push([f[p], f[p+1], f[p+2]]);
  const mkBox = pts => {
    let r0=255,g0=255,b0=255,r1=0,g1=0,b1=0;
    for(const c of pts){
      if(c[0]<r0)r0=c[0]; if(c[0]>r1)r1=c[0];
      if(c[1]<g0)g0=c[1]; if(c[1]>g1)g1=c[1];
      if(c[2]<b0)b0=c[2]; if(c[2]>b1)b1=c[2];
    }
    return { pts, r:r1-r0, g:g1-g0, b:b1-b0 };
  };
  let boxes = [mkBox(samp)];
  while(boxes.length < n){
    let bi=-1, best=-1;
    for(let i=0;i<boxes.length;i++){
      const bx=boxes[i]; if(bx.pts.length<2) continue;
      const m=Math.max(bx.r,bx.g,bx.b); if(m>best){best=m;bi=i;}
    }
    if(bi<0) break;
    const bx=boxes[bi];
    const ch = bx.r>=bx.g && bx.r>=bx.b ? 0 : (bx.g>=bx.b ? 1 : 2);
    bx.pts.sort((a,b)=>a[ch]-b[ch]);
    const mid=bx.pts.length>>1;
    boxes.splice(bi,1, mkBox(bx.pts.slice(0,mid)), mkBox(bx.pts.slice(mid)));
  }
  const pal=[];
  for(const bx of boxes){
    const L=bx.pts.length||1; let r=0,g=0,b=0;
    for(const c of bx.pts){ r+=c[0]; g+=c[1]; b+=c[2]; }
    pal.push([Math.round(r/L),Math.round(g/L),Math.round(b/L)]);
  }
  while(pal.length<256) pal.push([0,0,0]);
  return pal.slice(0,256);
}

// GIF 可変長 LZW（最小コードサイズ8）
function _gifLZW(idx){
  const MIN=8, CLR=256, EOI=257;
  const out=[]; let acc=0, nb=0;
  const put=(c,s)=>{ acc|=c<<nb; nb+=s; while(nb>=8){ out.push(acc&255); acc>>>=8; nb-=8; } };
  let cs=MIN+1, dict=new Map(), next=EOI+1;
  put(CLR,cs);
  let cur=idx[0];
  for(let i=1;i<idx.length;i++){
    const k=idx[i], key=(cur<<8)|k, got=dict.get(key);
    if(got!==undefined){ cur=got; continue; }
    put(cur,cs);
    dict.set(key,next);
    if(next===(1<<cs)){ if(cs<12) cs++; }
    next++;
    cur=k;
    if(next===4096){ put(CLR,cs); dict=new Map(); next=EOI+1; cs=MIN+1; }
  }
  put(cur,cs); put(EOI,cs);
  if(nb>0) out.push(acc&255);
  return out;
}

function _gifEncode(frames, size, delayCs){
  const pal=_gifQuantize(frames,256);
  const cache=new Int16Array(32768).fill(-1);
  const near=(r,g,b)=>{
    const key=((r>>3)<<10)|((g>>3)<<5)|(b>>3);
    let v=cache[key]; if(v>=0) return v;
    let bi=0,bd=1e12;
    for(let i=0;i<256;i++){ const p=pal[i],dr=p[0]-r,dg=p[1]-g,db=p[2]-b,d=dr*dr+dg*dg+db*db; if(d<bd){bd=d;bi=i;} }
    cache[key]=bi; return bi;
  };
  const b=[]; const w16=v=>b.push(v&255,(v>>8)&255);
  for(const c of 'GIF89a') b.push(c.charCodeAt(0));
  w16(size); w16(size); b.push(0xF7,0,0);
  for(let i=0;i<256;i++){ const p=pal[i]; b.push(p[0],p[1],p[2]); }
  b.push(0x21,0xFF,0x0B);
  for(const c of 'NETSCAPE2.0') b.push(c.charCodeAt(0));
  b.push(0x03,0x01,0,0,0x00);
  const px=size*size;
  for(const f of frames){
    b.push(0x21,0xF9,0x04,0x00, delayCs&255,(delayCs>>8)&255, 0x00,0x00);
    b.push(0x2C); w16(0); w16(0); w16(size); w16(size); b.push(0x00, 0x08);
    const idx=new Uint8Array(px);
    for(let p=0,q=0;p<px;p++,q+=4) idx[p]=near(f[q],f[q+1],f[q+2]);
    const lz=_gifLZW(idx);
    for(let i=0;i<lz.length;i+=255){
      const m=Math.min(255,lz.length-i); b.push(m);
      for(let j=0;j<m;j++) b.push(lz[i+j]);
    }
    b.push(0x00);
  }
  b.push(0x3B);
  return new Blob([new Uint8Array(b)],{type:'image/gif'});
}

// 「今の見たまま」を正方形に。キャンバスのサイズ・スケール・カメラは一切
// 変更せず現状のまま描画し、中央の正方形（短辺）を切り出して GIF_SIZE へ
// 等倍縮小する。背景（空/星/月）はキャンバス基準で描かれるため、サイズを
// 変えると縮んで見える＝今回はサイズ非変更なので背景も画面と同じ比率のまま。
// アニメ状態のみ進めて復元（rAF と非干渉）。
function _gifCapture(){
  const W0=cv.width, H0=cv.height;
  const side=Math.min(W0,H0), sx=(W0-side)/2, sy=0;   // 上辺は画面最上部から
  const sT=animT, sDay=timeOfDay, sAn=JSON.stringify(animals), sAid=animalId;
  const g=document.createElement('canvas'); g.width=g.height=GIF_SIZE;
  const gx=g.getContext('2d', { willReadFrequently:true });
  const n=Math.round(GIF_SECONDS*GIF_FPS), dt=1/GIF_FPS, frames=[];
  for(let i=0;i<n;i++){
    updateAnimals(dt); animT+=dt;          // timeOfDay/天気は据え置き
    render();
    gx.drawImage(cv, sx, sy, side, side, 0, 0, GIF_SIZE, GIF_SIZE);  // 中央正方形→等倍縮小
    frames.push(gx.getImageData(0,0,GIF_SIZE,GIF_SIZE).data);
  }
  animT=sT; timeOfDay=sDay; animalId=sAid;
  for(const k in animals) delete animals[k];
  Object.assign(animals, JSON.parse(sAn));
  return frames;
}

// 保存後ヒントは端末別（Live Photo は iOS のみ。Android/その他にも案内）
function _gifHintKey(){
  const ua=navigator.userAgent||'';
  const iOS=/iPad|iPhone|iPod/.test(ua) || (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
  if(iOS) return 'toast.gifHint';
  if(/Android/.test(ua)) return 'toast.gifHintAndroid';
  return 'toast.gifHintSaved';
}

// 撮影される正方形（短辺・中央）。_gifCapture の切り出し矩形と一致＝WYSIWYG
function layoutGifFrame(){
  const W=window.innerWidth, H=window.innerHeight, side=Math.min(W,H);
  const sq=document.getElementById('gif-frame-sq');

async function runGifExport(){
  if(gifBusy) return;
  gifBusy=true;
  try{
    showToast(tr('toast.gifMaking'));
    await new Promise(r=>setTimeout(r,50));      // トースト描画を待つ
    const frames=_gifCapture();
    await new Promise(r=>setTimeout(r,0));
    const blob=_gifEncode(frames, GIF_SIZE, Math.round(100/GIF_FPS));
    const file=new File([blob], 'emoji-niwa-'+Date.now()+'.gif', {type:'image/gif'});
    let saved=false;
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file], title:'emoji-niwa'}); saved=true; }
      catch(_){ saved=false; }   // キャンセル等＝保存されていない
    } else {
      const u=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=u; a.download=file.name;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(u),4000);
      saved=true;
    }
    if(saved) showToast(tr(_gifHintKey()));   // 保存した時だけヒントを出す
  }catch(err){ showToast(tr('toast.gifError')); }
  finally{ gifBusy=false; }
}

async function mpSetTtl(days){
  const t=mpToken();
  if(!t || !MP_HTTP || !mpRoomId) return;
  try{
    const res=await fetch(MP_HTTP+'/room/'+encodeURIComponent(mpRoomId)+'/ttl',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},
      body:JSON.stringify({days})
    });
    if(!res.ok) throw 0;
    const j=await res.json();
    mpTtlDays=j.days|0;
    showToast(tr('toast.ttlSet',{n:mpTtlDays}));   // サーバが Refresh 配信→roleで他者にも反映
  }catch(_){ showToast(tr('toast.ttlErr')); }
}
function mpLeave(){

  try{ if(mpWs){ mpWs.onclose=null; mpWs.close(); } }catch(_){}
  mpWs=null;

  try{ location.href = location.origin + location.pathname; }

async function mpLogout(){

function mpTouch(){            // ローカル変更→デバウンス送信（mpActive 時のみ）
  if(!mpActive || mpApplying || mpSendT) return;
  mpSendT=setTimeout(()=>{ mpSendT=null; mpSend(); }, 320);
}
async function mpSend(){
  if(!mpActive || !mpWs || mpWs.readyState!==1) return;
  try{
    const d=await encodeWorld(worldPayload());
    if(mpWs && mpWs.readyState===1) mpWs.send(JSON.stringify({t:'snap',d}));
  }catch(_){ }
}
async function mpOnMsg(ev){
  let m; try{ m=JSON.parse(ev.data); }catch(_){ return; }
  if(m.t==='snap' && typeof m.d==='string'){
    // 受信スナップ適用で applyState→resetView がカメラを奪うため、
    // ローカルの視点を保持（初回フレーミングとグリッド変化時のみ再フィット）
    const first=!mpGotSnap;
    const _g=GRID,_s=scale,_ox=OX,_oy=OY,_ts=targetScale,_tox=targetOX,_toy=targetOY;
    mpGotSnap=true; mpApplying=true;
    try{ const d=await decodeWorld(m.d); if(d && d.v===SAVE_VERSION) applyState(d); }catch(_){ }
    mpApplying=false;
    if(!first && GRID===_g){
      scale=_s; OX=_ox; OY=_oy; targetScale=_ts; targetOX=_tox; targetOY=_toy;
    }
  } else if(m.t==='role'){
    mpOwner=!!m.owner;
    if(typeof m.ttlDays==='number'){ mpTtlDays=m.ttlDays; mpRefreshBar(); }  // 保持日数を反映
    if(mpOwner && !mpGotSnap && !mpSeeded){ mpSeeded=true; mpSend(); }   // 新規room: 作成者がシード
  } else if(m.t==='peers'){
    const next=Array.isArray(m.names)?m.names:[];
    if(!mpJoinAnnounced && mpMyName && next.indexOf(mpMyName)>=0){
      mpJoinAnnounced=true;       // 自分の入室は1回だけ。ただしブラウザ更新時は出さない
      if(!mpSuppressOwnJoin) mpChatSystem(tr('chat.joined',{name:mpMyName}));
      mpSuppressOwnJoin=false;
    }
    if(mpRosterInit){
      for(const nm of next){
        if(nm && nm!==mpMyName && mpNames.indexOf(nm)<0) mpChatSystem(tr('chat.joined',{name:nm}));
      }
    } else { mpRosterInit=true; }   // 初回（自分の入室時点のroster）は告知しない
    mpPeers=m.n|0; if(m.cap!=null) mpCap=m.cap|0; mpNames=next;
    mpUpdateCountBadge(); mpRefreshBar();
  } else if(m.t==='chatlog'){
    // 後入りへの直近ログ再生（サーバの ts でタイムスタンプ）
    if(Array.isArray(m.items)) for(const it of m.items) mpChatAppend(it.name, it.text, it.ts);
  } else if(m.t==='chat'){
    mpChatAppend(m.name, m.text);
  } else if(m.t==='full'){
    // 満員：再接続せずマルチプレイを停止し、自分の世界に留まる
    mpActive=false;
    if(mpOwnerTimer){ clearInterval(mpOwnerTimer); mpOwnerTimer=null; }
    try{ if(mpWs){ mpWs.onclose=null; mpWs.close(); } }catch(_){ }
    mpWs=null;
    mpBar('hide'); mpChatShow(false); mpUpdateCountBadge();
    try{ sessionStorage.removeItem(MP_SESS_ROOM); }catch(_){ }  // 入室不可だったので在室フラグを消す
    try{ history.replaceState(null,'',location.pathname); }catch(_){ }
    showToast(tr('toast.roomFull'));
  }
}

// チャットログのタイムスタンプ（年月日＋時分）
function mpTs(d){
  return d.getFullYear()+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+('0'+d.getDate()).slice(-2)
    +' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
}
function mpChatAppend(name, text, ts){
  const log=document.getElementById('mpc-log');
  if(!log) return;
  const near = log.scrollHeight - log.scrollTop - log.clientHeight < 40;
  const line=document.createElement('div');
  const d=new Date(ts!=null ? ts : Date.now());   // ts=サーバ時刻(ms)。無ければ現在時刻
  const tsEl=document.createElement('span');
  tsEl.className='ts';
  tsEl.textContent=mpTs(d);
  const nm=document.createElement('span');
  nm.className='nm';
  nm.textContent=(name && String(name).trim()) ? name : 'ゲスト';
  line.appendChild(tsEl);
  line.appendChild(nm);
  line.appendChild(document.createTextNode(String(text==null?'':text)));
  log.appendChild(line);
  while(log.childElementCount>200) log.removeChild(log.firstChild);
  if(near) log.scrollTop=log.scrollHeight;
}
function mpChatSystem(text){
  const log=document.getElementById('mpc-log');
  if(!log) return;
  const near = log.scrollHeight - log.scrollTop - log.clientHeight < 40;
  const line=document.createElement('div');
  line.className='sys';
  const d=new Date();
  const ts=document.createElement('span');
  ts.className='ts';
  ts.textContent=mpTs(d);
  line.appendChild(ts);
  line.appendChild(document.createTextNode(String(text==null?'':text)));
  log.appendChild(line);
  while(log.childElementCount>200) log.removeChild(log.firstChild);
  if(near) log.scrollTop=log.scrollHeight;
}

function mpUpdateCountBadge(){

  const inp=document.getElementById('mpc-in');
